<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mock Tests</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Custom Radio Button Styling */
        input[type="radio"] { accent-color: #9333ea; width: 1.2rem; height: 1.2rem; }
    </style>
</head>
<body class="bg-gray-50 font-sans min-h-screen">

<div class="max-w-md mx-auto relative h-full">
    
    <div id="testListView" class="block pb-20">
        <div class="bg-purple-600 text-white p-4 rounded-b-3xl shadow-md sticky top-0 z-50">
            <div class="flex justify-between items-center mb-4">
                <button onclick="window.location.href='dashboard.html'" class="hover:bg-white/20 p-2 rounded-xl transition">
                    <i class="fas fa-arrow-left"></i>
                </button>
                <h1 class="text-lg font-bold">Mock Tests</h1>
                <div class="w-8"></div>
            </div>
            <div class="text-center pb-2">
                <p class="text-xs text-purple-200 uppercase font-bold">Your Available Tests</p>
            </div>
        </div>

        <div class="px-4 mt-6" id="availableTestsContainer">
            <div class="text-center py-10">
                <i class="fas fa-spinner fa-spin text-3xl text-purple-500 mb-2"></i>
                <p class="text-sm text-gray-500">Finding your tests...</p>
            </div>
        </div>
    </div>

    <div id="activeExamView" class="hidden bg-gray-50 min-h-screen pb-24">
        <div class="bg-white p-4 shadow-sm sticky top-0 z-50 border-b-4 border-purple-600 flex justify-between items-center">
            <div>
                <h2 class="text-sm font-bold text-gray-800" id="activeTestTitle">Test Name</h2>
                <p class="text-[10px] text-gray-500 font-bold uppercase">Do not refresh page</p>
            </div>
            <div class="bg-red-50 px-3 py-1.5 rounded-lg border border-red-100 flex items-center gap-2 text-red-600">
                <i class="fas fa-clock animate-pulse"></i>
                <span id="timerDisplay" class="font-bold text-lg tracking-wider">00:00</span>
            </div>
        </div>

        <div class="px-4 mt-6 space-y-6" id="questionsContainer">
            </div>

        <div class="fixed bottom-0 left-1/2 transform -translate-x-1/2 w-full max-w-md bg-white border-t border-gray-200 p-4 z-50">
            <button onclick="submitTest()" id="submitTestBtn" class="w-full bg-purple-600 text-white font-bold py-3.5 rounded-xl hover:bg-purple-700 shadow-md transition text-lg">
                Submit Test
            </button>
        </div>
    </div>

    <div id="resultView" class="hidden min-h-screen flex flex-col items-center justify-center p-6 text-center">
        <div class="w-24 h-24 bg-green-100 text-green-500 rounded-full flex items-center justify-center text-5xl mb-6 shadow-inner">
            <i class="fas fa-check-circle"></i>
        </div>
        <h1 class="text-3xl font-bold text-gray-800 mb-2">Test Submitted!</h1>
        <p class="text-gray-500 mb-8" id="resultSubtitle">Great job completing the test.</p>

        <div class="bg-white w-full p-6 rounded-3xl shadow-lg border border-gray-100 mb-8">
            <p class="text-xs text-gray-400 font-bold uppercase mb-2">Your Score</p>
            <div class="text-5xl font-bold text-purple-600 mb-4 tracking-tighter" id="scoreDisplay">
                0 / 0
            </div>
            <div class="w-full bg-gray-100 rounded-full h-3 mb-2">
                <div id="scoreBar" class="bg-purple-500 h-3 rounded-full transition-all duration-1000" style="width: 0%"></div>
            </div>
            <p class="text-xs font-bold text-gray-500" id="percentageDisplay">0% Accuracy</p>
        </div>

        <button onclick="window.location.href='dashboard.html'" class="w-full bg-gray-800 text-white font-bold py-4 rounded-xl hover:bg-gray-900 transition">
            Back to Dashboard
        </button>
    </div>

</div>

<script type="module">
    import { auth, db } from '../js/firebase-init.js';
    import { doc, getDoc, collection, query, where, onSnapshot, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-auth.js";

    // Global Variables
    let currentUser = null;
    let studentData = null;
    let allTests = [];
    let currentActiveTest = null;
    let timerInterval = null;

    // 1. Auth Check & Load Tests
    onAuthStateChanged(auth, async (user) => {
        if (user) {
            currentUser = user;
            const userDoc = await getDoc(doc(db, "users", user.uid));
            if (userDoc.exists()) {
                studentData = userDoc.data();
                if(studentData.class) {
                    fetchTests(studentData.class);
                } else {
                    document.getElementById('availableTestsContainer').innerHTML = `<p class="text-center text-red-500">Class not assigned.</p>`;
                }
            }
        } else {
            window.location.href = "../index.html";
        }
    });

    function fetchTests(studentClass) {
        const q = query(collection(db, "tests"), where("targetClass", "==", studentClass));
        onSnapshot(q, (snapshot) => {
            allTests = [];
            const container = document.getElementById('availableTestsContainer');
            container.innerHTML = "";
            
            if(snapshot.empty) {
                container.innerHTML = `<div class="bg-white p-6 rounded-2xl border border-gray-100 text-center"><p class="text-sm font-bold text-gray-500">No tests available right now.</p></div>`;
                return;
            }

            snapshot.forEach((docSnap) => {
                const test = { id: docSnap.id, ...docSnap.data() };
                allTests.push(test);
                
                container.innerHTML += `
                    <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 mb-4 relative overflow-hidden">
                        <div class="absolute top-0 right-0 bg-purple-100 text-purple-600 text-[10px] font-bold px-3 py-1.5 rounded-bl-xl">${test.duration} Mins</div>
                        <h3 class="font-bold text-gray-800 text-lg mb-1 pr-16">${test.title}</h3>
                        <p class="text-xs text-gray-500 mb-4"><i class="fas fa-list-ol mr-1"></i> ${test.totalQuestions} Questions</p>
                        <button onclick="startExam('${test.id}')" class="w-full bg-purple-50 text-purple-600 font-bold py-2.5 rounded-xl border border-purple-200 hover:bg-purple-100 transition">
                            Start Test Now
                        </button>
                    </div>
                `;
            });
        });
    }

    // 2. Start Exam UI & Logic
    window.startExam = (testId) => {
        if(!confirm("Are you ready? The timer will start immediately.")) return;

        currentActiveTest = allTests.find(t => t.id === testId);
        
        // Hide List, Show Exam View
        document.getElementById('testListView').classList.add('hidden');
        document.getElementById('activeExamView').classList.remove('hidden');
        
        document.getElementById('activeTestTitle').innerText = currentActiveTest.title;

        renderQuestions(currentActiveTest.questions);
        startTimer(currentActiveTest.duration);
    };

    function renderQuestions(questions) {
        const container = document.getElementById('questionsContainer');
        container.innerHTML = "";

        questions.forEach((q, index) => {
            container.innerHTML += `
                <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100">
                    <p class="text-xs font-bold text-purple-600 mb-2 uppercase">Question ${index + 1}</p>
                    <h3 class="text-sm font-bold text-gray-800 mb-4">${q.question}</h3>
                    
                    <div class="space-y-3">
                        <label class="flex items-center gap-3 p-3 border border-gray-100 rounded-xl bg-gray-50 cursor-pointer hover:bg-purple-50 transition">
                            <input type="radio" name="q_${index}" value="A"> <span class="text-sm text-gray-700">${q.options.A}</span>
                        </label>
                        <label class="flex items-center gap-3 p-3 border border-gray-100 rounded-xl bg-gray-50 cursor-pointer hover:bg-purple-50 transition">
                            <input type="radio" name="q_${index}" value="B"> <span class="text-sm text-gray-700">${q.options.B}</span>
                        </label>
                        <label class="flex items-center gap-3 p-3 border border-gray-100 rounded-xl bg-gray-50 cursor-pointer hover:bg-purple-50 transition">
                            <input type="radio" name="q_${index}" value="C"> <span class="text-sm text-gray-700">${q.options.C}</span>
                        </label>
                        <label class="flex items-center gap-3 p-3 border border-gray-100 rounded-xl bg-gray-50 cursor-pointer hover:bg-purple-50 transition">
                            <input type="radio" name="q_${index}" value="D"> <span class="text-sm text-gray-700">${q.options.D}</span>
                        </label>
                    </div>
                </div>
            `;
        });
    }

    function startTimer(minutes) {
        let timeInSeconds = minutes * 60;
        const display = document.getElementById('timerDisplay');

        timerInterval = setInterval(() => {
            const min = Math.floor(timeInSeconds / 60);
            const sec = timeInSeconds % 60;
            display.innerText = `${min < 10 ? '0' : ''}${min}:${sec < 10 ? '0' : ''}${sec}`;

            // Warning colors when less than 1 minute
            if(timeInSeconds <= 60) {
                display.classList.remove('text-red-600');
                display.classList.add('text-red-700', 'animate-bounce');
            }

            if (timeInSeconds <= 0) {
                clearInterval(timerInterval);
                alert("Time is up! Auto-submitting your test.");
                submitTest();
            }
            timeInSeconds--;
        }, 1000);
    }

    // 3. Submit & Check Logic
    window.submitTest = async () => {
        clearInterval(timerInterval); // Stop timer
        document.getElementById('submitTestBtn').disabled = true;
        document.getElementById('submitTestBtn').innerText = "Processing Results...";

        let score = 0;
        const total = currentActiveTest.questions.length;

        // Check answers
        currentActiveTest.questions.forEach((q, index) => {
            const selectedOpt = document.querySelector(`input[name="q_${index}"]:checked`);
            if (selectedOpt && selectedOpt.value === q.correctAnswer) {
                score++;
            }
        });

        // Save to Database
        try {
            await addDoc(collection(db, "results"), {
                studentId: currentUser.uid,
                studentName: studentData.name || studentData.firstName,
                testId: currentActiveTest.id,
                testTitle: currentActiveTest.title,
                score: score,
                totalQuestions: total,
                timestamp: serverTimestamp()
            });

            showResultScreen(score, total);
        } catch (err) {
            alert("Error saving result: " + err.message);
        }
    };

    function showResultScreen(score, total) {
        document.getElementById('activeExamView').classList.add('hidden');
        document.getElementById('resultView').classList.remove('hidden');

        document.getElementById('scoreDisplay').innerText = `${score} / ${total}`;
        
        const percentage = Math.round((score / total) * 100);
        document.getElementById('percentageDisplay').innerText = `${percentage}% Accuracy`;
        
        // Animate progress bar
        setTimeout(() => {
            document.getElementById('scoreBar').style.width = `${percentage}%`;
            if(percentage > 75) document.getElementById('scoreBar').classList.replace('bg-purple-500', 'bg-green-500');
            if(percentage < 40) document.getElementById('scoreBar').classList.replace('bg-purple-500', 'bg-red-500');
        }, 300);
    }
</script>
</body>
    </html>
