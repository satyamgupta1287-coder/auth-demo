<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fee Details</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-4">

<div class="max-w-md mx-auto bg-white rounded-2xl shadow-sm p-6">
    <h2 class="text-xl font-bold text-gray-800 mb-6">Fee Summary</h2>

    <div class="space-y-4">
        <div class="bg-blue-600 text-white p-6 rounded-2xl shadow-lg">
            <p class="text-blue-100 text-sm">Pending Fees</p>
            <h1 class="text-4xl font-bold mt-1" id="pendingFees">₹ 0</h1>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <div class="bg-gray-100 p-4 rounded-xl">
                <p class="text-xs text-gray-500 font-bold">Total Fees</p>
                <h3 class="text-lg font-bold" id="totalFees">₹ 0</h3>
            </div>
            <div class="bg-gray-100 p-4 rounded-xl">
                <p class="text-xs text-gray-500 font-bold">Paid</p>
                <h3 class="text-lg font-bold text-green-600" id="paidFees">₹ 0</h3>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { auth, db } from '../js/firebase-init.js';
    import { doc, getDoc } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-auth.js";

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            // स्टूडेंट की फीस डिटेल्स Firestore से लाएं
            const feeDoc = await getDoc(doc(db, "fees", user.uid));
            if (feeDoc.exists()) {
                const data = feeDoc.data();
                document.getElementById('pendingFees').innerText = `₹ ${data.pending}`;
                document.getElementById('totalFees').innerText = `₹ ${data.total}`;
                document.getElementById('paidFees').innerText = `₹ ${data.paid}`;
            }
        }
    });
</script>
</body>
</html>
