<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fee Details</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 p-4 font-sans">

<div class="max-w-md mx-auto relative h-full">
    <div class="flex justify-between items-center mb-6 pt-4">
        <button onclick="window.location.href='dashboard.html'" class="bg-white p-2.5 rounded-xl shadow-sm border border-gray-100 text-gray-600 hover:text-blue-600 transition">
            <i class="fas fa-arrow-left"></i>
        </button>
        <h1 class="text-xl font-bold text-gray-800">Fee Details</h1>
        <div class="w-10"></div>
    </div>

    <div class="bg-white rounded-3xl shadow-sm p-6 mb-6 border border-gray-100">
        <h2 class="text-lg font-bold text-gray-800 mb-6">Fee Summary</h2>

        <div class="space-y-4">
            <div class="bg-gradient-to-r from-blue-600 to-indigo-700 text-white p-6 rounded-2xl shadow-lg relative overflow-hidden">
                <div class="absolute right-0 top-0 opacity-10 text-8xl transform translate-x-4 -translate-y-4">
                    <i class="fas fa-wallet"></i>
                </div>
                <p class="text-blue-200 text-xs font-bold uppercase tracking-wider">Pending Fees</p>
                <h1 class="text-4xl font-black mt-2 tracking-tight" id="pendingFees"><i class="fas fa-spinner fa-spin text-2xl"></i></h1>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div class="bg-gray-50 p-5 rounded-2xl border border-gray-100">
                    <p class="text-[10px] text-gray-500 font-bold uppercase tracking-wider mb-1">Total Fees</p>
                    <h3 class="text-xl font-black text-gray-800" id="totalFees">₹ 0</h3>
                </div>
                <div class="bg-green-50 p-5 rounded-2xl border border-green-100">
                    <p class="text-[10px] text-green-600 font-bold uppercase tracking-wider mb-1">Paid Amount</p>
                    <h3 class="text-xl font-black text-green-700" id="paidFees">₹ 0</h3>
                </div>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { auth, db } from '../js/firebase-init.js';
    import { doc, getDoc } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-auth.js";

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            // NAYA LOGIC: Data ab 'users' collection se aayega
            const userDoc = await getDoc(doc(db, "users", user.uid));
            if (userDoc.exists()) {
                const data = userDoc.data();
                
                const total = data.totalFee || 0;
                const paid = data.paidFee || 0;
                const pending = total - paid;

                document.getElementById('pendingFees').innerText = `₹ ${pending}`;
                document.getElementById('totalFees').innerText = `₹ ${total}`;
                document.getElementById('paidFees').innerText = `₹ ${paid}`;
            }
        } else {
            window.location.href = "../index.html";
        }
    });
</script>
</body>
</html>
