<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student App Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-gray-50 pb-20 font-sans">

<div class="max-w-md mx-auto bg-gray-50 min-h-screen shadow-sm relative">
    
    <div class="bg-gradient-to-r from-blue-600 to-indigo-700 rounded-b-[2.5rem] p-6 text-white text-center shadow-lg relative pb-16">
        <div class="flex justify-between items-center mb-4">
            <div class="text-left">
                <p class="text-blue-200 text-xs font-bold uppercase tracking-wider" id="greetingMsg">Good Morning,</p>
                <h1 class="text-2xl font-bold truncate w-48" id="studentName">Loading...</h1>
            </div>
            <button id="logoutBtn" class="bg-white/20 hover:bg-white/30 p-2 rounded-xl backdrop-blur-sm transition">
                <i class="fas fa-sign-out-alt"></i>
            </button>
        </div>
        <p class="text-sm bg-white/10 inline-block px-4 py-1.5 rounded-full backdrop-blur-sm border border-white/20">
            ID: <span id="studentId" class="font-bold">...</span> | <span id="batchName">Loading...</span>
        </p>

        <div class="absolute -bottom-10 left-1/2 transform -translate-x-1/2">
            <div class="w-20 h-20 bg-white rounded-full p-1 shadow-lg">
                <img id="profilePhoto" src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" class="w-full h-full rounded-full object-cover border border-gray-100">
            </div>
        </div>
    </div>

    <div class="mt-14 px-4">
        <div class="flex gap-3 overflow-x-auto no-scrollbar py-2">
            <div onclick="window.location.href='attendance.html'" class="min-w-[120px] bg-white p-4 rounded-2xl shadow-sm border border-gray-100 flex flex-col items-center cursor-pointer hover:bg-blue-50 hover:border-blue-200 transition-all">
                <i class="fas fa-chart-pie text-blue-500 text-2xl mb-2"></i>
                <h3 class="text-lg font-bold text-gray-800" id="statAttendance">N/A</h3>
                <p class="text-[10px] text-gray-500 font-bold uppercase">Attendance</p>
            </div>
            
            <div class="min-w-[120px] bg-white p-4 rounded-2xl shadow-sm border border-gray-100 flex flex-col items-center">
                <i class="fas fa-tasks text-orange-500 text-2xl mb-2"></i>
                <h3 class="text-lg font-bold text-gray-800" id="statAssignments">0</h3>
                <p class="text-[10px] text-gray-500 font-bold uppercase">Pending HW</p>
            </div>
            <div class="min-w-[120px] bg-white p-4 rounded-2xl shadow-sm border border-gray-100 flex flex-col items-center">
                <i class="fas fa-file-signature text-purple-500 text-2xl mb-2"></i>
                <h3 class="text-lg font-bold text-gray-800" id="statTests">0</h3>
                <p class="text-[10px] text-gray-500 font-bold uppercase">Upc. Tests</p>
            </div>
            <div class="min-w-[120px] bg-white p-4 rounded-2xl shadow-sm border border-gray-100 flex flex-col items-center">
                <i class="fas fa-rupee-sign text-red-500 text-2xl mb-2"></i>
                <h3 class="text-lg font-bold text-gray-800" id="statFees">₹0</h3>
                <p class="text-[10px] text-gray-500 font-bold uppercase">Pending Fee</p>
            </div>
        </div>
    </div>

    <div class="px-4 mt-6">
        <h2 class="text-sm font-bold text-gray-800 mb-3 px-1">Quick Access</h2>
        <div class="grid grid-cols-4 gap-3">
            <button onclick="window.location.href='live-classes.html'" class="bg-red-50 p-3 rounded-2xl flex flex-col items-center border border-red-100 hover:bg-red-100 transition">
                <i class="fas fa-video text-red-600 mb-1 text-lg"></i><span class="text-[10px] font-bold text-gray-700">Live Class</span>
            </button>
            <button onclick="window.location.href='materials.html'" class="bg-blue-50 p-3 rounded-2xl flex flex-col items-center border border-blue-100 hover:bg-blue-100 transition">
                <i class="fas fa-book-open text-blue-600 mb-1 text-lg"></i><span class="text-[10px] font-bold text-gray-700">Materials</span>
            </button>
            <button onclick="window.location.href='assignments.html'" class="bg-green-50 p-3 rounded-2xl flex flex-col items-center border border-green-100 hover:bg-green-100 transition">
                <i class="fas fa-clipboard-list text-green-600 mb-1 text-lg"></i><span class="text-[10px] font-bold text-gray-700">Assignments</span>
            </button>
            <button onclick="window.location.href='tests.html'" class="bg-purple-50 p-3 rounded-2xl flex flex-col items-center border border-purple-100 hover:bg-purple-100 transition">
                <i class="fas fa-laptop-code text-purple-600 mb-1 text-lg"></i><span class="text-[10px] font-bold text-gray-700">Mock Tests</span>
            </button>
            <button onclick="window.location.href='results.html'" class="bg-orange-50 p-3 rounded-2xl flex flex-col items-center border border-orange-100 hover:bg-orange-100 transition">
                <i class="fas fa-trophy text-orange-600 mb-1 text-lg"></i><span class="text-[10px] font-bold text-gray-700">Results</span>
            </button>
            <button onclick="window.location.href='fees.html'" class="bg-teal-50 p-3 rounded-2xl flex flex-col items-center border border-teal-100 hover:bg-teal-100 transition">
                <i class="fas fa-wallet text-teal-600 mb-1 text-lg"></i><span class="text-[10px] font-bold text-gray-700">Fees</span>
            </button>
            
            <button onclick="window.location.href='gallery.html'" class="bg-pink-50 p-3 rounded-2xl flex flex-col items-center border border-pink-100 hover:bg-pink-100 transition col-span-2">
                <i class="fas fa-images text-pink-500 mb-1 text-lg"></i><span class="text-[10px] font-bold text-gray-700">School Gallery</span>
            </button>

            <button onclick="window.location.href='complaints.html'" class="bg-yellow-50 p-3 rounded-2xl flex flex-col items-center border border-yellow-100 hover:bg-yellow-100 transition">
    <i class="fas fa-comment-dots text-yellow-600 mb-1 text-lg"></i>
    <span class="text-[10px] font-bold text-gray-700">Complaint</span>
            </button>

            <button onclick="window.location.href='leave.html'" class="bg-green-50 p-3 rounded-2xl flex flex-col items-center border border-green-100 hover:bg-green-100 transition">
    <i class="fas fa-calendar-check text-green-600 mb-1 text-lg"></i>
    <span class="text-[10px] font-bold text-gray-700">Leave</span>
</button>

            <button onclick="window.location.href='timetable.html'" class="bg-indigo-50 p-3 rounded-2xl flex flex-col items-center border border-indigo-100 hover:bg-indigo-100 transition">
    <i class="fas fa-calendar-alt text-indigo-600 mb-1 text-lg"></i>
    <span class="text-[10px] font-bold text-gray-700">Timetable</span>
            </button>

            <button onclick="window.location.href='feedback.html'" class="bg-blue-50 p-3 rounded-2xl flex flex-col items-center border border-blue-100 hover:bg-blue-100 transition">
    <i class="fas fa-comment-alt text-blue-600 mb-1 text-lg"></i>
    <span class="text-[10px] font-bold text-gray-700">Feedback</span>
            </button>
        </div>
    </div>

    <div class="px-4 mt-8">
        <h2 class="text-sm font-bold text-gray-800 mb-3 px-1">Today's Schedule</h2>
        <div id="scheduleContainer" class="space-y-3">
            <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 text-center">
                <p class="text-xs text-gray-400 py-2">Loading classes...</p>
            </div>
        </div>
    </div>

    <div class="px-4 mt-6">
        <div class="flex justify-between items-end mb-3 px-1">
            <h2 class="text-sm font-bold text-gray-800">Pending Assignments</h2>
            <span onclick="window.location.href='assignments.html'" class="text-[10px] font-bold text-blue-600 cursor-pointer hover:underline">View All</span>
        </div>
        <div id="assignmentsContainer">
            <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 text-center">
                <p class="text-xs text-gray-400 py-2">Loading assignments...</p>
            </div>
        </div>
    </div>

    <div class="px-4 mt-8">
        <h2 class="text-sm font-bold text-gray-800 mb-3 px-1">Latest Announcements</h2>
        <div id="announcementContainer">
            <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 text-center">
                <p class="text-xs text-gray-400 py-2">Loading announcements...</p>
            </div>
        </div>
    </div>

    <div class="fixed bottom-0 left-1/2 transform -translate-x-1/2 w-full max-w-md bg-white border-t border-gray-200 flex justify-around items-center p-3 z-50 rounded-t-2xl shadow-[0_-4px_20px_rgba(0,0,0,0.1)]">
        <button class="flex flex-col items-center text-blue-600">
            <i class="fas fa-home text-lg mb-1"></i><span class="text-[9px] font-bold">Home</span>
        </button>
        <button onclick="window.location.href='live-classes.html'" class="flex flex-col items-center text-gray-400 hover:text-blue-600 transition">
            <i class="fas fa-play-circle text-lg mb-1"></i><span class="text-[9px] font-bold">Classes</span>
        </button>
        <button onclick="window.location.href='tests.html'" class="flex flex-col items-center text-gray-400 hover:text-blue-600 transition">
            <i class="fas fa-edit text-lg mb-1"></i><span class="text-[9px] font-bold">Tests</span>
        </button>
        <button onclick="window.location.href='notices.html'" class="flex flex-col items-center text-gray-400 hover:text-blue-600 transition">
            <i class="fas fa-bell text-lg mb-1"></i><span class="text-[9px] font-bold">Notices</span>
        </button>
        <button onclick="window.location.href='profile.html'" class="flex flex-col items-center text-gray-400 hover:text-blue-600 transition">
            <i class="fas fa-user text-lg mb-1"></i><span class="text-[9px] font-bold">Profile</span>
        </button>
    </div>

</div>

<script type="module">
    import { auth, db } from '../js/firebase-init.js';
    // NAYA: 'orderBy' aur 'limit' hata diya gaya index error fix karne ke liye
    import { doc, getDoc, collection, query, where, onSnapshot } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";
    import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-auth.js";

    const hour = new Date().getHours();
    document.getElementById('greetingMsg').innerText = hour < 12 ? 'Good Morning,' : (hour < 18 ? 'Good Afternoon,' : 'Good Evening,');

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            const userDoc = await getDoc(doc(db, "users", user.uid));
            if (userDoc.exists()) {
                const userData = userDoc.data();
                const schoolId = userData.schoolId; // GET SCHOOL ID
                
                // Profile Setup
                document.getElementById('studentName').innerText = userData.name || userData.firstName || 'Student';
                document.getElementById('studentId').innerText = userData.studentId || userData.admissionNo || 'N/A';
                let clsText = userData.class ? `Class ${userData.class}` : 'Unassigned';
                let secText = userData.section ? ` ${userData.section}` : '';
                document.getElementById('batchName').innerText = clsText + secText;

                if(userData.photoUrl || userData.photoBase64) {
                    document.getElementById('profilePhoto').src = userData.photoUrl || userData.photoBase64;
                }

                // Fees
                const totalFee = userData.totalFee || 0;
                const paidFee = userData.paidFee || 0;
                const pendingFee = totalFee - paidFee;
                document.getElementById('statFees').innerText = "₹" + pendingFee;

                const targetClassStr = String(userData.class || "");

                // A. Assignments Loader Fix (Firebase Index Bug Fixed)
                const assignQuery = query(collection(db, "assignments"), where("schoolId", "==", schoolId));
                onSnapshot(assignQuery, (snapshot) => {
                    const container = document.getElementById('assignmentsContainer');
                    let filteredAssigns = snapshot.docs.filter(d => String(d.data().targetClass || d.data().className || "") === targetClassStr);
                    
                    // NAYA: Client-side Sort (Latest Upar)
                    filteredAssigns.sort((a, b) => (b.data().createdAt?.toMillis() || 0) - (a.data().createdAt?.toMillis() || 0));

                    document.getElementById('statAssignments').innerText = filteredAssigns.length;

                    if(filteredAssigns.length === 0) {
                        container.innerHTML = `<div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 text-center"><p class="text-xs text-gray-400 py-2">No pending assignments! 🎉</p></div>`;
                    } else {
                        container.innerHTML = "";
                        filteredAssigns.slice(0, 2).forEach((docSnap) => { 
                            const data = docSnap.data();
                            const dlUrl = data.fileUrl ? (data.fileUrl.includes('/upload/') ? data.fileUrl.replace('/upload/', '/upload/fl_attachment/') : data.fileUrl) : "#";
                            
                            container.innerHTML += `
                                <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 mb-3 relative overflow-hidden text-left">
                                    <div class="absolute top-0 right-0 bg-blue-50 text-blue-600 text-[9px] font-bold px-2 py-1 rounded-bl-lg">New</div>
                                    <h4 class="font-bold text-gray-800 text-sm truncate pr-10">${data.title}</h4>
                                    <p class="text-xs text-gray-500 mt-1 line-clamp-1">${data.description || 'Subject related task'}</p>
                                    <a href="${dlUrl}" target="_blank" class="mt-3 text-xs text-blue-600 font-bold border border-blue-200 px-3 py-1.5 rounded-lg w-full text-center block hover:bg-blue-50 transition">Download Details</a>
                                </div>
                            `;
                        });
                    }
                });

                // B. Live Classes Loader Fix
                const classQuery = query(collection(db, "live_classes"), where("schoolId", "==", schoolId));
                onSnapshot(classQuery, (snapshot) => {
                    const scheduleContainer = document.getElementById('scheduleContainer');
                    let filteredClasses = snapshot.docs.filter(d => String(d.data().targetClass || d.data().className || "") === targetClassStr);
                    
                    // Client-side Sort
                    filteredClasses.sort((a, b) => (b.data().createdAt?.toMillis() || 0) - (a.data().createdAt?.toMillis() || 0));

                    if (filteredClasses.length === 0) {
                        scheduleContainer.innerHTML = `<div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 text-center"><p class="text-xs text-gray-400 py-2">No classes scheduled for today.</p></div>`;
                    } else {
                        scheduleContainer.innerHTML = "";
                        filteredClasses.forEach((docSnap) => {
                            const data = docSnap.data();
                            scheduleContainer.innerHTML += `
                                <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 mb-3 flex items-center gap-4 text-left">
                                    <div class="w-12 h-12 bg-red-50 text-red-600 rounded-xl flex items-center justify-center shadow-inner"><i class="fas fa-video text-xl"></i></div>
                                    <div class="flex-grow">
                                        <h4 class="font-bold text-gray-800 text-sm">${data.subject || data.title || 'Live Class'}</h4>
                                        <p class="text-[10px] text-gray-500 font-bold mb-1"><i class="far fa-clock mr-1"></i>Tap to join</p>
                                    </div>
                                    <a href="${data.meetingLink || '#'}" target="_blank" class="bg-red-500 text-white w-10 h-10 rounded-full flex items-center justify-center shadow-md hover:bg-red-600 transition"><i class="fas fa-play ml-0.5"></i></a>
                                </div>
                            `;
                        });
                    }
                });

                // C. Notices Load Fix
                const noticeQuery = query(collection(db, "announcements"), where("schoolId", "==", schoolId));
                onSnapshot(noticeQuery, (snapshot) => {
                    const noticeContainer = document.getElementById('announcementContainer');
                    if(snapshot.empty) {
                        noticeContainer.innerHTML = `<div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 text-center"><p class="text-xs text-gray-400 py-2">No new announcements.</p></div>`;
                    } else {
                        let allNotices = [...snapshot.docs];
                        allNotices.sort((a, b) => (b.data().createdAt?.toMillis() || 0) - (a.data().createdAt?.toMillis() || 0));
                        
                        const data = allNotices.data();
                        noticeContainer.innerHTML = `
                            <div class="bg-yellow-50 p-4 rounded-2xl border border-yellow-200 flex items-start gap-3">
                                <div class="w-10 h-10 bg-yellow-100 rounded-full flex items-center justify-center text-yellow-600 flex-shrink-0"><i class="fas fa-bullhorn"></i></div>
                                <div class="text-left">
                                    <h4 class="font-bold text-gray-800 text-sm">${data.title}</h4>
                                    <p class="text-xs text-gray-600 mt-1">${data.description}</p>
                                </div>
                            </div>
                        `;
                    }
                });

                // D. Attendance Load (FILTERED BY EMAIL & SCHOOL)
                const attQuery = query(collection(db, "attendance"), where("studentEmail", "==", user.email), where("schoolId", "==", schoolId));
                onSnapshot(attQuery, (snapshot) => {
                    let presentCount = 0;
                    let totalCount = snapshot.docs.length;
                    
                    snapshot.forEach(doc => {
                        if(doc.data().status === 'present') presentCount++;
                    });
                    
                    let percentage = totalCount === 0 ? "N/A" : Math.round((presentCount / totalCount) * 100) + "%";
                    
                    const statEl = document.getElementById('statAttendance');
                    statEl.innerText = percentage;
                    
                    if(percentage !== "N/A") {
                        if(parseInt(percentage) >= 75) {
                            statEl.className = "text-lg font-black text-green-600";
                        } else if(parseInt(percentage) < 50) {
                            statEl.className = "text-lg font-black text-red-600";
                        } else {
                            statEl.className = "text-lg font-black text-blue-600";
                        }
                    }
                });

            } else {
                window.location.href = "../index.html"; 
            }
        } else {
            window.location.href = "../index.html"; 
        }
    });

    document.getElementById('logoutBtn').addEventListener('click', async () => {
        if(confirm("Are you sure you want to logout?")) {
            await signOut(auth);
            window.location.href = "../index.html";
        }
    });
</script>
</body>
</html>
