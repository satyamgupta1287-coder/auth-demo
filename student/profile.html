<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Profile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 min-h-screen font-sans pb-24">

    <div class="max-w-md mx-auto bg-gray-50 min-h-screen relative shadow-sm">
        
        <div class="bg-gradient-to-r from-blue-600 to-indigo-700 h-44 rounded-b-[2.5rem] relative flex flex-col items-center pt-6 text-white shadow-lg">
            <div class="flex justify-between items-center w-full px-6 mb-2">
                <button onclick="window.location.href='dashboard.html'" class="bg-white/20 hover:bg-white/30 p-2 rounded-xl backdrop-blur-sm transition">
                    <i class="fas fa-arrow-left"></i>
                </button>
                <h1 class="text-xl font-bold tracking-wide">My Profile</h1>
                <div class="w-9 h-9"></div> </div>
            
            <div class="absolute -bottom-12 w-24 h-24 bg-white rounded-full p-1 shadow-md border border-gray-100">
                <div class="w-full h-full bg-blue-50 rounded-full flex items-center justify-center overflow-hidden">
                    <img id="userAvatar" src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" class="w-full h-full object-cover rounded-full">
                </div>
            </div>
        </div>

        <div class="mt-16 text-center px-4">
            <h2 id="profileName" class="text-2xl font-black text-gray-800 truncate">Loading...</h2>
            <p id="profileRoll" class="text-sm text-gray-500 font-medium mt-0.5">ID: Fetching...</p>
        </div>

        <div class="px-4 mt-8 space-y-4">
            
            <h3 class="text-xs font-bold text-gray-400 uppercase tracking-wider px-1">Academic Details</h3>
            
            <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 flex items-center gap-4">
                <div class="w-10 h-10 bg-blue-50 text-blue-600 rounded-xl flex items-center justify-center text-lg"><i class="fas fa-graduation-cap"></i></div>
                <div class="flex-1">
                    <p class="text-[10px] text-gray-400 font-bold uppercase">Class & Batch</p>
                    <h4 id="profileClass" class="text-base font-bold text-gray-800">Loading...</h4>
                </div>
            </div>

            <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 flex items-center gap-4">
                <div class="w-10 h-10 bg-indigo-50 text-indigo-600 rounded-xl flex items-center justify-center text-lg"><i class="fas fa-id-card"></i></div>
                <div class="flex-1">
                    <p class="text-[10px] text-gray-400 font-bold uppercase">Admission Number</p>
                    <h4 id="profileAdmissionNo" class="text-base font-bold text-gray-800">Loading...</h4>
                </div>
            </div>

            <h3 class="text-xs font-bold text-gray-400 uppercase tracking-wider px-1 pt-2">Fee Summary Ledger</h3>

            <div class="bg-white p-5 rounded-3xl shadow-sm border border-gray-100 space-y-3">
                <div class="flex justify-between items-center text-sm border-b border-gray-50 pb-2">
                    <span class="text-gray-500 font-medium">Total Course Fee</span>
                    <span id="feeTotal" class="font-bold text-gray-800">₹0</span>
                </div>
                <div class="flex justify-between items-center text-sm border-b border-gray-50 pb-2">
                    <span class="text-gray-500 font-medium">Total Paid Fee</span>
                    <span id="feePaid" class="font-bold text-green-600">₹0</span>
                </div>
                <div class="flex justify-between items-center text-sm pt-1">
                    <span class="text-gray-700 font-bold">Pending Dues</span>
                    <span id="feePending" class="font-black text-red-600 bg-red-50 px-2.5 py-0.5 rounded-lg border border-red-100">₹0</span>
                </div>
            </div>

            <div class="pt-4">
                <button id="profileLogoutBtn" class="w-full bg-red-50 text-red-600 border border-red-200/60 font-bold py-4 rounded-2xl hover:bg-red-100 transition flex justify-center items-center gap-2 shadow-sm">
                    <i class="fas fa-sign-out-alt"></i> Logout Account
                </button>
            </div>

        </div>

        <div class="fixed bottom-0 left-1/2 transform -translate-x-1/2 w-full max-w-md bg-white border-t border-gray-200 flex justify-around items-center p-3 z-50 rounded-t-2xl shadow-[0_-4px_20px_rgba(0,0,0,0.1)]">
            <button onclick="window.location.href='dashboard.html'" class="flex flex-col items-center text-gray-400 hover:text-blue-600 transition">
                <i class="fas fa-home text-lg mb-1"></i>
                <span class="text-[9px] font-bold">Home</span>
            </button>
            <button onclick="window.location.href='live-classes.html'" class="flex flex-col items-center text-gray-400 hover:text-blue-600 transition">
                <i class="fas fa-play-circle text-lg mb-1"></i>
                <span class="text-[9px] font-bold">Classes</span>
            </button>
            <button onclick="window.location.href='tests.html'" class="flex flex-col items-center text-gray-400 hover:text-blue-600 transition">
                <i class="fas fa-edit text-lg mb-1"></i>
                <span class="text-[9px] font-bold">Tests</span>
            </button>
            <button onclick="window.location.href='notifications.html'" class="flex flex-col items-center text-gray-400 hover:text-blue-600 transition">
                <i class="fas fa-bell text-lg mb-1"></i>
                <span class="text-[9px] font-bold">Notices</span>
            </button>
            <button class="flex flex-col items-center text-blue-600">
                <i class="fas fa-user text-lg mb-1"></i>
                <span class="text-[9px] font-bold">Profile</span>
            </button>
        </div>

    </div>

<script type="module">
    import { auth, db } from '../js/firebase-init.js';
    import { doc, getDoc } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";
    import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-auth.js";

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            try {
                // Fetch user data matching dashboard hierarchy
                const userDoc = await getDoc(doc(db, "users", user.uid));
                if (userDoc.exists()) {
                    const userData = userDoc.data();

                    // Set Avatar
                    if(userData.photoBase64) {
                        document.getElementById('userAvatar').src = userData.photoBase64;
                    }

                    // Map fields accurately
                    document.getElementById('profileName').innerText = userData.name || userData.firstName || 'Student';
                    document.getElementById('profileRoll').innerText = "ID: " + (userData.studentId || userData.admissionNo || 'N/A');
                    document.getElementById('profileAdmissionNo').innerText = userData.admissionNo || userData.studentId || 'N/A';
                    
                    let studentClass = userData.class ? `Class ${userData.class}` : 'Unassigned';
                    let studentSection = userData.section ? ` - ${userData.section}` : '';
                    document.getElementById('profileClass').innerText = studentClass + studentSection;

                    // Fees Data Mapping
                    const totalFee = userData.totalFee || 0;
                    const paidFee = userData.paidFee || 0;
                    const pendingFee = totalFee - paidFee;

                    document.getElementById('feeTotal').innerText = "₹" + totalFee;
                    document.getElementById('feePaid').innerText = "₹" + paidFee;
                    document.getElementById('feePending').innerText = "₹" + pendingFee;

                } else {
                    alert("Profile data not found in database.");
                    window.location.href = "../index.html";
                }
            } catch (error) {
                console.error("Error loading profile: ", error);
            }
        } else {
            window.location.href = "../index.html";
        }
    });

    // Handle logout inside profile configuration
    document.getElementById('profileLogoutBtn').addEventListener('click', async () => {
        if(confirm("Are you sure you want to logout?")) {
            await signOut(auth);
            window.location.href = "../index.html";
        }
    });
</script>
</body>
</html>
