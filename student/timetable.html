<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timetable - AstraCampus</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; background-color: #f8fafc; } .no-scrollbar::-webkit-scrollbar { display: none; }</style>
</head>
<body class="pb-10">

<div class="bg-indigo-600 text-white px-5 py-5 rounded-b-[24px] shadow-md flex items-center gap-4 sticky top-0 z-50">
    <button onclick="window.location.href='dashboard.html'" class="text-white hover:text-indigo-100 transition text-lg active:scale-95">
        <i class="fas fa-arrow-left"></i>
    </button>
    <h1 class="text-lg font-bold">Class Timetable</h1>
</div>

<div class="max-w-md mx-auto mt-5">
    <div class="flex overflow-x-auto gap-2 px-5 pb-2 no-scrollbar" id="daySelector">
        <button class="day-btn active bg-indigo-600 text-white px-5 py-2 rounded-full text-sm font-bold shadow-sm shrink-0" data-day="Monday">Mon</button>
        <button class="day-btn bg-white text-slate-500 border border-slate-200 px-5 py-2 rounded-full text-sm font-bold shrink-0 transition" data-day="Tuesday">Tue</button>
        <button class="day-btn bg-white text-slate-500 border border-slate-200 px-5 py-2 rounded-full text-sm font-bold shrink-0 transition" data-day="Wednesday">Wed</button>
        <button class="day-btn bg-white text-slate-500 border border-slate-200 px-5 py-2 rounded-full text-sm font-bold shrink-0 transition" data-day="Thursday">Thu</button>
        <button class="day-btn bg-white text-slate-500 border border-slate-200 px-5 py-2 rounded-full text-sm font-bold shrink-0 transition" data-day="Friday">Fri</button>
        <button class="day-btn bg-white text-slate-500 border border-slate-200 px-5 py-2 rounded-full text-sm font-bold shrink-0 transition" data-day="Saturday">Sat</button>
    </div>

    <div class="px-5 mt-4 space-y-3" id="timetableContainer">
        <div class="bg-white p-6 rounded-[20px] shadow-sm border border-slate-100 text-center">
            <p class="text-sm text-slate-400 font-medium">Loading schedule...</p>
        </div>
    </div>
</div>

<script type="module">
    import { auth, db } from '../js/firebase-init.js';
    import { collection, query, where, onSnapshot, getDoc, doc } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-auth.js";

    const timetableContainer = document.getElementById('timetableContainer');
    const dayBtns = document.querySelectorAll('.day-btn');
    let currentDay = "Monday";
    let allSchedule = [];

    // Switch Day Logic
    dayBtns.forEach(btn => {
        btn.addEventListener('click', (e) => {
            dayBtns.forEach(b => {
                b.className = "day-btn bg-white text-slate-500 border border-slate-200 px-5 py-2 rounded-full text-sm font-bold shrink-0 transition";
            });
            e.target.className = "day-btn active bg-indigo-600 text-white px-5 py-2 rounded-full text-sm font-bold shadow-sm shrink-0";
            currentDay = e.target.getAttribute('data-day');
            renderTimetable();
        });
    });

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            const userDoc = await getDoc(doc(db, "users", user.uid));
            if (userDoc.exists()) {
                const { schoolId, class: studentClass } = userDoc.data();
                
                // Fetch Timetable
                const ttQuery = query(collection(db, "timetable"), where("schoolId", "==", schoolId), where("targetClass", "==", String(studentClass)));
                onSnapshot(ttQuery, (snapshot) => {
                    allSchedule = [];
                    snapshot.forEach(doc => allSchedule.push(doc.data()));
                    renderTimetable();
                });
            }
        }
    });

    function renderTimetable() {
        const todaySchedule = allSchedule.filter(s => s.day === currentDay);
        // Sort by time
        todaySchedule.sort((a, b) => a.time.localeCompare(b.time));

        if(todaySchedule.length === 0) {
            timetableContainer.innerHTML = `
                <div class="bg-white p-8 rounded-[20px] shadow-sm border border-slate-100 text-center">
                    <div class="w-16 h-16 bg-slate-50 rounded-full flex items-center justify-center text-slate-300 text-2xl mx-auto mb-3"><i class="fas fa-bed"></i></div>
                    <p class="text-sm text-slate-500 font-bold">No classes scheduled for ${currentDay}.</p>
                </div>`;
            return;
        }

        timetableContainer.innerHTML = "";
        todaySchedule.forEach((period, index) => {
            timetableContainer.innerHTML += `
                <div class="bg-white p-4 rounded-[20px] shadow-[0_2px_10px_-2px_rgba(0,0,0,0.02)] border border-slate-100 flex gap-4 items-center">
                    <div class="w-14 h-14 rounded-[14px] bg-indigo-50 border border-indigo-100 flex flex-col items-center justify-center shrink-0">
                        <span class="text-[10px] font-bold text-indigo-400 uppercase">Period</span>
                        <span class="text-lg font-black text-indigo-600">${index + 1}</span>
                    </div>
                    <div>
                        <h4 class="font-bold text-slate-800 text-base">${period.subject}</h4>
                        <p class="text-[11px] text-slate-500 font-medium mt-0.5"><i class="far fa-clock text-indigo-400 mr-1"></i> ${period.time}</p>
                        <p class="text-[10px] text-slate-400 font-bold uppercase tracking-wider mt-1.5"><i class="fas fa-user-tie mr-1"></i> ${period.teacher}</p>
                    </div>
                </div>
            `;
        });
    }
</script>
</body>
</html>
