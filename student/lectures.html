<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recorded Lectures - AstraCampus</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        #videoModal.flex { animation: fadeIn 0.2s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        #modalCard { animation: slideUp 0.25s ease-out; }
        @keyframes slideUp { from { transform: translateY(24px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
    <script src="https://fast.wistia.net/assets/external/E-v1.js" async></script>
</head>
<body class="pb-10">

<div class="bg-blue-600 text-white px-5 py-5 rounded-b-[24px] shadow-md flex items-center gap-4 sticky top-0 z-50">
    <button id="backBtn" class="text-white hover:text-blue-200 transition text-lg active:scale-95">
        <i class="fas fa-arrow-left"></i>
    </button>
    <h1 id="pageTitle" class="text-lg font-bold flex items-center gap-2 truncate">
        <i class="fas fa-play-circle"></i> Recorded Lectures
    </h1>
</div>

<div class="max-w-md mx-auto px-5 mt-6">
    <h3 class="font-bold text-slate-800 mb-4 text-sm px-1 flex items-center gap-2">
        <i class="fas fa-book-open text-slate-400"></i> Your Video Classes
    </h3>

    <div id="videoContainer" class="space-y-5">
        <div class="bg-white p-6 rounded-[20px] shadow-sm border border-slate-100 text-center">
            <p class="text-sm text-slate-400 font-medium"><i class="fas fa-spinner fa-spin mr-2"></i>Loading videos...</p>
        </div>
    </div>
</div>

<!-- Polished Video Modal -->
<div id="videoModal" class="fixed inset-0 z-[999] bg-black/80 backdrop-blur-sm hidden flex-col items-center justify-center px-4">
    <div id="modalCard" class="w-full max-w-md bg-slate-900 rounded-[20px] overflow-hidden shadow-2xl">

        <!-- Header bar -->
        <div class="flex items-center justify-between px-4 py-3 bg-slate-900 border-b border-white/10">
            <h3 id="modalTitle" class="text-white font-bold text-sm truncate pr-3">Lecture Video</h3>
            <button onclick="closeVideo()" class="w-9 h-9 shrink-0 bg-white/10 hover:bg-white/20 rounded-full text-white flex items-center justify-center transition active:scale-90">
                <i class="fas fa-times text-base"></i>
            </button>
        </div>

        <!-- Player area -->
        <div class="w-full relative bg-black" id="modalPlayerContainer" style="aspect-ratio: 16/9;">
            <div class="absolute inset-0 flex items-center justify-center text-white/60 text-xs">
                <i class="fas fa-spinner fa-spin mr-2"></i> Loading player...
            </div>
        </div>

    </div>
</div>

<script type="module">
    import { auth, db } from '../js/firebase-init.js';
    import { collection, query, where, onSnapshot, getDoc, doc } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-auth.js";

    const videoContainer = document.getElementById('videoContainer');
    const videoModal = document.getElementById('videoModal');
    const modalPlayerContainer = document.getElementById('modalPlayerContainer');
    const modalTitle = document.getElementById('modalTitle');
    const pageTitle = document.getElementById('pageTitle');
    const backBtn = document.getElementById('backBtn');

    const params = new URLSearchParams(window.location.search);
    const selectedCourse = params.get('course');
    const selectedSubject = params.get('subject');

    if (!selectedCourse || !selectedSubject) {
        window.location.href = "courses.html";
    } else {
        pageTitle.innerHTML = `<i class="fas fa-play-circle"></i> <span class="truncate">${selectedSubject}</span>`;
        backBtn.onclick = () => {
            window.location.href = `course-subjects.html?course=${encodeURIComponent(selectedCourse)}`;
        };
    }

    window.startVideo = function (wistiaId, title) {
        modalTitle.innerText = title;
        videoModal.classList.remove('hidden');
        videoModal.classList.add('flex');
        document.body.style.overflow = 'hidden';

        modalPlayerContainer.innerHTML = `
            <div class="wistia_embed wistia_async_${wistiaId} seo=false videoFoam=false autoPlay=true playsinline=true" style="height:100%;width:100%;position:relative;">
            </div>
        `;

        // Jab Wistia player fullscreen mein jaaye, to landscape orientation lock try karo
        document.addEventListener('fullscreenchange', handleFullscreenChange);
        document.addEventListener('webkitfullscreenchange', handleFullscreenChange);
    };

    function handleFullscreenChange() {
        const isFullscreen = document.fullscreenElement || document.webkitFullscreenElement;
        if (isFullscreen) {
            // Mobile browsers (Chrome Android) par landscape lock supported hota hai
            if (screen.orientation && screen.orientation.lock) {
                screen.orientation.lock('landscape').catch(() => {
                    // Kuch browsers (jaise iOS Safari) lock support nahi karte - silently ignore
                });
            }
        } else {
            if (screen.orientation && screen.orientation.unlock) {
                try { screen.orientation.unlock(); } catch (e) {}
            }
        }
    }

    window.closeVideo = function () {
        videoModal.classList.add('hidden');
        videoModal.classList.remove('flex');
        modalPlayerContainer.innerHTML = "";
        document.body.style.overflow = '';
        document.removeEventListener('fullscreenchange', handleFullscreenChange);
        document.removeEventListener('webkitfullscreenchange', handleFullscreenChange);
        if (screen.orientation && screen.orientation.unlock) {
            try { screen.orientation.unlock(); } catch (e) {}
        }
    };

    // Tap outside the card closes the modal
    videoModal.addEventListener('click', (e) => {
        if (e.target === videoModal) closeVideo();
    });

    function showEmpty() {
        videoContainer.innerHTML = `
            <div class="bg-white p-8 rounded-[20px] border text-center shadow-sm">
                <div class="w-16 h-16 bg-slate-50 rounded-full flex items-center justify-center text-slate-300 text-2xl mx-auto mb-3"><i class="fas fa-video-slash"></i></div>
                <p class="text-sm text-slate-500 font-bold">No lectures uploaded for ${selectedSubject} yet.</p>
            </div>`;
    }

    function showError(message) {
        videoContainer.innerHTML = `
            <div class="bg-red-50 p-6 rounded-[20px] border border-red-100 text-center">
                <p class="text-xs text-red-500 font-bold break-words">${message}</p>
            </div>`;
    }

    onAuthStateChanged(auth, async (user) => {
        if (!user) {
            window.location.href = "../index.html";
            return;
        }

        try {
            const userDoc = await getDoc(doc(db, "users", user.uid));
            if (!userDoc.exists()) return showError("User profile not found in database.");

            const userData = userDoc.data();
            const schoolId = String(userData.schoolId || "").trim();
            const studentClass = String(userData.class || "").trim();

            const q = query(collection(db, "videos"), where("schoolId", "==", schoolId));

            onSnapshot(
                q,
                (snapshot) => {
                    let videos = [];
                    snapshot.forEach((d) => {
                        const data = d.data();
                        if (
                            String(data.targetClass || "").trim() === studentClass &&
                            data.course === selectedCourse &&
                            data.subject === selectedSubject
                        ) {
                            videos.push({ id: d.id, ...data });
                        }
                    });

                    if (videos.length === 0) return showEmpty();

                    videos.sort((a, b) => (b.createdAt?.toMillis() || 0) - (a.createdAt?.toMillis() || 0));

                    videoContainer.innerHTML = "";
                    videos.forEach((video) => {
                        const safeTitle = (video.title || "Untitled").replace(/'/g, "\\'");

                        videoContainer.innerHTML += `
                            <div class="bg-white rounded-[20px] shadow-sm border border-slate-100 overflow-hidden mb-5">

                                <div onclick="startVideo('${video.wistiaId}', '${safeTitle}')" class="w-full relative bg-slate-900 cursor-pointer group" style="aspect-ratio: 16/9;">
                                    <img src="https://fast.wistia.com/embed/medias/${video.wistiaId}/swatch" class="absolute inset-0 w-full h-full object-cover opacity-90 group-active:opacity-100 transition">
                                    <div class="absolute inset-0 bg-gradient-to-t from-black/60 via-transparent to-black/10"></div>

                                    <div class="absolute top-3 left-3 bg-blue-600/90 backdrop-blur-sm text-white text-[10px] font-bold px-3 py-1 rounded-full uppercase tracking-wider shadow-md">
                                        ${video.subject}
                                    </div>

                                    <div class="absolute inset-0 flex items-center justify-center">
                                        <div class="w-14 h-14 bg-white/20 backdrop-blur-md border border-white/50 rounded-full flex items-center justify-center text-white shadow-xl transition transform group-active:scale-90">
                                            <i class="fas fa-play text-xl ml-1"></i>
                                        </div>
                                    </div>
                                </div>

                                <div class="p-4 flex justify-between items-center">
                                    <div>
                                        <h4 class="font-bold text-slate-800 text-sm leading-tight mb-1">${video.title}</h4>
                                        <p class="text-[11px] text-slate-500 font-bold uppercase tracking-wide">
                                            ${video.teacherName ? `<i class="fas fa-user mr-1"></i>${video.teacherName} &middot; ` : ''}<i class="fas fa-chalkboard-teacher mr-1"></i>Class ${video.targetClass}
                                        </p>
                                    </div>
                                </div>

                            </div>
                        `;
                    });
                },
                (error) => showError("Error loading videos: " + error.message)
            );
        } catch (err) {
            showError("Error: " + err.message);
        }
    });
</script>
</body>
</html>
