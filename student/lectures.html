<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recorded Lectures - AstraCampus</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }</style>
    <script src="https://fast.wistia.net/assets/external/E-v1.js" async></script>
</head>
<body class="pb-10">

<div class="bg-blue-600 text-white px-5 py-5 rounded-b-[24px] shadow-md flex items-center gap-4 sticky top-0 z-50">
    <button onclick="window.location.href='dashboard.html'" class="text-white hover:text-blue-200 transition text-lg active:scale-95">
        <i class="fas fa-arrow-left"></i>
    </button>
    <h1 class="text-lg font-bold flex items-center gap-2">
        <i class="fas fa-play-circle"></i> Recorded Lectures
    </h1>
</div>

<div class="max-w-md mx-auto px-5 mt-6">
    <h3 class="font-bold text-slate-800 mb-4 text-sm px-1 flex items-center gap-2">
        <i class="fas fa-book-open text-slate-400"></i> Your Video Classes
    </h3>
    
    <div id="videoContainer" class="space-y-5">
        <div class="bg-white p-6 rounded-[20px] shadow-sm border border-slate-100 text-center">
            <p class="text-sm text-slate-400 font-medium"><i class="fas fa-spinner fa-spin mr-2"></i>Loading videos...</p>
        </div>
    </div>
</div>

<script type="module">
    // Dhyan de: Agar JS folder alag hai to path './js/firebase-init.js' rakhein
    import { auth, db } from './js/firebase-init.js'; 
    import { collection, query, where, onSnapshot, getDoc, doc } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-auth.js";

    const videoContainer = document.getElementById('videoContainer');

    function showEmpty(studentClass) {
        videoContainer.innerHTML = `
            <div class="bg-white p-8 rounded-[20px] border text-center shadow-sm">
                <div class="w-16 h-16 bg-slate-50 rounded-full flex items-center justify-center text-slate-300 text-2xl mx-auto mb-3"><i class="fas fa-video-slash"></i></div>
                <p class="text-sm text-slate-500 font-bold">No lectures uploaded for Class ${studentClass} yet.</p>
                <p class="text-xs text-slate-400 mt-2">Agar class ${studentClass} ka video upload kiya hai aur nahi dikh raha, toh admin se school ID check karwao.</p>
            </div>`;
    }

    function showError(message) {
        videoContainer.innerHTML = `
            <div class="bg-red-50 p-6 rounded-[20px] border border-red-100 text-center">
                <div class="w-12 h-12 bg-red-100 rounded-full flex items-center justify-center text-red-400 text-xl mx-auto mb-3"><i class="fas fa-exclamation-triangle"></i></div>
                <p class="text-xs text-red-500 font-bold break-words">${message}</p>
            </div>`;
    }

    onAuthStateChanged(auth, async (user) => {
        if (!user) {
            // Agar bina login ke aaya to wapas login page par bhej do
            window.location.href = "index.html";
            return;
        }

        try {
            const userDoc = await getDoc(doc(db, "users", user.uid));
            if (!userDoc.exists()) {
                showError("User profile not found in database.");
                return;
            }

            const userData = userDoc.data();
            // .trim() lagaya hai taaki galti se aaya extra space hat jaye
            const schoolId = String(userData.schoolId || "").trim();
            const studentClass = String(userData.class || "").trim();

            if (!schoolId || !studentClass) {
                showError("Aapki profile mein School ID ya Class missing hai.");
                return;
            }

            // Sirf schoolId se query kar rahe hain
            const q = query(collection(db, "videos"), where("schoolId", "==", schoolId));

            onSnapshot(
                q,
                (snapshot) => {
                    let videos = [];
                    snapshot.forEach((d) => {
                        const data = d.data();
                        // Video ki class ko bhi trim kar rahe hain
                        const videoTargetClass = String(data.targetClass || "").trim();
                        
                        // Sirf wahi video dikhao jo is bacche ki class ka hai
                        if (videoTargetClass === studentClass) {
                            videos.push({ id: d.id, ...data });
                        }
                    });

                    if (videos.length === 0) {
                        showEmpty(studentClass);
                        return;
                    }

                    // Naya video sabse upar dikhega
                    videos.sort((a, b) => (b.createdAt?.toMillis() || 0) - (a.createdAt?.toMillis() || 0));

                    videoContainer.innerHTML = "";
                    videos.forEach((video) => {
                        videoContainer.innerHTML += `
                            <div class="bg-white rounded-[20px] shadow-sm border border-slate-100 overflow-hidden">
                                <div class="w-full bg-black relative" style="padding-top: 56.25%;">
                                    <iframe src="https://fast.wistia.net/embed/iframe/${video.wistiaId}?videoFoam=true" 
                                            title="${video.title}" 
                                            allowtransparency="true" frameborder="0" scrolling="no" 
                                            class="wistia_embed absolute top-0 left-0 w-full h-full" 
                                            name="wistia_embed" allowfullscreen mozallowfullscreen webkitallowfullscreen oallowfullscreen msallowfullscreen>
                                    </iframe>
                                </div>
                                <div class="p-4 flex items-center justify-between gap-3">
                                    <div>
                                        <div class="flex items-center gap-2 mb-1.5">
                                            <span class="bg-blue-100 text-blue-700 text-[10px] font-bold px-2 py-0.5 rounded-full uppercase tracking-wide">${video.subject}</span>
                                        </div>
                                        <h4 class="font-bold text-slate-800 text-sm leading-tight">${video.title}</h4>
                                    </div>
                                    <div class="w-10 h-10 rounded-full bg-slate-50 flex items-center justify-center text-slate-400 shrink-0">
                                        <i class="fas fa-play"></i>
                                    </div>
                                </div>
                            </div>
                        `;
                    });
                },
                (error) => {
                    showError("Error loading videos: " + error.message);
                }
            );
        } catch (err) {
            showError("Error: " + err.message);
        }
    });
</script>
</body>
</html>
