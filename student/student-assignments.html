<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Portal - Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen pb-20 font-sans">

    <div class="bg-gradient-to-b from-blue-700 to-blue-600 h-40 rounded-b-[2.5rem] relative flex flex-col items-center pt-6 text-white shadow-md">
        <div class="bg-white/20 backdrop-blur-md px-4 py-1.5 rounded-full text-xs font-semibold tracking-wide">
            ID: <span class="font-bold">N/A</span> | Class 10 A
        </div>
        
        <div class="absolute -bottom-10 w-24 h-24 bg-white rounded-full p-1 shadow-lg border border-gray-100">
            <div class="w-full h-full bg-blue-100 rounded-full flex items-center justify-center overflow-hidden">
                <svg class="w-16 h-16 text-blue-500 mt-2" fill="currentColor" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
            </div>
        </div>
    </div>

    <div class="max-w-md mx-auto grid grid-cols-3 gap-3 px-4 mt-16 text-center">
        <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 flex flex-col items-center">
            <span class="text-xl font-bold text-red-500">0%</span>
            <span class="text-[10px] text-gray-400 font-bold uppercase tracking-wider mt-1">Attendance</span>
        </div>
        <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 flex flex-col items-center">
            <span class="text-xl font-bold text-orange-500">0</span>
            <span class="text-[10px] text-gray-400 font-bold uppercase tracking-wider mt-1">Pending HW</span>
        </div>
        <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 flex flex-col items-center">
            <span class="text-xl font-bold text-purple-500">1</span>
            <span class="text-[10px] text-gray-400 font-bold uppercase tracking-wider mt-1">Upc. Tests</span>
        </div>
    </div>

    <div class="max-w-md mx-auto px-4 mt-8">
        <h2 class="text-lg font-bold text-gray-800 mb-4">Quick Access</h2>
        <div class="grid grid-cols-3 gap-3">
            
            <a href="live-class.html" class="bg-red-50/60 border border-red-100/50 p-4 rounded-2xl flex flex-col items-center justify-center text-center shadow-sm">
                <span class="text-2xl text-red-500">📹</span>
                <span class="text-xs font-semibold text-gray-700 mt-2">Live Class</span>
            </a>

            <a href="student-dashboard.html" class="bg-blue-50/60 border border-blue-100/50 p-4 rounded-2xl flex flex-col items-center justify-center text-center shadow-sm">
                <span class="text-2xl text-blue-500">📖</span>
                <span class="text-xs font-semibold text-gray-700 mt-2">Materials</span>
            </a>

            <a href="student-assignments.html" class="bg-green-50/60 border border-green-100/50 p-4 rounded-2xl flex flex-col items-center justify-center text-center shadow-sm">
                <span class="text-2xl text-green-500">📋</span>
                <span class="text-xs font-semibold text-gray-700 mt-2">Assignments</span>
            </a>

            <a href="#" class="bg-purple-50/60 border border-purple-100/50 p-4 rounded-2xl flex flex-col items-center justify-center text-center shadow-sm">
                <span class="text-2xl text-purple-500">💻</span>
                <span class="text-xs font-semibold text-gray-700 mt-2">Mock Tests</span>
            </a>

            <a href="#" class="bg-orange-50/60 border border-orange-100/50 p-4 rounded-2xl flex flex-col items-center justify-center text-center shadow-sm">
                <span class="text-2xl text-orange-500">🏆</span>
                <span class="text-xs font-semibold text-gray-700 mt-2">Results</span>
            </a>

            <a href="#" class="bg-teal-50/60 border border-teal-100/50 p-4 rounded-2xl flex flex-col items-center justify-center text-center shadow-sm">
                <span class="text-2xl text-teal-500">💳</span>
                <span class="text-xs font-semibold text-gray-700 mt-2">Fees</span>
            </a>

        </div>
    </div>

    <div class="max-w-md mx-auto px-4 mt-8">
        <h2 class="text-lg font-bold text-gray-800 mb-3">Today's Schedule</h2>
        <div class="bg-white p-5 rounded-2xl border border-gray-100 shadow-sm text-center">
            <p class="text-sm text-gray-400 font-medium">Loading classes...</p>
        </div>
    </div>

    <div class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-100 py-2 shadow-xl flex justify-around items-center max-w-md mx-auto">
        <a href="#" class="flex flex-col items-center text-blue-600 font-bold text-[10px]">
            <span>🏠</span><span>Home</span>
        </a>
        <a href="#" class="flex flex-col items-center text-gray-400 text-[10px]">
            <span>📺</span><span>Classes</span>
        </a>
        <a href="#" class="flex flex-col items-center text-gray-400 text-[10px]">
            <span>📝</span><span>Tests</span>
        </a>
        <a href="#" class="flex flex-col items-center text-gray-400 text-[10px]">
            <span>🔔</span><span>Notices</span>
        </a>
        <a href="#" class="flex flex-col items-center text-gray-400 text-[10px]">
            <span>👤</span><span>Profile</span>
        </a>
    </div>

</body>
</html>
