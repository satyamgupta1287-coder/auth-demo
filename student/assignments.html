<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student - Assignments</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://upload-widget.cloudinary.com/global/all.js" type="text/javascript"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .skeleton { animation: pulse 1.5s infinite; background: #e5e7eb; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body class="bg-gray-50 min-h-screen font-sans pb-20">

    <header class="bg-gradient-to-r from-green-600 to-teal-600 p-6 text-white shadow-md rounded-b-[2.5rem] mb-6 flex items-center gap-4 relative">
        <button onclick="window.location.href='dashboard.html'" class="bg-white/20 hover:bg-white/30 p-2 rounded-xl backdrop-blur-sm transition">
            <i class="fas fa-arrow-left"></i>
        </button>
        <div>
            <h1 class="text-2xl font-bold">My Assignments</h1>
            <p class="text-xs text-green-100 mt-0.5">Track Submissions & View Marks</p>
        </div>
    </header>

    <div id="uploadAlert" class="max-w-md mx-auto px-4 hidden mb-4">
        <div class="bg-green-50 border border-green-200 text-green-700 px-4 py-3 rounded-2xl text-sm font-bold flex items-center gap-2">
            <i class="fas fa-check-circle text-green-500 text-lg"></i>
            <span>Assignment submitted successfully!</span>
        </div>
    </div>

    <main id="assignList" class="max-w-md mx-auto px-4 space-y-4">
        <div class="skeleton w-full h-32 rounded-2xl"></div>
        <div class="skeleton w-full h-32 rounded-2xl"></div>
    </main>

<script type="module">
    import { auth, db } from '../js/firebase-init.js'; 
    import { collection, query, onSnapshot, orderBy, addDoc, serverTimestamp, getDoc, doc, where } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-auth.js";

    let currentUserData = null;
    let currentAssignId = "";
    let studentSubmissions = {}; // Student ke saare submissions yahan store honge
    const assignList = document.getElementById('assignList');
    const uploadAlert = document.getElementById('uploadAlert');

    // 1. Check Login & Setup Realtime Submissions Listener
    onAuthStateChanged(auth, async (user) => {
        if(user) {
            const userSnap = await getDoc(doc(db, "users", user.uid));
            if(userSnap.exists()) {
                currentUserData = userSnap.data();
                
                // Student ke apne submissions ka live tracker
                const subQuery = query(collection(db, "submissions"), where("studentId", "==", user.uid));
                onSnapshot(subQuery, (subSnapshot) => {
                    studentSubmissions = {};
                    subSnapshot.forEach(d => {
                        const data = d.data();
                        studentSubmissions[data.assignmentId] = data;
                    });
                    
                    // Submissions map hone ke baad assignments load karenge
                    loadAssignments();
                });

            } else {
                assignList.innerHTML = `<p class="text-center text-red-500 mt-10">User data not found!</p>`;
            }
        } else {
            alert("Please login first!");
            window.location.href = "../index.html";
        }
    });

    // 2. Cloudinary Setup for Student Upload
    const submitWidget = cloudinary.createUploadWidget({
        cloudName: 'dl1cddemu', 
        uploadPreset: 'upload', 
        resourceType: 'raw',
        clientAllowedFormats: ["pdf", "jpg", "png"]
    }, async (err, result) => {
        if (!err && result && result.event === "success") {
            try {
                let rawUrl = result.info.secure_url;
                let finalUrl = rawUrl.includes('/upload/') ? rawUrl.replace('/upload/', '/upload/fl_attachment/') : rawUrl;

                await addDoc(collection(db, "submissions"), {
                    assignmentId: currentAssignId,
                    studentId: auth.currentUser.uid,
                    studentName: currentUserData.name || currentUserData.firstName || "Unknown Student",
                    className: currentUserData.class || "N/A",
                    fileUrl: finalUrl,
                    marks: "Pending", 
                    submittedAt: serverTimestamp()
                });
                
                uploadAlert.classList.remove('hidden');
                setTimeout(() => uploadAlert.classList.add('hidden'), 4000);

            } catch (error) {
                alert("Database Error: " + error.message);
            }
        }
    });

    window.openUpload = (assignId) => {
        currentAssignId = assignId;
        submitWidget.open();
    };

    // 3. Load Assignments & Mix Submission Data
    function loadAssignments() {
        const targetClassStr = currentUserData ? String(currentUserData.class) : "";
        const q = query(collection(db, "assignments"), orderBy("createdAt", "desc"));
        
        onSnapshot(q, (snapshot) => {
            assignList.innerHTML = "";
            
            // Filter classes manually to handle both string/number safely
            const filteredDocs = snapshot.docs.filter(docSnap => {
                const item = docSnap.data();
                const itemClass = item.targetClass || item.className || "";
                return String(itemClass) === targetClassStr;
            });

            if(filteredDocs.length === 0) {
                assignList.innerHTML = `
                    <div class="bg-white p-8 rounded-3xl shadow-sm border border-gray-100 text-center mt-6">
                        <i class="fas fa-clipboard-check text-4xl text-green-200 mb-3"></i>
                        <p class="text-gray-800 font-bold text-lg">All Caught Up!</p>
                        <p class="text-sm text-gray-400 mt-1">No assignments found for your class.</p>
                    </div>`;
                return;
            }

            filteredDocs.forEach((docSnap) => {
                const item = docSnap.data();
                const assignId = docSnap.id;
                
                const rawQnUrl = item.fileUrl || "#";
                const qnUrl = rawQnUrl.includes('/upload/') ? rawQnUrl.replace('/upload/', '/upload/fl_attachment/') : rawQnUrl;

                // Check submission status and marks for THIS assignment
                const subInfo = studentSubmissions[assignId];
                
                let statusBadge = `<div class="absolute top-0 right-0 bg-blue-50 text-blue-600 text-[10px] font-bold px-3 py-1 rounded-bl-xl border-l border-b border-blue-100">Pending</div>`;
                let marksHtml = "";
                let actionButtonHtml = `
                    <button onclick="openUpload('${assignId}')" class="flex-1 bg-green-500 hover:bg-green-600 text-white py-2.5 rounded-xl font-bold text-xs shadow-md shadow-green-500/20 flex items-center justify-center gap-2 transition">
                        <i class="fas fa-upload"></i> Upload Ans
                    </button>
                `;

                if (subInfo) {
                    if (subInfo.marks === "Pending") {
                        statusBadge = `<div class="absolute top-0 right-0 bg-yellow-50 text-yellow-700 text-[10px] font-bold px-3 py-1 rounded-bl-xl border-l border-b border-yellow-100">Submitted</div>`;
                        actionButtonHtml = `
                            <button onclick="openUpload('${assignId}')" class="flex-1 bg-amber-500 hover:bg-amber-600 text-white py-2.5 rounded-xl font-bold text-xs shadow-md transition">
                                <i class="fas fa-edit"></i> Re-upload Ans
                            </button>
                        `;
                    } else {
                        // Jab admin ne marks de diye hon
                        statusBadge = `<div class="absolute top-0 right-0 bg-green-50 text-green-700 text-[10px] font-bold px-3 py-1 rounded-bl-xl border-l border-b border-green-100">Checked</div>`;
                        
                        marksHtml = `
                            <div class="mt-3 bg-green-50 border border-green-200/60 p-3 rounded-xl flex justify-between items-center">
                                <span class="text-xs font-bold text-green-700"><i class="fas fa-star mr-1"></i> Your Score:</span>
                                <span class="text-sm font-black text-green-800 bg-white px-2.5 py-0.5 rounded-md border border-green-300">${subInfo.marks}</span>
                            </div>
                        `;

                        actionButtonHtml = `
                            <button disabled class="flex-1 bg-gray-100 text-gray-400 py-2.5 rounded-xl font-bold text-xs cursor-not-allowed flex items-center justify-center gap-2">
                                <i class="fas fa-lock"></i> Submission Locked
                            </button>
                        `;
                    }
                }

                assignList.innerHTML += `
                    <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 mb-4 relative overflow-hidden transition-all hover:shadow-md">
                        ${statusBadge}
                        
                        <h3 class="font-bold text-gray-800 text-lg pr-20">${item.title || 'Untitled'}</h3>
                        ${item.description ? `<p class="text-xs text-gray-500 mt-1 line-clamp-2">${item.description}</p>` : ''}
                        
                        ${marksHtml}
                        
                        <div class="mt-4 flex gap-2">
                            ${item.fileUrl ? `
                                <a href="${qnUrl}" target="_blank" class="flex-1 bg-gray-50 text-gray-700 border border-gray-200 hover:bg-gray-100 py-2.5 rounded-xl font-bold text-center text-xs flex items-center justify-center gap-2 transition">
                                    <i class="fas fa-download text-gray-500"></i> View Qns
                                </a>
                            ` : ''}
                            
                            ${actionButtonHtml}
                        </div>
                    </div>
                `;
            });
        });
    }
</script>
</body>
</html>
