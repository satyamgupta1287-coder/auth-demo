<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notifications</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-4">

<div class="max-w-md mx-auto bg-white rounded-2xl shadow-sm p-6 min-h-[80vh]">
    <h2 class="text-xl font-bold text-gray-800 mb-6">School Notices</h2>
    <div id="noticeList" class="space-y-4">
        </div>
</div>

<script type="module">
    import { db } from '../js/firebase-init.js';
    import { collection, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";

    const q = query(collection(db, "notices"), orderBy("createdAt", "desc"));
    onSnapshot(q, (snapshot) => {
        const list = document.getElementById('noticeList');
        list.innerHTML = "";
        snapshot.forEach((doc) => {
            const data = doc.data();
            list.innerHTML += `
                <div class="border-l-4 border-blue-500 bg-blue-50 p-4 rounded-r-xl">
                    <h4 class="font-bold text-blue-900">${data.title}</h4>
                    <p class="text-sm text-blue-700 mt-1">${data.message}</p>
                </div>
            `;
        });
    });
</script>
</body>
</html>
