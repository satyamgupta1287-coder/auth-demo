<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-4">

<div class="max-w-md mx-auto bg-white rounded-2xl shadow-sm p-6">
    <h2 class="text-xl font-bold text-gray-800 mb-6">Attendance Record</h2>
    
    <div class="flex justify-around mb-8">
        <div class="text-center">
            <h4 class="text-2xl font-bold text-green-500" id="presentCount">0</h4>
            <p class="text-xs text-gray-500">Present</p>
        </div>
        <div class="text-center">
            <h4 class="text-2xl font-bold text-red-500" id="absentCount">0</h4>
            <p class="text-xs text-gray-500">Absent</p>
        </div>
    </div>

    <div id="attendanceList" class="space-y-3">
        </div>
</div>

<script type="module">
    import { auth, db } from '../js/firebase-init.js';
    import { collection, query, where, onSnapshot } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-auth.js";

    onAuthStateChanged(auth, (user) => {
        if (user) {
            const q = query(collection(db, "attendance"), where("studentId", "==", user.uid));
            onSnapshot(q, (snapshot) => {
                let present = 0, absent = 0;
                const list = document.getElementById('attendanceList');
                list.innerHTML = "";

                snapshot.forEach((doc) => {
                    const data = doc.data();
                    if(data.status === "present") present++; else absent++;
                    
                    list.innerHTML += `
                        <div class="flex justify-between items-center p-3 border rounded-xl">
                            <span class="text-sm font-medium">${data.date}</span>
                            <span class="px-3 py-1 rounded-full text-xs font-bold ${data.status === 'present' ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}">
                                ${data.status.toUpperCase()}
                            </span>
                        </div>
                    `;
                });
                document.getElementById('presentCount').innerText = present;
                document.getElementById('absentCount').innerText = absent;
            });
        }
    });
</script>
</body>
</html>
