<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .hidden { display: none; }
        .dashboard-section { border: 1px solid #ccc; padding: 20px; margin-top: 20px; border-radius: 5px; }
        .admin-panel { background-color: #f8f9fa; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background-color: #f2f2f2; }
        input, select, button { padding: 8px; margin: 5px 0; }
        .btn { background-color: #007bff; color: white; border: none; cursor: pointer; border-radius: 4px; }
        .btn-success { background-color: #28a745; }
        .btn-danger { background-color: #dc3545; }
    </style>
</head>
<body>

    <h2>Welcome to the Dashboard</h2>

    <div id="authSection">
        <button id="loginBtn" class="btn" onclick="loginWithGoogle()">Login with Google</button>
        <button id="logoutBtn" class="btn btn-danger hidden" onclick="logout()">Logout</button>
        <p id="userInfo"></p>
    </div>

    <div id="studentDashboard" class="dashboard-section hidden">
        <h3>🎓 Student Dashboard</h3>
        <p>Welcome Student! Here is your content.</p>
    </div>

    <div id="teacherDashboard" class="dashboard-section hidden">
        <h3>👨‍🏫 Teacher Dashboard</h3>
        <p>Welcome Teacher! Here you can manage your classes.</p>
    </div>

    <div id="adminDashboard" class="dashboard-section admin-panel hidden">
        <h3>⚙️ Admin Panel</h3>
        <p>Welcome Admin! You have full access.</p>

        <div style="background: #fff; padding: 15px; border: 1px solid #ddd; margin-bottom: 20px;">
            <h4>Add New User (नया यूजर जोड़ें)</h4>
            <input type="text" id="newUserName" placeholder="User's Name" required>
            <input type="email" id="newUserEmail" placeholder="User's Email" required>
            <select id="newUserRole">
                <option value="student">Student</option>
                <option value="teacher">Teacher</option>
                <option value="admin">Admin</option>
            </select>
            <button class="btn btn-success" onclick="addNewUser()">Add User</button>
        </div>

        <h4>All Users</h4>
        <table>
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Role</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="usersTableBody">
                </tbody>
        </table>
    </div>

    <script>
        // तुम्हारी Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyCqSMjr5__HNV-LXZi5vQvGzfBQ46lRFNA",
            authDomain: "auth-demo-f8ae4.firebaseapp.com",
            projectId: "auth-demo-f8ae4",
            storageBucket: "auth-demo-f8ae4.firebasestorage.app",
            messagingSenderId: "245702722359",
            appId: "1:245702722359:web:c669123eb90a1d282290b2",
            measurementId: "G-DJ4TS9FBX6"
        };

        // Initialize Firebase
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const auth = firebase.auth();
        const db = firebase.firestore();

        // --- Authentication Functions ---
        function loginWithGoogle() {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider).catch((error) => {
                console.error("Login failed:", error);
            });
        }

        function logout() {
            auth.signOut();
        }

        // --- Track User State ---
        auth.onAuthStateChanged((user) => {
            if (user) {
                // User is logged in
                document.getElementById('loginBtn').classList.add('hidden');
                document.getElementById('logoutBtn').classList.remove('hidden');
                document.getElementById('userInfo').innerText = `Logged in as: ${user.email}`;
                
                // Check user role in Firestore
                checkUserRole(user);
            } else {
                // User is logged out
                document.getElementById('loginBtn').classList.remove('hidden');
                document.getElementById('logoutBtn').classList.add('hidden');
                document.getElementById('userInfo').innerText = "";
                hideAllDashboards();
            }
        });

        // --- Check Role and Show Dashboard ---
        function checkUserRole(user) {
            const userRef = db.collection('users').doc(user.email);
            
            userRef.get().then((doc) => {
                if (doc.exists) {
                    const userData = doc.data();
                    const role = userData.role;
                    showDashboard(role);
                    
                    if (role === 'admin') {
                        loadAllUsers(); // Only load users if admin
                    }
                } else {
                    // If new user, default to student
                    userRef.set({
                        name: user.displayName,
                        email: user.email,
                        role: 'student',
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    }).then(() => {
                        showDashboard('student');
                    });
                }
            }).catch((error) => {
                console.error("Error fetching user data:", error);
            });
        }

        function hideAllDashboards() {
            document.getElementById('studentDashboard').classList.add('hidden');
            document.getElementById('teacherDashboard').classList.add('hidden');
            document.getElementById('adminDashboard').classList.add('hidden');
        }

        function showDashboard(role) {
            hideAllDashboards();
            if (role === 'admin') {
                document.getElementById('adminDashboard').classList.remove('hidden');
            } else if (role === 'teacher') {
                document.getElementById('teacherDashboard').classList.remove('hidden');
            } else {
                document.getElementById('studentDashboard').classList.remove('hidden');
            }
        }

        // --- Admin Functions ---

        // 1. Load All Users
        function loadAllUsers() {
            db.collection('users').onSnapshot((querySnapshot) => {
                const tableBody = document.getElementById('usersTableBody');
                tableBody.innerHTML = ''; // Clear old data

                querySnapshot.forEach((doc) => {
                    const user = doc.data();
                    const email = doc.id;
                    
                    const row = `
                        <tr>
                            <td>${user.name}</td>
                            <td>${user.email}</td>
                            <td>
                                <select id="role-${email}">
                                    <option value="student" ${user.role === 'student' ? 'selected' : ''}>Student</option>
                                    <option value="teacher" ${user.role === 'teacher' ? 'selected' : ''}>Teacher</option>
                                    <option value="admin" ${user.role === 'admin' ? 'selected' : ''}>Admin</option>
                                </select>
                            </td>
                            <td>
                                <button class="btn" onclick="updateRole('${email}')">Update</button>
                            </td>
                        </tr>
                    `;
                    tableBody.innerHTML += row;
                });
            });
        }

        // 2. Update Existing User Role
        function updateRole(email) {
            const newRole = document.getElementById(`role-${email}`).value;
            db.collection('users').doc(email).update({
                role: newRole
            }).then(() => {
                alert("Role updated successfully!");
            }).catch((error) => {
                console.error("Error updating role:", error);
            });
        }

        // 3. Add New User Manually
        function addNewUser() {
            const name = document.getElementById('newUserName').value;
            const email = document.getElementById('newUserEmail').value;
            const role = document.getElementById('newUserRole').value;

            if (name === "" || email === "") {
                alert("Please enter both name and email!");
                return;
            }

            db.collection('users').doc(email).set({
                name: name,
                email: email,
                role: role,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            })
            .then(() => {
                alert("New user added successfully!");
                document.getElementById('newUserName').value = '';
                document.getElementById('newUserEmail').value = '';
                // List will update automatically because we used onSnapshot in loadAllUsers()
            })
            .catch((error) => {
                console.error("Error adding user: ", error);
                alert("Error adding user. Check console.");
            });
        }
    </script>
</body>
</html>
