<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Doubts</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 p-4 font-sans pb-24">

<div class="max-w-md mx-auto">
    <div class="flex justify-between items-center bg-white p-4 rounded-2xl shadow-sm mb-4">
        <button onclick="window.location.href='admin.html'" class="text-gray-500 hover:text-indigo-600 transition">
            <i class="fas fa-arrow-left text-xl"></i>
        </button>
        <h1 class="text-xl font-bold text-gray-800">Student Doubts</h1>
        <div></div>
    </div>

    <div class="bg-white rounded-2xl shadow-sm p-5 mb-6 border-t-4 border-indigo-500">
        <label class="block text-sm font-bold text-gray-700 mb-2"><i class="fas fa-filter text-indigo-500 mr-2"></i>Filter by Status</label>
        <select id="statusFilter" class="w-full p-3 border border-gray-200 rounded-xl outline-none bg-gray-50 focus:ring-2 focus:ring-indigo-500 font-medium text-sm">
            <option value="All">All Doubts</option>
            <option value="Pending" selected>Pending (Needs Reply)</option>
            <option value="Resolved">Resolved (Answered)</option>
        </select>
    </div>

    <div class="bg-white rounded-2xl shadow-sm p-6">
        <div class="flex justify-between items-center mb-4 border-b pb-2">
            <h2 class="text-lg font-bold text-gray-800">Doubts & Questions</h2>
            <span id="doubtCount" class="text-xs font-bold text-indigo-600 bg-indigo-50 px-2 py-1 rounded">0 Found</span>
        </div>
        
        <div id="doubtsList" class="space-y-4">
            <div class="text-center py-8">
                <i class="fas fa-spinner fa-spin text-3xl text-indigo-500 mb-2"></i>
                <p class="text-sm text-gray-500">Loading doubts...</p>
            </div>
        </div>
    </div>
</div>

<div id="replyModal" class="fixed inset-0 bg-black/50 z-50 hidden flex justify-center items-center p-4">
    <div class="bg-white rounded-3xl w-full max-w-sm p-6 shadow-2xl relative">
        <button onclick="closeModal()" class="absolute top-4 right-4 text-gray-400 hover:text-red-500">
            <i class="fas fa-times text-xl"></i>
        </button>
        
        <div class="w-12 h-12 bg-indigo-100 text-indigo-500 rounded-full flex items-center justify-center text-2xl mb-4 mx-auto shadow-inner">
            <i class="fas fa-reply"></i>
        </div>
        <h2 class="text-lg font-bold text-center text-gray-800 mb-1">Reply to Student</h2>
        <p class="text-[10px] text-center text-gray-500 font-bold mb-4 uppercase" id="modalStudentInfo">Name | Class</p>

        <input type="hidden" id="modalDoubtId">

        <div class="mb-4 bg-gray-50 p-3 rounded-xl border border-gray-100">
            <p class="text-[10px] font-bold text-gray-400 uppercase mb-1">Question:</p>
            <p class="text-sm text-gray-700 font-medium" id="modalQuestionText">...</p>
        </div>

        <div class="mb-5">
            <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Your Reply *</label>
            <textarea id="replyText" placeholder="Type the answer here..." class="w-full p-3 border border-gray-200 rounded-xl outline-none bg-gray-50 h-28 focus:ring-2 focus:ring-indigo-500 text-sm resize-none"></textarea>
        </div>

        <button onclick="submitReply()" id="sendReplyBtn" class="w-full bg-indigo-500 text-white font-bold py-3.5 rounded-xl hover:bg-indigo-600 shadow-md transition flex justify-center items-center">
            <i class="fas fa-paper-plane mr-2"></i> Send Reply
        </button>
    </div>
</div>

<script type="module">
    import { auth, db } from '../js/firebase-init.js';
    import { collection, query, orderBy, onSnapshot, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";

    let allDoubts = [];

    // 1. Fetch All Doubts
    const doubtsQuery = query(collection(db, "doubts"), orderBy("createdAt", "desc"));
    
    onSnapshot(doubtsQuery, (snapshot) => {
        allDoubts = [];
        snapshot.forEach((docSnap) => {
            allDoubts.push({ id: docSnap.id, ...docSnap.data() });
        });
        renderDoubts();
    });

    // 2. Filter & Render Doubts
    document.getElementById('statusFilter').addEventListener('change', renderDoubts);

    function renderDoubts() {
        const filter = document.getElementById('statusFilter').value;
        const listContainer = document.getElementById('doubtsList');
        
        let filteredDoubts = allDoubts;
        if(filter !== "All") {
            filteredDoubts = allDoubts.filter(d => d.status === filter);
        }

        document.getElementById('doubtCount').innerText = `${filteredDoubts.length} Found`;
        listContainer.innerHTML = "";

        if(filteredDoubts.length === 0) {
            listContainer.innerHTML = `
                <div class="bg-gray-50 p-6 rounded-2xl border border-gray-100 text-center">
                    <i class="fas fa-check-circle text-gray-300 text-4xl mb-3"></i>
                    <p class="text-sm font-bold text-gray-600">All clear!</p>
                    <p class="text-xs text-gray-400 mt-1">No ${filter.toLowerCase()} doubts found.</p>
                </div>
            `;
            return;
        }

        filteredDoubts.forEach((data) => {
            const isPending = data.status === "Pending";
            const statusBadge = isPending 
                ? `<span class="bg-yellow-100 text-yellow-600 text-[9px] font-bold px-2 py-0.5 rounded uppercase">Pending</span>` 
                : `<span class="bg-green-100 text-green-600 text-[9px] font-bold px-2 py-0.5 rounded uppercase">Resolved</span>`;

            // Action Buttons
            const actionBtn = isPending
                ? `<button onclick="openReplyModal('${data.id}', '${data.studentName.replace(/'/g, "\\'")}', '${data.targetClass}', '${data.question.replace(/'/g, "\\'")}')" class="w-full mt-3 bg-indigo-50 text-indigo-600 font-bold py-2 rounded-lg border border-indigo-100 hover:bg-indigo-100 transition text-xs"><i class="fas fa-reply mr-1"></i> Give Reply</button>`
                : `<div class="mt-3 bg-gray-50 p-3 rounded-lg border border-gray-200 text-xs text-gray-700 font-medium"><i class="fas fa-check text-green-500 mr-1"></i> <b>Your Reply:</b> ${data.reply}</div>`;

            listContainer.innerHTML += `
                <div class="p-4 border rounded-2xl bg-white shadow-sm relative">
                    <button onclick="deleteDoubt('${data.id}')" class="absolute top-4 right-4 text-red-300 hover:text-red-500 transition">
                        <i class="fas fa-trash"></i>
                    </button>
                    
                    <div class="flex items-start gap-3 mb-2 pr-6">
                        <div class="w-8 h-8 bg-indigo-100 text-indigo-600 rounded-full flex items-center justify-center font-bold text-sm flex-shrink-0">
                            ${data.studentName.charAt(0).toUpperCase()}
                        </div>
                        <div>
                            <div class="flex items-center gap-2 mb-0.5">
                                <h4 class="font-bold text-gray-800 text-sm">${data.studentName}</h4>
                                ${statusBadge}
                            </div>
                            <p class="text-[10px] text-gray-500 font-bold uppercase">Class ${data.targetClass} • ${data.subject}</p>
                        </div>
                    </div>
                    
                    <p class="text-sm text-gray-800 font-medium bg-gray-50 p-2 rounded-lg border border-gray-100">Q: ${data.question}</p>
                    
                    ${actionBtn}
                </div>
            `;
        });
    }

    // 3. Modal Controls
    window.openReplyModal = (id, name, cls, question) => {
        document.getElementById('modalDoubtId').value = id;
        document.getElementById('modalStudentInfo').innerText = `${name} | Class ${cls}`;
        document.getElementById('modalQuestionText').innerText = question;
        document.getElementById('replyText').value = ""; // Clear old text
        
        document.getElementById('replyModal').classList.remove('hidden');
    };

    window.closeModal = () => {
        document.getElementById('replyModal').classList.add('hidden');
    };

    // 4. Submit Reply & Update Firestore
    window.submitReply = async () => {
        const id = document.getElementById('modalDoubtId').value;
        const replyText = document.getElementById('replyText').value;
        const btn = document.getElementById('sendReplyBtn');

        if(!replyText.trim()) return alert("Please type a reply first.");

        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> Sending...';

        try {
            await updateDoc(doc(db, "doubts", id), {
                reply: replyText,
                status: "Resolved"
            });

            closeModal();
            // Real-time listener will auto-update the UI!
        } catch (error) {
            alert("Error sending reply: " + error.message);
        } finally {
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-paper-plane mr-2"></i> Send Reply';
        }
    };

    // 5. Delete Doubt
    window.deleteDoubt = async (id) => {
        if(confirm("Are you sure you want to delete this doubt?")) {
            await deleteDoc(doc(db, "doubts", id));
        }
    };
</script>
</body>
</html>
