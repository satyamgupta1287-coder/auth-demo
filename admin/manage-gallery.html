<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Gallery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 p-4 font-sans">
    <div class="max-w-md mx-auto bg-white p-6 rounded-2xl shadow-sm">
        <h1 class="text-xl font-bold mb-4">Manage Gallery</h1>
        <form id="galleryForm" class="space-y-4">
            <input type="text" id="caption" required placeholder="Caption" class="w-full p-3 border rounded-xl">
            <input type="file" id="imageFile" accept="image/*" required class="w-full text-sm">
            <button type="submit" id="uploadBtn" class="w-full bg-pink-500 text-white py-3 rounded-xl font-bold">Upload Photo</button>
        </form>
    </div>

<script type="module">
    import { db } from '../js/firebase-init.js';
    import { collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";

    const form = document.getElementById('galleryForm');
    const uploadBtn = document.getElementById('uploadBtn');

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const caption = document.getElementById('caption').value;
        const file = document.getElementById('imageFile').files[0];

        uploadBtn.disabled = true;
        uploadBtn.innerText = "Uploading...";

        const formData = new FormData();
        formData.append("file", file);
        formData.append("upload_preset", "YOUR_UPLOAD_PRESET"); // Yahan apna Preset Name dalein

        try {
            const response = await fetch("https://api.cloudinary.com/v1_1/YOUR_CLOUD_NAME/image/upload", { // Yahan apna Cloud Name
                method: "POST",
                body: formData
            });
            const data = await response.json();
            
            await addDoc(collection(db, "gallery"), {
                caption, imageUrl: data.secure_url, createdAt: serverTimestamp()
            });
            alert("Uploaded Successfully!");
            form.reset();
        } catch (err) { alert("Error: " + err.message); }
        uploadBtn.disabled = false;
        uploadBtn.innerText = "Upload Photo";
    });
</script>
</body>
</html>
