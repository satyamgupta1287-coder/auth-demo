<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Manage Gallery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js" type="text/javascript"></script>
</head>
<body class="bg-gray-50 p-4">
    <div class="max-w-md mx-auto bg-white p-6 rounded-2xl shadow-sm">
        <h1 class="text-xl font-bold mb-4">Manage Gallery</h1>
        <input type="text" id="caption" placeholder="Photo Caption" class="w-full p-3 border rounded-xl mb-4">
        <button id="upload_widget" class="w-full bg-pink-500 text-white py-3 rounded-xl font-bold">
            Select & Upload Photo
        </button>
    </div>

<script type="module">
    import { db } from '../js/firebase-init.js';
    import { collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";

    const myWidget = cloudinary.createUploadWidget({
        cloudName: 'dl1cddemu', 
        uploadPreset: 'upload' // Aapka preset name 'upload' hai
    }, (error, result) => { 
        if (!error && result && result.event === "success") { 
            const url = result.info.secure_url;
            const caption = document.getElementById('caption').value || "No Caption";
            
            console.log('Upload successful:', url);

            // Firestore mein save karna
            addDoc(collection(db, "gallery"), {
                caption: caption,
                imageUrl: url, 
                createdAt: serverTimestamp()
            })
            .then(() => {
                alert("Photo database mein save ho gayi! 🎉");
            })
            .catch((e) => {
                alert("Database error: " + e.message);
            });
        } else if (error) {
            alert("Upload Error: " + error.message);
        }
    });

    document.getElementById("upload_widget").addEventListener("click", () => {
        myWidget.open();
    }, false);
</script>
</body>
</html>
