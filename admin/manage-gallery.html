<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Manage Gallery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js" type="text/javascript"></script>
</head>
<body class="bg-gray-50 p-4">
    <div class="max-w-md mx-auto bg-white p-6 rounded-2xl shadow-sm mb-6">
        <h1 class="text-xl font-bold mb-4">Manage Gallery</h1>
        <input type="text" id="caption" placeholder="Caption" class="w-full p-3 border rounded-xl mb-4">
        <button id="upload_widget" class="w-full bg-pink-500 text-white py-3 rounded-xl font-bold">Upload Photo</button>
    </div>

    <div id="galleryList" class="max-w-md mx-auto grid grid-cols-2 gap-4"></div>

<script type="module">
    import { db } from '../js/firebase-init.js';
    import { collection, addDoc, onSnapshot, query, orderBy, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";

    const myWidget = cloudinary.createUploadWidget({ cloudName: 'dl1cddemu', uploadPreset: 'upload' }, (err, result) => {
        if (!err && result.event === "success") {
            addDoc(collection(db, "gallery"), { caption: document.getElementById('caption').value, imageUrl: result.info.secure_url, createdAt: new Date() });
        }
    });
    document.getElementById("upload_widget").addEventListener("click", () => myWidget.open());

    // Show list
    onSnapshot(query(collection(db, "gallery"), orderBy("createdAt", "desc")), (snapshot) => {
        const list = document.getElementById('galleryList');
        list.innerHTML = "";
        snapshot.forEach((docSnap) => {
            const data = docSnap.data();
            list.innerHTML += `<div class="bg-white p-2 rounded-lg shadow"><img src="${data.imageUrl}" class="w-full h-24 object-cover rounded">
                               <button class="text-red-500 text-xs mt-2" onclick="deleteDoc(doc(db, 'gallery', '${docSnap.id}'))">Delete</button></div>`;
        });
    });
</script>
</body>
</html>
