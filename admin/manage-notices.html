<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Announcements</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 p-4 font-sans">

<div class="max-w-md mx-auto">
    <div class="flex justify-between items-center bg-white p-4 rounded-2xl shadow-sm mb-4">
        <button onclick="window.location.href='admin.html'" class="text-gray-500 hover:text-blue-600">
            <i class="fas fa-arrow-left text-xl"></i>
        </button>
        <h1 class="text-xl font-bold text-gray-800">Announcements</h1>
        <div></div>
    </div>

    <div class="bg-white rounded-2xl shadow-sm p-6 mb-6 border-t-4 border-yellow-500">
        <h2 class="text-sm font-bold text-gray-400 uppercase mb-4"><i class="fas fa-bullhorn text-yellow-500 mr-2"></i>Post New Notice</h2>
        <form id="noticeForm" class="space-y-4" onsubmit="return false;">
            
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">Notice Title *</label>
                <input type="text" id="title" required placeholder="e.g., Tomorrow is a Holiday" class="w-full p-3 border border-gray-200 rounded-xl outline-none bg-gray-50 focus:ring-2 focus:ring-yellow-500">
            </div>

            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">Target Audience *</label>
                <select id="targetClass" required class="w-full p-3 border border-gray-200 rounded-xl outline-none bg-gray-50 focus:ring-2 focus:ring-yellow-500">
                    <option value="All">All Classes (General Notice)</option>
                    <option value="1">Class 1</option>
                    <option value="2">Class 2</option>
                    <option value="3">Class 3</option>
                    <option value="4">Class 4</option>
                    <option value="5">Class 5</option>
                    <option value="6">Class 6</option>
                    <option value="7">Class 7</option>
                    <option value="8">Class 8</option>
                    <option value="9">Class 9</option>
                    <option value="10">Class 10</option>
                    <option value="11">Class 11</option>
                    <option value="12">Class 12</option>
                </select>
                <p class="text-[10px] text-gray-500 mt-1">Select "All Classes" to send to everyone.</p>
            </div>

            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">Description / Details *</label>
                <textarea id="description" required placeholder="Write the full details of the announcement here..." class="w-full p-3 border border-gray-200 rounded-xl outline-none bg-gray-50 h-28 focus:ring-2 focus:ring-yellow-500"></textarea>
            </div>

            <button type="submit" id="postBtn" class="w-full bg-yellow-500 text-white font-bold py-3.5 rounded-xl hover:bg-yellow-600 shadow-md transition flex justify-center items-center">
                <i class="fas fa-paper-plane mr-2"></i> Post Announcement
            </button>
        </form>
    </div>

    <div class="bg-white rounded-2xl shadow-sm p-6">
        <h2 class="text-lg font-bold text-gray-800 mb-4 border-b pb-2">Active Announcements</h2>
        <div id="noticeList" class="space-y-4">
            <p class="text-center text-sm text-gray-400 py-4">Loading announcements...</p>
        </div>
    </div>
</div>

<script type="module">
    import { auth, db } from '../js/firebase-init.js';
    import { collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";

    const form = document.getElementById('noticeForm');
    const postBtn = document.getElementById('postBtn');

    // --- 1. POST NOTICE LOGIC ---
    form.addEventListener('submit', async () => {
        const title = document.getElementById('title').value;
        const targetClass = document.getElementById('targetClass').value;
        const description = document.getElementById('description').value;

        postBtn.disabled = true;
        postBtn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> Posting...';

        try {
            // Save to 'announcements' collection in Firestore
            await addDoc(collection(db, "announcements"), {
                title,
                targetClass,
                description,
                createdAt: serverTimestamp()
            });

            alert("Announcement Posted Successfully! 📢");
            form.reset();
        } catch (err) {
            alert("Error: " + err.message);
        } finally {
            postBtn.disabled = false;
            postBtn.innerHTML = '<i class="fas fa-paper-plane mr-2"></i> Post Announcement';
        }
    });

    // --- 2. DISPLAY NOTICES LOGIC ---
    const q = query(collection(db, "announcements"), orderBy("createdAt", "desc"));
    onSnapshot(q, (snapshot) => {
        const list = document.getElementById('noticeList');
        list.innerHTML = "";
        
        if (snapshot.size === 0) {
            list.innerHTML = `<p class="text-center text-sm text-gray-400 py-4">No active announcements.</p>`;
            return;
        }

        snapshot.forEach((docSnap) => {
            const data = docSnap.data();
            const dateStr = data.createdAt ? new Date(data.createdAt.toDate()).toLocaleDateString() : 'Just now';
            
            // Badge color based on target audience
            const badgeClass = data.targetClass === 'All' 
                ? 'bg-red-100 text-red-600' 
                : 'bg-blue-100 text-blue-600';
            
            const badgeText = data.targetClass === 'All' ? 'All Classes' : `Class ${data.targetClass}`;

            list.innerHTML += `
                <div class="p-4 border rounded-xl bg-gray-50 relative">
                    <button onclick="deleteNotice('${docSnap.id}')" class="absolute top-3 right-3 text-red-400 hover:text-red-600 transition">
                        <i class="fas fa-trash-alt"></i>
                    </button>
                    
                    <span class="text-[10px] font-bold px-2 py-0.5 rounded uppercase ${badgeClass} mb-2 inline-block">${badgeText}</span>
                    <h4 class="font-bold text-gray-800 text-sm mb-1 pr-6">${data.title}</h4>
                    <p class="text-xs text-gray-600 mb-2">${data.description}</p>
                    <p class="text-[9px] text-gray-400 font-medium"><i class="far fa-clock mr-1"></i>Posted: ${dateStr}</p>
                </div>
            `;
        });
    });

    // --- 3. DELETE NOTICE LOGIC ---
    window.deleteNotice = async (id) => {
        if(confirm("Are you sure you want to delete this notice? It will be removed from all student dashboards.")) {
            try {
                await deleteDoc(doc(db, "announcements", id));
            } catch (err) {
                alert("Error deleting notice: " + err.message);
            }
        }
    };
</script>
</body>
</html>
