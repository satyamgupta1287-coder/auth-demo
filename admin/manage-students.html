<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Students - Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://upload-widget.cloudinary.com/global/all.js" type="text/javascript"></script>
    <style>
        .tab-active { border-bottom: 3px solid #2563eb; color: #2563eb; font-weight: bold; }
        .tab-inactive { color: #6b7280; font-weight: 500; }
        .section-title { font-size: 0.85rem; font-weight: 800; color: #4b5563; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 1rem; border-bottom: 2px solid #e5e7eb; padding-bottom: 0.5rem; }
        input, select { background-color: #f9fafb; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen font-sans pb-10">

    <header class="bg-blue-700 p-5 text-white shadow-md flex items-center gap-4 sticky top-0 z-50">
        <button onclick="window.history.back()" class="bg-white/20 p-2 rounded-lg hover:bg-white/30 transition"><i class="fas fa-arrow-left"></i></button>
        <div>
            <h1 class="text-xl font-bold">Manage Students</h1>
            <p class="text-xs text-blue-200" id="adminSchoolBadge">Loading School Data...</p>
        </div>
    </header>

    <div class="max-w-4xl mx-auto bg-white flex border-b border-gray-200 sticky top-[72px] z-40 shadow-sm">
        <button onclick="switchTab('formTab')" id="btnFormTab" class="flex-1 py-4 tab-active transition">
            <i class="fas fa-user-plus mr-2"></i>Add / Edit Student
        </button>
        <button onclick="switchTab('listTab')" id="btnListTab" class="flex-1 py-4 tab-inactive transition">
            <i class="fas fa-users mr-2"></i>Student List
        </button>
    </div>

    <div class="max-w-4xl mx-auto mt-6 px-4">

        <div id="formTab" class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold text-gray-800" id="formTitle">Register New Student</h2>
                <button onclick="resetForm()" class="text-sm text-blue-600 font-bold hover:underline"><i class="fas fa-redo mr-1"></i>Reset Form</button>
            </div>

            <form id="studentForm" class="space-y-8">
                
                <div>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
                        <div>
                            <label class="block text-xs font-bold text-gray-500 mb-1">Student ID (Auto)</label>
                            <input type="text" id="stuId" readonly class="w-full p-2.5 border rounded-lg text-gray-500 bg-gray-200 font-mono text-sm cursor-not-allowed">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-gray-500 mb-1">Admission No (Auto)</label>
                            <input type="text" id="admNo" readonly class="w-full p-2.5 border rounded-lg text-gray-500 bg-gray-200 font-mono text-sm cursor-not-allowed">
                        </div>
                        <div class="flex items-end">
                            <button type="button" id="uploadPhotoBtn" class="w-full bg-indigo-50 text-indigo-600 border border-indigo-200 font-bold p-2.5 rounded-lg hover:bg-indigo-100 flex justify-center items-center gap-2">
                                <i class="fas fa-camera"></i> Upload Photo
                            </button>
                            <input type="hidden" id="photoUrl">
                        </div>
                    </div>
                    <div id="photoPreviewBox" class="hidden mb-4">
                        <img id="photoPreview" src="" class="w-20 h-20 object-cover rounded-xl border-2 border-indigo-200 shadow-sm">
                    </div>
                </div>

                <div>
                    <h3 class="section-title"><i class="fas fa-user-circle mr-2"></i>Personal Details</h3>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <div><label class="block text-xs font-bold text-gray-600 mb-1">First Name *</label><input type="text" id="fName" oninput="updateFullName()" required class="w-full p-2.5 border rounded-lg focus:ring-2 ring-blue-200 outline-none"></div>
                        <div><label class="block text-xs font-bold text-gray-600 mb-1">Middle Name</label><input type="text" id="mName" oninput="updateFullName()" class="w-full p-2.5 border rounded-lg focus:ring-2 ring-blue-200 outline-none"></div>
                        <div><label class="block text-xs font-bold text-gray-600 mb-1">Last Name *</label><input type="text" id="lName" oninput="updateFullName()" required class="w-full p-2.5 border rounded-lg focus:ring-2 ring-blue-200 outline-none"></div>
                        
                        <div class="md:col-span-3"><label class="block text-xs font-bold text-gray-600 mb-1">Full Name (Auto-fill)</label><input type="text" id="fullName" readonly class="w-full p-2.5 border rounded-lg bg-gray-100 font-bold text-gray-700 outline-none"></div>
                        
                        <div><label class="block text-xs font-bold text-gray-600 mb-1">Date of Birth *</label><input type="date" id="dob" required class="w-full p-2.5 border rounded-lg outline-none"></div>
                        <div><label class="block text-xs font-bold text-gray-600 mb-1">Gender *</label>
                            <select id="gender" class="w-full p-2.5 border rounded-lg outline-none">
                                <option value="Male">Male</option><option value="Female">Female</option><option value="Other">Other</option>
                            </select>
                        </div>
                        <div><label class="block text-xs font-bold text-gray-600 mb-1">Blood Group</label><input type="text" id="bloodGrp" placeholder="e.g. O+" class="w-full p-2.5 border rounded-lg outline-none"></div>
                        
                        <div><label class="block text-xs font-bold text-gray-600 mb-1">Nationality</label><input type="text" id="nationality" value="Indian" class="w-full p-2.5 border rounded-lg outline-none"></div>
                        <div><label class="block text-xs font-bold text-gray-600 mb-1">Category / Caste</label><input type="text" id="category" class="w-full p-2.5 border rounded-lg outline-none"></div>
                        <div><label class="block text-xs font-bold text-gray-600 mb-1">Religion</label><input type="text" id="religion" class="w-full p-2.5 border rounded-lg outline-none"></div>
                    </div>
                </div>

                <div>
                    <h3 class="section-title"><i class="fas fa-address-book mr-2"></i>Contact Information</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div><label class="block text-xs font-bold text-gray-600 mb-1">Mobile Number *</label><input type="tel" id="mobile" required class="w-full p-2.5 border rounded-lg outline-none"></div>
                        <div><label class="block text-xs font-bold text-gray-600 mb-1">Alt Mobile Number</label><input type="tel" id="altMobile" class="w-full p-2.5 border rounded-lg outline-none"></div>
                        <div class="md:col-span-2"><label class="block text-xs font-bold text-gray-600 mb-1">Email Address *</label><input type="email" id="email" required class="w-full p-2.5 border rounded-lg outline-none"></div>
                        
                        <div class="md:col-span-2"><label class="block text-xs font-bold text-gray-600 mb-1">Current Address *</label><textarea id="currAddress" rows="2" class="w-full p-2.5 border rounded-lg outline-none"></textarea></div>
                        <div class="md:col-span-2"><label class="block text-xs font-bold text-gray-600 mb-1">Permanent Address</label><textarea id="permAddress" rows="2" class="w-full p-2.5 border rounded-lg outline-none"></textarea></div>
                        
                        <div><label class="block text-xs font-bold text-gray-600 mb-1">City</label><input type="text" id="city" class="w-full p-2.5 border rounded-lg outline-none"></div>
                        <div><label class="block text-xs font-bold text-gray-600 mb-1">State / Province</label><input type="text" id="state" class="w-full p-2.5 border rounded-lg outline-none"></div>
                        <div><label class="block text-xs font-bold text-gray-600 mb-1">Postal Code</label><input type="text" id="postal" class="w-full p-2.5 border rounded-lg outline-none"></div>
                        <div><label class="block text-xs font-bold text-gray-600 mb-1">Country</label><input type="text" id="country" value="India" class="w-full p-2.5 border rounded-lg outline-none"></div>
                    </div>
                </div>

                <div>
                    <h3 class="section-title"><i class="fas fa-graduation-cap mr-2"></i>Academic Information</h3>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <div><label class="block text-xs font-bold text-gray-600 mb-1">Admission Date</label><input type="date" id="admDate" class="w-full p-2.5 border rounded-lg outline-none"></div>
                        <div><label class="block text-xs font-bold text-gray-600 mb-1">Academic Session</label><input type="text" id="session" value="2026-27" class="w-full p-2.5 border rounded-lg outline-none"></div>
                        <div><label class="block text-xs font-bold text-gray-600 mb-1">Class *</label>
                            <select id="className" required class="w-full p-2.5 border rounded-lg outline-none">
                                <option value="9">Class 9</option><option value="10">Class 10</option><option value="11">Class 11</option><option value="12">Class 12</option>
                            </select>
                        </div>
                        <div><label class="block text-xs font-bold text-gray-600 mb-1">Section / Batch</label><input type="text" id="section" placeholder="e.g. A" class="w-full p-2.5 border rounded-lg outline-none"></div>
                        <div><label class="block text-xs font-bold text-gray-600 mb-1">Roll Number</label><input type="text" id="rollNo" class="w-full p-2.5 border rounded-lg outline-none"></div>
                        <div><label class="block text-xs font-bold text-gray-600 mb-1">TC Number</label><input type="text" id="tcNo" class="w-full p-2.5 border rounded-lg outline-none"></div>
                        
                        <div class="md:col-span-3"><label class="block text-xs font-bold text-gray-600 mb-1">Previous School / College</label><input type="text" id="prevSchool" class="w-full p-2.5 border rounded-lg outline-none"></div>
                    </div>
                </div>

                <div>
                    <h3 class="section-title"><i class="fas fa-users mr-2"></i>Parent / Guardian Details</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div class="p-4 bg-gray-50 border rounded-xl space-y-3">
                            <h4 class="font-bold text-sm text-gray-800 border-b pb-1">Father's Info</h4>
                            <input type="text" id="fathName" placeholder="Full Name" class="w-full p-2.5 text-sm border rounded outline-none">
                            <input type="tel" id="fathMobile" placeholder="Mobile Number" class="w-full p-2.5 text-sm border rounded outline-none">
                            <input type="text" id="fathOcc" placeholder="Occupation" class="w-full p-2.5 text-sm border rounded outline-none">
                        </div>
                        <div class="p-4 bg-gray-50 border rounded-xl space-y-3">
                            <h4 class="font-bold text-sm text-gray-800 border-b pb-1">Mother's Info</h4>
                            <input type="text" id="mothName" placeholder="Full Name" class="w-full p-2.5 text-sm border rounded outline-none">
                            <input type="tel" id="mothMobile" placeholder="Mobile Number" class="w-full p-2.5 text-sm border rounded outline-none">
                            <input type="text" id="mothOcc" placeholder="Occupation" class="w-full p-2.5 text-sm border rounded outline-none">
                        </div>
                        <div class="md:col-span-2 p-4 bg-red-50 border border-red-100 rounded-xl space-y-3">
                            <h4 class="font-bold text-sm text-red-700 border-b border-red-200 pb-1">Emergency Contact</h4>
                            <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
                                <input type="text" id="emgName" placeholder="Contact Name" class="w-full p-2.5 text-sm border rounded outline-none">
                                <input type="text" id="emgRel" placeholder="Relationship" class="w-full p-2.5 text-sm border rounded outline-none">
                                <input type="tel" id="emgMobile" placeholder="Mobile Number" class="w-full p-2.5 text-sm border rounded outline-none">
                            </div>
                        </div>
                    </div>
                </div>

                <div class="pt-4 border-t border-gray-200">
                    <button type="submit" id="saveBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl shadow-lg transition text-lg">
                        <i class="fas fa-save mr-2"></i> Save Student Record
                    </button>
                </div>
            </form>
        </div>

        <div id="listTab" class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 hidden">
            <h2 class="text-xl font-bold text-gray-800 mb-4">Enrolled Students</h2>
            <div id="studentContainer" class="space-y-4">
                <p class="text-gray-400 text-center py-10">Loading records...</p>
            </div>
        </div>

    </div>

<script type="module">
    import { auth, db } from '../js/firebase-init.js';
    import { collection, addDoc, getDocs, doc, updateDoc, deleteDoc, serverTimestamp, query, where, getDoc } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-auth.js";

    let currentEditId = null;
    let adminSchoolId = null; // Global variable to store admin's school ID

    // --- 1. Auth Check & Fetch Admin School ID ---
    onAuthStateChanged(auth, async (user) => {
        if (user) {
            try {
                const adminDocRef = doc(db, "users", user.uid);
                const adminSnap = await getDoc(adminDocRef);

                if (adminSnap.exists()) {
                    adminSchoolId = adminSnap.data().schoolId; 
                    document.getElementById('adminSchoolBadge').innerText = "School Code: " + adminSchoolId;
                    
                    // Agar List tab open hai, toh data load karo
                    if(!document.getElementById('listTab').classList.contains('hidden')) {
                        loadStudents();
                    }
                } else {
                    alert("Admin data not found!");
                }
            } catch (error) {
                console.error("Error fetching admin details:", error);
            }
        } else {
            window.location.href = "../index.html";
        }
    });


    // --- UI Logic ---
    window.switchTab = (tabId) => {
        document.getElementById('formTab').classList.add('hidden');
        document.getElementById('listTab').classList.add('hidden');
        document.getElementById(tabId).classList.remove('hidden');

        document.getElementById('btnFormTab').className = tabId === 'formTab' ? 'flex-1 py-4 tab-active transition' : 'flex-1 py-4 tab-inactive transition';
        document.getElementById('btnListTab').className = tabId === 'listTab' ? 'flex-1 py-4 tab-active transition' : 'flex-1 py-4 tab-inactive transition';

        if(tabId === 'listTab' && adminSchoolId) {
            loadStudents();
        }
    };

    window.updateFullName = () => {
        const f = document.getElementById('fName').value.trim();
        const m = document.getElementById('mName').value.trim();
        const l = document.getElementById('lName').value.trim();
        document.getElementById('fullName').value = `${f} ${m} ${l}`.replace(/\s+/g, ' ').trim();
    };

    window.generateAutoIDs = () => {
        if(currentEditId) return; 
        const yr = new Date().getFullYear();
        const rnd = Math.floor(1000 + Math.random() * 9000);
        document.getElementById('stuId').value = "STU" + yr + rnd;
        document.getElementById('admNo').value = "ADM" + yr + (rnd + 1);
        
        if(!document.getElementById('admDate').value){
            document.getElementById('admDate').value = new Date().toISOString().split('T')[0];
        }
    };

    window.resetForm = () => {
        document.getElementById('studentForm').reset();
        document.getElementById('photoPreviewBox').classList.add('hidden');
        document.getElementById('photoUrl').value = "";
        currentEditId = null;
        document.getElementById('formTitle').innerText = "Register New Student";
        document.getElementById('saveBtn').innerHTML = `<i class="fas fa-save mr-2"></i> Save Student Record`;
        generateAutoIDs();
    };

    generateAutoIDs();

    // --- Cloudinary Upload ---
    const photoWidget = cloudinary.createUploadWidget({
        cloudName: 'dl1cddemu', uploadPreset: 'upload', cropping: true, multiple: false, clientAllowedFormats: ["jpg", "png", "jpeg"]
    }, (err, result) => {
        if (!err && result && result.event === "success") {
            document.getElementById('photoUrl').value = result.info.secure_url;
            document.getElementById('photoPreview').src = result.info.secure_url;
            document.getElementById('photoPreviewBox').classList.remove('hidden');
        }
    });
    document.getElementById('uploadPhotoBtn').addEventListener('click', () => photoWidget.open());

    // --- Save / Update Data ---
    document.getElementById('studentForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        if(!adminSchoolId) {
            alert("Admin School ID not loaded yet. Please wait or refresh.");
            return;
        }

        const btn = document.getElementById('saveBtn');
        btn.innerText = "Saving..."; btn.disabled = true;

        const studentData = {
            // Naye Filter Fields (Multi-Tenant)
            schoolId: adminSchoolId,
            role: "student",
            
            // Biodata Fields
            studentId: document.getElementById('stuId').value,
            admissionNo: document.getElementById('admNo').value,
            photoUrl: document.getElementById('photoUrl').value,
            firstName: document.getElementById('fName').value,
            middleName: document.getElementById('mName').value,
            lastName: document.getElementById('lName').value,
            name: document.getElementById('fullName').value, 
            dob: document.getElementById('dob').value,
            gender: document.getElementById('gender').value,
            bloodGroup: document.getElementById('bloodGrp').value,
            nationality: document.getElementById('nationality').value,
            category: document.getElementById('category').value,
            religion: document.getElementById('religion').value,
            mobile: document.getElementById('mobile').value,
            altMobile: document.getElementById('altMobile').value,
            email: document.getElementById('email').value,
            currAddress: document.getElementById('currAddress').value,
            permAddress: document.getElementById('permAddress').value,
            city: document.getElementById('city').value,
            state: document.getElementById('state').value,
            postal: document.getElementById('postal').value,
            country: document.getElementById('country').value,
            admissionDate: document.getElementById('admDate').value,
            session: document.getElementById('session').value,
            class: document.getElementById('className').value, 
            section: document.getElementById('section').value,
            rollNo: document.getElementById('rollNo').value,
            tcNo: document.getElementById('tcNo').value,
            prevSchool: document.getElementById('prevSchool').value,
            fatherName: document.getElementById('fathName').value,
            fatherMobile: document.getElementById('fathMobile').value,
            fatherOcc: document.getElementById('fathOcc').value,
            motherName: document.getElementById('mothName').value,
            motherMobile: document.getElementById('mothMobile').value,
            motherOcc: document.getElementById('mothOcc').value,
            emgName: document.getElementById('emgName').value,
            emgRel: document.getElementById('emgRel').value,
            emgMobile: document.getElementById('emgMobile').value,
            updatedAt: serverTimestamp()
        };

        try {
            if(currentEditId) {
                await updateDoc(doc(db, "users", currentEditId), studentData);
                alert("Student Record Updated!");
            } else {
                studentData.createdAt = serverTimestamp();
                await addDoc(collection(db, "users"), studentData);
                alert("New Student Registered Successfully!");
            }
            resetForm();
            switchTab('listTab');
        } catch (error) {
            alert("Error: " + error.message);
        } finally {
            btn.innerHTML = `<i class="fas fa-save mr-2"></i> Save Student Record`;
            btn.disabled = false;
        }
    });

    // --- Load Students List (WITH SCHOOL FILTER) ---
    async function loadStudents() {
        const container = document.getElementById('studentContainer');
        container.innerHTML = `<p class="text-center text-blue-500 py-10 font-bold"><i class="fas fa-spinner fa-spin mr-2"></i>Fetching records...</p>`;
        
        try {
            // Yahan Filter lagaya hai -> role: student & schoolId: adminSchoolId
            const q = query(
                collection(db, "users"), 
                where("role", "==", "student"),
                where("schoolId", "==", adminSchoolId)
            );

            const querySnapshot = await getDocs(q);
            container.innerHTML = "";
            
            if(querySnapshot.empty) {
                container.innerHTML = `<p class="text-gray-400 text-center py-10">No students registered in this school yet.</p>`;
                return;
            }

            querySnapshot.forEach((docSnap) => {
                const data = docSnap.data();
                const docId = docSnap.id;
                
                const dataStr = encodeURIComponent(JSON.stringify({...data, id: docId}));

                container.innerHTML += `
                    <div class="bg-gray-50 border border-gray-200 p-4 rounded-xl flex justify-between items-center hover:shadow-md transition">
                        <div class="flex items-center gap-4">
                            <img src="${data.photoUrl || data.photoBase64 || 'https://cdn-icons-png.flaticon.com/512/3135/3135715.png'}" class="w-12 h-12 rounded-full object-cover border border-gray-300">
                            <div>
                                <h3 class="font-bold text-gray-800">${data.name || data.firstName || 'Student'} <span class="text-xs text-blue-600 bg-blue-100 px-2 py-0.5 rounded ml-1">Class ${data.class || 'N/A'} ${data.section||''}</span></h3>
                                <p class="text-xs text-gray-500 mt-0.5">ID: ${data.studentId || 'N/A'} | Mob: ${data.mobile || 'N/A'}</p>
                            </div>
                        </div>
                        <div class="flex flex-col gap-2">
                            <button onclick="editStudent('${dataStr}')" class="bg-blue-100 text-blue-600 px-3 py-1.5 rounded-lg text-xs font-bold hover:bg-blue-200 transition"><i class="fas fa-edit"></i> Edit</button>
                            <button onclick="deleteStudent('${docId}')" class="bg-red-100 text-red-600 px-3 py-1.5 rounded-lg text-xs font-bold hover:bg-red-200 transition"><i class="fas fa-trash"></i> Del</button>
                        </div>
                    </div>
                `;
            });
        } catch (e) {
            container.innerHTML = `<p class="text-red-500 text-center py-10">Error loading data: ${e.message}</p>`;
        }
    }

    // --- Edit Student Logic ---
    window.editStudent = (encodedData) => {
        const data = JSON.parse(decodeURIComponent(encodedData));
        currentEditId = data.id;

        document.getElementById('formTitle').innerText = "Edit Student Record";
        document.getElementById('saveBtn').innerHTML = `<i class="fas fa-save mr-2"></i> Update Record`;

        Object.keys(data).forEach(key => {
            const el = document.getElementById(key);
            if(key === 'studentId') document.getElementById('stuId').value = data[key] || '';
            if(key === 'admissionNo') document.getElementById('admNo').value = data[key] || '';
            if(key === 'firstName') document.getElementById('fName').value = data[key] || '';
            if(key === 'middleName') document.getElementById('mName').value = data[key] || '';
            if(key === 'lastName') document.getElementById('lName').value = data[key] || '';
            if(key === 'class') document.getElementById('className').value = data[key] || '';
            if(key === 'name') document.getElementById('fullName').value = data[key] || '';
            if(key === 'fatherName') document.getElementById('fathName').value = data[key] || '';
            if(el) el.value = data[key] || '';
        });

        if(data.photoUrl || data.photoBase64) {
            document.getElementById('photoPreview').src = data.photoUrl || data.photoBase64;
            document.getElementById('photoPreviewBox').classList.remove('hidden');
        } else {
            document.getElementById('photoPreviewBox').classList.add('hidden');
        }

        switchTab('formTab');
        window.scrollTo(0,0);
    };

    // --- Delete Student ---
    window.deleteStudent = async (id) => {
        if(confirm("Are you absolutely sure you want to delete this record?")) {
            try {
                await deleteDoc(doc(db, "users", id));
                alert("Student deleted successfully!");
                loadStudents();
            } catch (error) {
                alert("Error deleting: " + error.message);
            }
        }
    };
</script>
</body>
</html>
