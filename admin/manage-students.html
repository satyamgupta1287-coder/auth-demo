<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Students</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-4">

<div class="max-w-md mx-auto bg-white rounded-2xl shadow-sm p-6">
    <h2 class="text-xl font-bold text-gray-800 mb-6">Add New Student</h2>
    
    <div class="space-y-4">
        <input type="text" id="studentName" placeholder="Full Name" class="w-full p-3 border border-gray-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
        <input type="email" id="studentEmail" placeholder="Email ID" class="w-full p-3 border border-gray-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
        
        <div class="grid grid-cols-2 gap-4">
            <select id="studentClass" class="w-full p-3 border border-gray-200 rounded-xl outline-none">
                <option value="">Select Class</option>
                <option value="9">Class 9</option>
                <option value="10">Class 10</option>
                <option value="11">Class 11</option>
                <option value="12">Class 12</option>
            </select>
            <input type="text" id="studentSection" placeholder="Section (e.g. A)" class="w-full p-3 border border-gray-200 rounded-xl outline-none">
        </div>

        <button id="addStudentBtn" class="w-full bg-blue-600 text-white font-bold py-3 rounded-xl hover:bg-blue-700 transition">
            Add Student
        </button>
    </div>
</div>

<script type="module">
    import { db } from '../js/firebase-init.js';
    import { collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";

    document.getElementById('addStudentBtn').addEventListener('click', async () => {
        const name = document.getElementById('studentName').value;
        const email = document.getElementById('studentEmail').value;
        const className = document.getElementById('studentClass').value;
        const section = document.getElementById('studentSection').value;

        if(!name || !email || !className) { alert("Please fill all fields"); return; }

        try {
            await addDoc(collection(db, "users"), {
                name: name,
                email: email,
                class: className,
                section: section,
                role: "student",
                createdAt: serverTimestamp()
            });
            alert("Student Added Successfully!");
            window.location.reload();
        } catch (error) {
            alert("Error: " + error.message);
        }
    });
</script>
</body>
</html>
