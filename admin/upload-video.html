<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Batches - Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://upload-widget.cloudinary.com/global/all.js" type="text/javascript"></script>
    <style>body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }</style>
</head>
<body class="pb-10">

<div class="bg-blue-800 text-white px-5 py-4 rounded-b-[24px] shadow-md flex items-center gap-4 sticky top-0 z-50">
    <button id="backBtn" class="text-white hover:text-blue-200 transition text-lg active:scale-95">
        <i class="fas fa-arrow-left"></i>
    </button>
    <div class="flex-1 min-w-0">
        <h1 class="text-base font-bold truncate" id="headerTitle">Manage Batches (Pro)</h1>
        <p class="text-[10px] text-blue-200 font-medium truncate uppercase tracking-wider" id="headerPath">Admin Area</p>
    </div>
</div>

<div class="max-w-md mx-auto px-5 mt-6">

    <div id="view-courses" class="space-y-4">
        <button onclick="openCourseModal()" class="w-full bg-blue-50 border-2 border-dashed border-blue-200 text-blue-600 font-bold py-4 rounded-2xl flex justify-center items-center gap-2 active:scale-95 transition">
            <i class="fas fa-plus-circle text-lg"></i> Create New Batch / Course
        </button>
        <h3 class="font-bold text-slate-800 text-sm mt-6 mb-2 px-1"><i class="fas fa-layer-group text-slate-400 mr-1"></i> Your Active Courses</h3>
        <div id="courseList" class="space-y-3">
            <div class="text-center p-5"><i class="fas fa-spinner fa-spin text-slate-400"></i></div>
        </div>
        
        <button onclick="clearAppGarbage()" class="w-full mt-6 py-3 text-xs font-bold text-red-500 bg-red-50 rounded-xl border border-red-100 active:scale-95 transition">
            <i class="fas fa-broom mr-1"></i> Clear 'Undefined' Error Cache
        </button>
    </div>

    <div id="view-subjects" class="hidden space-y-4">
        <button onclick="openSubjectModal()" class="w-full bg-purple-50 border-2 border-dashed border-purple-200 text-purple-600 font-bold py-4 rounded-2xl flex justify-center items-center gap-2 active:scale-95 transition">
            <i class="fas fa-plus-circle text-lg"></i> Add New Subject
        </button>
        <h3 class="font-bold text-slate-800 text-sm mt-6 mb-2 px-1"><i class="fas fa-book-open text-slate-400 mr-1"></i> Subjects in <span id="lblActiveCourse" class="text-blue-600"></span></h3>
        <div id="subjectList" class="space-y-3"></div>
    </div>

    <div id="view-upload" class="hidden">
        
        <div class="bg-white p-5 rounded-[20px] shadow-sm border border-slate-100 mb-8">
            <h2 class="text-sm font-bold text-slate-800 mb-4"><i class="fas fa-cloud-upload-alt text-blue-500 mr-2"></i>Upload to <span id="lblActiveSubject" class="text-blue-600"></span></h2>
            
            <form id="videoForm" class="space-y-3" onsubmit="return false;">
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">Target Class</label>
                        <input type="text" id="targetClass" required placeholder="e.g. 10" class="w-full p-2.5 text-sm border rounded-xl outline-none focus:border-blue-500 bg-slate-50">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">Teacher Name</label>
                        <input type="text" id="teacherName" required placeholder="e.g. Mr. Sharma" class="w-full p-2.5 text-sm border rounded-xl outline-none focus:border-blue-500 bg-slate-50">
                    </div>
                </div>

                <div>
                    <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">Lecture Title / Topic</label>
                    <input type="text" id="title" required placeholder="e.g. Newton's Laws" class="w-full p-2.5 text-sm border rounded-xl outline-none focus:border-blue-500 bg-slate-50">
                </div>

                <div class="border-2 border-dashed border-blue-200 rounded-xl p-4 text-center bg-blue-50 relative overflow-hidden">
                    <input type="file" id="videoFile" accept="video/mp4,video/x-m4v,video/*" required class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10">
                    <i class="fas fa-film text-blue-400 text-2xl mb-2"></i>
                    <p class="text-xs font-bold text-slate-600 truncate px-2" id="fileNameText">Tap to select video (.mp4)</p>
                    <p class="text-[10px] text-slate-400 mt-1" id="fileSizeText"></p>
                </div>

                <div class="grid grid-cols-2 gap-3 pt-1">
                    <button type="button" id="notesBtn" class="p-3 border border-emerald-200 rounded-xl bg-emerald-50 text-emerald-600 flex flex-col items-center justify-center gap-1 active:scale-95 transition">
                        <i class="fas fa-file-pdf text-xl mb-1"></i>
                        <span id="notesLabel" class="text-[10px] font-bold uppercase tracking-wide">Attach Notes</span>
                    </button>
                    <button type="button" id="testBtn" class="p-3 border border-purple-200 rounded-xl bg-purple-50 text-purple-600 flex flex-col items-center justify-center gap-1 active:scale-95 transition">
                        <i class="fas fa-file-alt text-xl mb-1"></i>
                        <span id="testLabel" class="text-[10px] font-bold uppercase tracking-wide">Attach DPP / Test</span>
                    </button>
                </div>

                <div id="progressWrap" class="hidden mt-3">
                    <div class="w-full bg-slate-100 rounded-full h-2.5 overflow-hidden">
                        <div id="progressBar" class="bg-blue-600 h-2.5 rounded-full transition-all duration-150" style="width: 0%"></div>
                    </div>
                    <div class="flex justify-between mt-1">
                        <span class="text-[10px] font-bold text-blue-600" id="progressPercent">0%</span>
                        <span class="text-[10px] text-slate-400" id="progressBytes"></span>
                    </div>
                </div>

                <button type="submit" id="submitBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl mt-3 transition flex justify-center items-center gap-2">
                    <i class="fas fa-upload"></i> Start Upload & Publish
                </button>
                <p id="uploadStatus" class="text-[11px] text-center font-bold text-blue-600 hidden mt-2"></p>
            </form>
        </div>

        <div class="mb-8">
            <h2 class="text-sm font-bold text-slate-800 mb-4 px-1 flex items-center justify-between">
                <span><i class="fas fa-list text-blue-500 mr-1"></i> Uploaded Lectures</span>
                <span class="bg-blue-100 text-blue-700 text-[10px] px-2 py-0.5 rounded-full" id="videoCountBadge">0</span>
            </h2>
            <div id="videoListContainer" class="space-y-3"></div>
        </div>
    </div>

</div>

<div id="courseModal" class="fixed inset-0 z- bg-black/60 backdrop-blur-sm hidden flex items-center justify-center px-4 overflow-y-auto py-10">
    <div class="bg-white w-full max-w-sm rounded-[24px] p-6 shadow-2xl my-auto">
        <h3 class="font-bold text-slate-800 text-lg mb-4">Create Premium Batch</h3>
        
        <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">Batch Name *</label>
        <input type="text" id="newCourseName" placeholder="e.g. Arjuna JEE 2026" class="w-full p-2.5 border rounded-xl outline-none focus:border-blue-500 bg-slate-50 mb-3 text-sm">
        
        <div class="grid grid-cols-2 gap-3 mb-3">
            <div>
                <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">Selling Price (₹)</label>
                <input type="number" id="coursePrice" placeholder="e.g. 499" class="w-full p-2.5 border rounded-xl outline-none focus:border-blue-500 bg-slate-50 text-sm">
            </div>
            <div>
                <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">Original Price (₹)</label>
                <input type="number" id="courseOriginalPrice" placeholder="e.g. 1999" class="w-full p-2.5 border rounded-xl outline-none focus:border-blue-500 bg-slate-50 text-sm">
            </div>
        </div>

        <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">Language</label>
        <input type="text" id="courseLanguage" placeholder="e.g. Hinglish" class="w-full p-2.5 border rounded-xl outline-none focus:border-blue-500 bg-slate-50 mb-3 text-sm">

        <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">Features (Comma separated)</label>
        <textarea id="courseFeatures" placeholder="e.g. Live Classes, PDF Notes, Test Series" rows="2" class="w-full p-2.5 border rounded-xl outline-none focus:border-blue-500 bg-slate-50 mb-3 text-sm"></textarea>
        
        <button type="button" id="coursePhotoBtn" class="w-full p-3 text-sm border-2 border-dashed border-blue-200 rounded-xl bg-blue-50 text-blue-600 font-bold flex flex-col items-center justify-center gap-1 mb-4">
            <i class="fas fa-image text-xl"></i> <span id="coursePhotoLabel">Upload Cover Photo</span>
        </button>
        
        <div class="flex gap-3 mt-2">
            <button onclick="closeCourseModal()" class="flex-1 py-3 rounded-xl bg-slate-100 text-slate-600 text-sm font-bold active:scale-95 transition">Cancel</button>
            <button onclick="saveNewCourse()" class="flex-1 py-3 rounded-xl bg-blue-600 text-white text-sm font-bold active:scale-95 transition">Save Batch</button>
        </div>
    </div>
</div>

<div id="subjectModal" class="fixed inset-0 z- bg-black/60 backdrop-blur-sm hidden flex items-center justify-center px-6">
    <div class="bg-white w-full max-w-sm rounded-[24px] p-6 shadow-2xl">
        <h3 class="font-bold text-slate-800 text-lg mb-4">Add Subject to <span id="subjModalCourseName" class="text-blue-600"></span></h3>
        <input type="text" id="newSubjectName" placeholder="e.g. Physics, Math" class="w-full p-3 border rounded-xl outline-none focus:border-purple-500 bg-slate-50 mb-5 text-sm">
        
        <div class="flex gap-3">
            <button onclick="closeSubjectModal()" class="flex-1 py-3 rounded-xl bg-slate-100 text-slate-600 text-sm font-bold active:scale-95 transition">Cancel</button>
            <button onclick="saveNewSubject()" class="flex-1 py-3 rounded-xl bg-purple-600 text-white text-sm font-bold active:scale-95 transition">Add Subject</button>
        </div>
    </div>
</div>

<div id="deleteModal" class="fixed inset-0 z- bg-black/60 backdrop-blur-sm hidden flex items-center justify-center px-6">
    <div class="bg-white w-full max-w-sm rounded-[20px] p-5 shadow-2xl">
        <h3 class="font-bold text-slate-800 text-sm mb-1 text-center">Delete this video?</h3>
        <div class="flex gap-2 mt-4">
            <button onclick="closeDeleteModal()" class="flex-1 py-2.5 rounded-xl bg-slate-100 text-slate-600 text-sm font-bold active:scale-95 transition">Cancel</button>
            <button onclick="confirmDelete()" class="flex-1 py-2.5 rounded-xl bg-red-600 text-white text-sm font-bold active:scale-95 transition">Delete</button>
        </div>
    </div>
</div>

<script type="module">
    import { auth, db } from '../js/firebase-init.js';
    import { collection, addDoc, getDoc, doc, deleteDoc, query, where, onSnapshot, serverTimestamp, setDoc } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-auth.js";

    const WISTIA_ACCESS_TOKEN = "52e25c62ca626beb4dc90b4c6207ebc45861e5de7e6569d99c6ee0fe06b6b286";

    let adminSchoolId = null;
    let allVideos = [];
    let allCourseMeta = {};

    let currentStep = 1; 
    let activeCourse = "";
    let activeSubject = "";

    let newCoursePhotoUrl = "";
    let notesUrl = "";
    let testUrl = "";
    let pendingDeleteId = null;

    const backBtn = document.getElementById('backBtn');
    const headerTitle = document.getElementById('headerTitle');
    const headerPath = document.getElementById('headerPath');

    window.clearAppGarbage = function() {
        localStorage.removeItem('ast_teacher');
        localStorage.removeItem('ast_class');
        localStorage.removeItem('ast_course');
        localStorage.removeItem('ast_subject');
        alert("Cache Cleared Successfully! Browser memory is now fresh.");
        window.location.reload();
    };

    function getSafeStorage(key) {
        let val = localStorage.getItem(key);
        if (!val || val.toLowerCase() === 'undefined' || val.toLowerCase() === 'null') return '';
        return val.trim();
    }
    document.getElementById('teacherName').value = getSafeStorage('ast_teacher');
    document.getElementById('targetClass').value = getSafeStorage('ast_class');

    function formatBytes(bytes) {
        if (!bytes) return "0 MB";
        const mb = bytes / (1024 * 1024);
        return mb >= 1 ? mb.toFixed(1) + " MB" : (bytes / 1024).toFixed(0) + " KB";
    }

    const coursePhotoWidget = cloudinary.createUploadWidget({ cloudName: 'dl1cddemu', uploadPreset: 'upload', resourceType: 'image' }, (e, r) => {
        if (!e && r && r.event === "success") {
            newCoursePhotoUrl = r.info.secure_url || "";
            document.getElementById('coursePhotoLabel').innerHTML = `<span class="text-emerald-600">Photo Uploaded ✓</span>`;
        }
    });
    document.getElementById('coursePhotoBtn').addEventListener('click', () => coursePhotoWidget.open());

    const notesWidget = cloudinary.createUploadWidget({ cloudName: 'dl1cddemu', uploadPreset: 'upload', resourceType: 'auto' }, (e, r) => {
        if (!e && r && r.event === "success") {
            notesUrl = r.info.secure_url || "";
            document.getElementById('notesLabel').innerText = "Notes Attached ✓";
            document.getElementById('notesBtn').classList.replace('bg-emerald-50', 'bg-emerald-100');
        }
    });
    document.getElementById('notesBtn').addEventListener('click', () => notesWidget.open());

    const testWidget = cloudinary.createUploadWidget({ cloudName: 'dl1cddemu', uploadPreset: 'upload', resourceType: 'auto' }, (e, r) => {
        if (!e && r && r.event === "success") {
            testUrl = r.info.secure_url || "";
            document.getElementById('testLabel').innerText = "Test Attached ✓";
            document.getElementById('testBtn').classList.replace('bg-purple-50', 'bg-purple-100');
        }
    });
    document.getElementById('testBtn').addEventListener('click', () => testWidget.open());

    const fileInput = document.getElementById('videoFile');
    fileInput.addEventListener('change', (e) => {
        const file = e.target.files;
        if (file) {
            document.getElementById('fileNameText').innerText = file.name;
            document.getElementById('fileNameText').classList.add('text-blue-600');
            document.getElementById('fileSizeText').innerText = formatBytes(file.size);
        } else {
            document.getElementById('fileNameText').innerText = "Tap to select video (.mp4)";
            document.getElementById('fileNameText').classList.remove('text-blue-600');
            document.getElementById('fileSizeText').innerText = "";
        }
    });

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            const adminDoc = await getDoc(doc(db, "users", user.uid));
            if (adminDoc.exists()) {
                adminSchoolId = adminDoc.data().schoolId || "UNKNOWN";
                fetchDatabase();
            }
        }
    });

    function fetchDatabase() {
        onSnapshot(query(collection(db, "courseMeta"), where("schoolId", "==", adminSchoolId)), (snap) => {
            allCourseMeta = {};
            snap.forEach(d => { allCourseMeta[d.data().course] = d.data().photoUrl; });
            updateUI();
        });

        onSnapshot(query(collection(db, "videos"), where("schoolId", "==", adminSchoolId)), (snap) => {
            allVideos = [];
            snap.forEach(d => {
                const data = d.data();
                const c = data.course || '';
                const s = data.subject || '';
                if(c.toLowerCase() === 'undefined' || s.toLowerCase() === 'undefined') return; 
                
                allVideos.push({
                    id: d.id,
                    course: c,
                    subject: s,
                    targetClass: (!data.targetClass || data.targetClass.toLowerCase() === 'undefined') ? '' : data.targetClass,
                    teacherName: (!data.teacherName || data.teacherName.toLowerCase() === 'undefined') ? '' : data.teacherName,
                    title: (!data.title || data.title.toLowerCase() === 'undefined') ? 'Untitled' : data.title,
                    wistiaId: data.wistiaId,
                    notesUrl: data.notesUrl,
                    testUrl: data.testUrl,
                    createdAt: data.createdAt
                });
            });
            allVideos.sort((a, b) => (b.createdAt?.toMillis() || 0) - (a.createdAt?.toMillis() || 0));
            updateUI();
        });
    }

    function updateUI() {
        document.getElementById('view-courses').classList.add('hidden');
        document.getElementById('view-subjects').classList.add('hidden');
        document.getElementById('view-upload').classList.add('hidden');

        if (currentStep === 1) {
            headerTitle.innerText = "Manage Batches (Pro)";
            headerPath.innerText = "Admin / Courses";
            document.getElementById('view-courses').classList.remove('hidden');
            renderCourses();
        } 
        else if (currentStep === 2) {
            headerTitle.innerText = activeCourse;
            headerPath.innerText = `Courses / ${activeCourse}`;
            document.getElementById('view-subjects').classList.remove('hidden');
            document.getElementById('lblActiveCourse').innerText = activeCourse;
            renderSubjects();
        } 
        else if (currentStep === 3) {
            headerTitle.innerText = activeSubject;
            headerPath.innerText = `${activeCourse} / ${activeSubject}`;
            document.getElementById('view-upload').classList.remove('hidden');
            document.getElementById('lblActiveSubject').innerText = activeSubject;
            renderVideos();
        }
    }

    backBtn.onclick = () => {
        if (currentStep === 3) { currentStep = 2; updateUI(); }
        else if (currentStep === 2) { currentStep = 1; updateUI(); }
        else { window.location.href = 'teacher-dashboard.html'; }
    };

    function renderCourses() {
        const cList = document.getElementById('courseList');
        const courseSet = new Set(Object.keys(allCourseMeta));
        allVideos.forEach(v => { if(v.course && v.course.trim() !== "") courseSet.add(v.course); });
        
        const courses = Array.from(courseSet).sort();
        if (courses.length === 0) {
            cList.innerHTML = `<p class="text-sm text-slate-400 text-center py-4">No courses created yet.</p>`;
            return;
        }

        cList.innerHTML = "";
        courses.forEach(course => {
            const photo = allCourseMeta[course] || 'https://via.placeholder.com/150/e2e8f0/94a3b8?text=Course';
            cList.innerHTML += `
                <div onclick="selectCourse('${course}')" class="bg-white p-3 rounded-[20px] shadow-sm border border-slate-100 flex items-center gap-4 cursor-pointer active:scale-95 transition">
                    <img src="${photo}" class="w-14 h-14 rounded-xl object-cover border border-slate-100">
                    <div class="flex-1">
                        <h4 class="font-bold text-slate-800 text-sm">${course}</h4>
                        <p class="text-[11px] text-slate-400">Tap to view subjects</p>
                    </div>
                    <i class="fas fa-chevron-right text-slate-300"></i>
                </div>
            `;
        });
    }
    window.selectCourse = (cName) => { activeCourse = cName; currentStep = 2; updateUI(); };

    function renderSubjects() {
        const sList = document.getElementById('subjectList');
        const subjSet = new Set();
        allVideos.forEach(v => { if(v.course === activeCourse && v.subject && v.subject.trim() !== "") subjSet.add(v.subject); });
        
        const subjects = Array.from(subjSet).sort();
        if (subjects.length === 0) {
            sList.innerHTML = `<p class="text-sm text-slate-400 text-center py-4">No subjects found in this course.</p>`;
            return;
        }

        sList.innerHTML = "";
        subjects.forEach(subj => {
            sList.innerHTML += `
                <div onclick="selectSubject('${subj}')" class="bg-white p-4 rounded-[20px] shadow-sm border border-slate-100 flex items-center justify-between cursor-pointer active:scale-95 transition">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 bg-purple-50 text-purple-600 rounded-xl flex items-center justify-center"><i class="fas fa-book"></i></div>
                        <h4 class="font-bold text-slate-800 text-sm">${subj}</h4>
                    </div>
                    <i class="fas fa-chevron-right text-slate-300"></i>
                </div>
            `;
        });
    }
    window.selectSubject = (sName) => { activeSubject = sName; currentStep = 3; updateUI(); };

    function renderVideos() {
        const vList = document.getElementById('videoListContainer');
        const filteredVideos = allVideos.filter(v => v.course === activeCourse && v.subject === activeSubject);
        
        document.getElementById('videoCountBadge').innerText = filteredVideos.length;

        if (filteredVideos.length === 0) {
            vList.innerHTML = `<div class="bg-white p-6 rounded-[20px] text-center border border-slate-100"><p class="text-sm text-slate-400">No videos uploaded in this subject.</p></div>`;
            return;
        }

        vList.innerHTML = "";
        filteredVideos.forEach(video => {
            const safeTitle = (video.title || "Untitled").replace(/'/g, "\\'");
            const safeClassBadge = video.targetClass ? `<span class="bg-slate-100 text-slate-500 text-[9px] font-bold px-2 py-0.5 rounded-full">Class ${video.targetClass}</span>` : '';
            
            vList.innerHTML += `
                <div class="bg-white rounded-[20px] shadow-sm border border-slate-100 flex items-center gap-3 p-3">
                    <img src="https://fast.wistia.com/embed/medias/${video.wistiaId}/swatch" class="w-24 h-16 rounded-xl object-cover bg-slate-200 shrink-0">
                    <div class="flex-1 min-w-0">
                        <h4 class="font-bold text-slate-800 text-xs mb-1 truncate">${safeTitle}</h4>
                        <div class="flex items-center gap-1.5 flex-wrap">
                            ${safeClassBadge}
                            ${video.notesUrl ? `<span class="bg-emerald-100 text-emerald-700 text-[9px] font-bold px-2 py-0.5 rounded-full"><i class="fas fa-file-pdf"></i></span>` : ''}
                            ${video.testUrl ? `<span class="bg-purple-100 text-purple-700 text-[9px] font-bold px-2 py-0.5 rounded-full"><i class="fas fa-file-alt"></i></span>` : ''}
                        </div>
                    </div>
                    <button onclick="openDeleteModal('${video.id}', '${safeTitle}')" class="w-9 h-9 shrink-0 bg-red-50 hover:bg-red-100 text-red-500 rounded-full flex items-center justify-center active:scale-90"><i class="fas fa-trash-alt text-sm"></i></button>
                </div>`;
        });
    }

    window.openCourseModal = () => { document.getElementById('courseModal').classList.remove('hidden'); document.getElementById('courseModal').classList.add('flex'); };
    
    // 🌟 RESET FORM WHEN CLOSED
    window.closeCourseModal = () => { 
        document.getElementById('courseModal').classList.add('hidden'); 
        document.getElementById('courseModal').classList.remove('flex'); 
    };
    
    // 🌟 SAVE NEW DETAILS IN FIREBASE
    window.saveNewCourse = async () => {
        const cName = document.getElementById('newCourseName').value.trim();
        const cPrice = document.getElementById('coursePrice').value.trim() || "499";
        const cOrigPrice = document.getElementById('courseOriginalPrice').value.trim() || "1999";
        const cLang = document.getElementById('courseLanguage').value.trim() || "Hinglish";
        const cFeatures = document.getElementById('courseFeatures').value.trim() || "Full Syllabus Coverage, PDF Notes, Test Series";

        if(!cName || cName.toLowerCase() === 'undefined') return alert("Enter valid course name!");
        
        const metaId = `${adminSchoolId}_${cName}`.replace(/\s+/g, '_').toLowerCase();
        
        // Save to Database
        await setDoc(doc(db, "courseMeta", metaId), { 
            schoolId: adminSchoolId, 
            course: cName, 
            photoUrl: newCoursePhotoUrl || 'https://via.placeholder.com/600x338/e2e8f0/94a3b8?text=Course+Cover',
            price: Number(cPrice),
            originalPrice: Number(cOrigPrice),
            language: cLang,
            features: cFeatures
        }, { merge: true });
        
        // Clear inputs
        document.getElementById('newCourseName').value = '';
        document.getElementById('coursePrice').value = '';
        document.getElementById('courseOriginalPrice').value = '';
        document.getElementById('courseLanguage').value = '';

    // 🌟 VIDEO UPLOAD LOGIC UNTOUCHED
    function uploadWithProgress(formData, totalBytes) {
        return new Promise((resolve, reject) => {
            const xhr = new XMLHttpRequest();
            xhr.open('POST', 'https://upload.wistia.com/');
            xhr.setRequestHeader('Authorization', 'Bearer ' + WISTIA_ACCESS_TOKEN);
            xhr.upload.onprogress = (e) => {
                if (e.lengthComputable) {
                    const percent = Math.round((e.loaded / e.total) * 100);
                    document.getElementById('progressBar').style.width = percent + "%";
                    document.getElementById('progressPercent').innerText = percent + "%";
                    document.getElementById('progressBytes').innerText = `${formatBytes(e.loaded)} / ${formatBytes(e.total)}`;
                }
            };
            xhr.onload = () => { 
                if (xhr.status >= 200 && xhr.status < 300) resolve(JSON.parse(xhr.responseText)); 
                else reject(new Error("Wistia Error: " + xhr.responseText)); 
            };
            xhr.onerror = () => reject(new Error("Network connection error"));
            xhr.send(formData);
        });
    }
