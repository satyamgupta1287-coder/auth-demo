<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Direct Video Upload - Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }</style>
</head>
<body class="pb-10">

<div class="bg-blue-800 text-white px-5 py-5 rounded-b-[24px] shadow-md flex items-center gap-4 sticky top-0 z-50">
    <button onclick="window.location.href='teacher-dashboard.html'" class="text-white hover:text-blue-200 transition text-lg active:scale-95">
        <i class="fas fa-arrow-left"></i>
    </button>
    <h1 class="text-lg font-bold">Direct Video Upload</h1>
</div>

<div class="max-w-md mx-auto px-5 mt-6">
    <div class="bg-white p-5 rounded-[20px] shadow-sm border border-slate-100 mb-8">
        <h2 class="text-sm font-bold text-slate-800 mb-4"><i class="fas fa-cloud-upload-alt text-blue-500 mr-2"></i>Upload Video to Wistia</h2>
        <form id="videoForm" class="space-y-3" onsubmit="return false;">

            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">Target Class</label>
                    <input type="text" id="targetClass" required placeholder="e.g. 10" class="w-full p-2.5 text-sm border rounded-xl outline-none focus:border-blue-500 bg-slate-50">
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">Subject</label>
                    <input type="text" id="subject" required placeholder="e.g. Physics" class="w-full p-2.5 text-sm border rounded-xl outline-none focus:border-blue-500 bg-slate-50">
                </div>
            </div>

            <div>
                <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">Lecture Title / Topic</label>
                <input type="text" id="title" required placeholder="e.g. Newton's Laws" class="w-full p-2.5 text-sm border rounded-xl outline-none focus:border-blue-500 bg-slate-50">
            </div>

            <div class="border-2 border-dashed border-blue-200 rounded-xl p-4 text-center bg-blue-50 relative overflow-hidden">
                <input type="file" id="videoFile" accept="video/mp4,video/x-m4v,video/*" required class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10">
                <i class="fas fa-film text-blue-400 text-2xl mb-2"></i>
                <p class="text-xs font-bold text-slate-600 truncate px-2" id="fileNameText">Tap to select video (.mp4)</p>
                <p class="text-[10px] text-slate-400 mt-1" id="fileSizeText"></p>
            </div>

            <!-- Progress Bar -->
            <div id="progressWrap" class="hidden">
                <div class="w-full bg-slate-100 rounded-full h-2.5 overflow-hidden">
                    <div id="progressBar" class="bg-blue-600 h-2.5 rounded-full transition-all duration-150" style="width: 0%"></div>
                </div>
                <div class="flex justify-between mt-1">
                    <span class="text-[10px] font-bold text-blue-600" id="progressPercent">0%</span>
                    <span class="text-[10px] text-slate-400" id="progressBytes"></span>
                </div>
            </div>

            <button type="submit" id="submitBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl mt-2 transition shadow-md shadow-blue-100 flex justify-center items-center gap-2 relative overflow-hidden">
                <i class="fas fa-upload"></i> Start Upload & Publish
            </button>

            <p id="uploadStatus" class="text-[11px] text-center font-bold text-blue-600 hidden mt-2"></p>
        </form>
    </div>
</div>

<script type="module">
    import { auth, db } from '../js/firebase-init.js';
    import { collection, addDoc, getDoc, doc, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-auth.js";

    // Wistia Access Token (Bearer) - api_password ab deprecated hai, naya token Wistia Account > Settings > API Access se banao
    const WISTIA_ACCESS_TOKEN = "52e25c62ca626beb4dc90b4c6207ebc45861e5de7e6569d99c6ee0fe06b6b286";

    let adminSchoolId = null;
    const form = document.getElementById('videoForm');
    const submitBtn = document.getElementById('submitBtn');
    const fileInput = document.getElementById('videoFile');
    const fileNameText = document.getElementById('fileNameText');
    const fileSizeText = document.getElementById('fileSizeText');
    const uploadStatus = document.getElementById('uploadStatus');
    const progressWrap = document.getElementById('progressWrap');
    const progressBar = document.getElementById('progressBar');
    const progressPercent = document.getElementById('progressPercent');
    const progressBytes = document.getElementById('progressBytes');

    function formatBytes(bytes) {
        if (!bytes) return "0 MB";
        const mb = bytes / (1024 * 1024);
        return mb >= 1 ? mb.toFixed(1) + " MB" : (bytes / 1024).toFixed(0) + " KB";
    }

    // Jab file select ho tab naam + size dikhaye
    fileInput.addEventListener('change', (e) => {
        const selectedFile = e.target.files[0]; // ✅ FIX: [0] use karo, FileList nahi
        if (selectedFile) {
            fileNameText.innerText = selectedFile.name; // ✅ FIX: .files[0].name
            fileNameText.classList.add('text-blue-600');
            fileSizeText.innerText = formatBytes(selectedFile.size);
        } else {
            fileNameText.innerText = "Tap to select video (.mp4)";
            fileNameText.classList.remove('text-blue-600');
            fileSizeText.innerText = "";
        }
    });

    // Check Admin Login & get School ID
    onAuthStateChanged(auth, async (user) => {
        if (user) {
            const adminDoc = await getDoc(doc(db, "users", user.uid));
            if (adminDoc.exists()) {
                adminSchoolId = adminDoc.data().schoolId;
            }
        }
    });

    // XHR based upload so we get real progress events (fetch can't report upload progress)
    function uploadWithProgress(formData, totalBytes) {
        return new Promise((resolve, reject) => {
            const xhr = new XMLHttpRequest();
            xhr.open('POST', 'https://upload.wistia.com/');
            xhr.setRequestHeader('Authorization', 'Bearer ' + WISTIA_ACCESS_TOKEN);

            xhr.upload.onprogress = (event) => {
                if (event.lengthComputable) {
                    const percent = Math.round((event.loaded / event.total) * 100);
                    progressBar.style.width = percent + "%";
                    progressPercent.innerText = percent + "%";
                    progressBytes.innerText = `${formatBytes(event.loaded)} / ${formatBytes(event.total)}`;
                }
            };

            xhr.onload = () => {
                if (xhr.status >= 200 && xhr.status < 300) {
                    try {
                        resolve(JSON.parse(xhr.responseText));
                    } catch (err) {
                        reject(new Error("Invalid response from Wistia"));
                    }
                } else if (xhr.status === 401 || xhr.status === 403) {
                    reject(new Error("Auth failed (401/403) - check your Wistia Access Token / permissions"));
                } else {
                    reject(new Error("Wistia Error (" + xhr.status + "): " + xhr.responseText));
                }
            };

            xhr.onerror = () => reject(new Error("Network/CORS error - request never reached Wistia or was blocked"));

            xhr.send(formData);
        });
    }

    // Upload & Submit Logic
    form.addEventListener('submit', async () => {
        const file = fileInput.files[0]; // ✅ FIX: actual File object, not FileList
        if (!file) return alert("Please select a video file!");

        const title = document.getElementById('title').value.trim();
        const targetClass = document.getElementById('targetClass').value.trim();
        const subject = document.getElementById('subject').value.trim();

        submitBtn.disabled = true;
        submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Uploading to Wistia...';
        uploadStatus.classList.remove('hidden');
        uploadStatus.innerText = "Please wait, uploading video... (Do not close this app)";
        uploadStatus.classList.remove('text-emerald-600', 'text-red-600');
        uploadStatus.classList.add('text-blue-600');

        progressWrap.classList.remove('hidden');
        progressBar.style.width = "0%";
        progressPercent.innerText = "0%";
        progressBytes.innerText = `0 MB / ${formatBytes(file.size)}`;

        try {
            const formData = new FormData();
            formData.append('file', file); // ✅ FIX: real File object
            formData.append('name', title);

            const wistiaData = await uploadWithProgress(formData, file.size);
            const generatedWistiaId = wistiaData.hashed_id;

            uploadStatus.innerText = "Saving to Firebase Database...";

            // Firebase me entry save karna
            await addDoc(collection(db, "videos"), {
                schoolId: adminSchoolId,
                targetClass: targetClass,
                subject: subject,
                title: title,
                wistiaId: generatedWistiaId,
                createdAt: serverTimestamp()
            });

            // Success Hone par Form Reset
            form.reset();
            fileNameText.innerText = "Tap to select video (.mp4)";
            fileNameText.classList.remove('text-blue-600');
            fileSizeText.innerText = "";
            progressBar.style.width = "100%";
            progressPercent.innerText = "100%";
            uploadStatus.innerText = "✅ Video published successfully!";
            uploadStatus.classList.remove('text-blue-600');
            uploadStatus.classList.add('text-emerald-600');

            setTimeout(() => {
                uploadStatus.classList.add('hidden');
                progressWrap.classList.add('hidden');
            }, 4000);

        } catch (error) {
            // Agar fail hua to screen par error text dikhega
            uploadStatus.innerText = "❌ Failed: " + error.message;
            uploadStatus.classList.remove('text-blue-600');
            uploadStatus.classList.add('text-red-600');
            alert(error.message);
        }

        submitBtn.innerHTML = '<i class="fas fa-upload"></i> Start Upload & Publish';
        submitBtn.disabled = false;
    });
</script>
</body>
</html>
