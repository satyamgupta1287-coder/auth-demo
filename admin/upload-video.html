<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Direct Video Upload - Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://upload-widget.cloudinary.com/global/all.js" type="text/javascript"></script>
    <style>body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }</style>
</head>
<body class="pb-10">

<div class="bg-blue-800 text-white px-5 py-5 rounded-b-[24px] shadow-md flex items-center gap-4 sticky top-0 z-50">
    <button onclick="window.location.href='teacher-dashboard.html'" class="text-white hover:text-blue-200 transition text-lg active:scale-95">
        <i class="fas fa-arrow-left"></i>
    </button>
    <h1 class="text-lg font-bold">Direct Video Upload</h1>
</div>

<div class="max-w-md mx-auto px-5 mt-6">
    <div class="bg-white p-5 rounded-[20px] shadow-sm border border-slate-100 mb-8">
        <h2 class="text-sm font-bold text-slate-800 mb-4"><i class="fas fa-cloud-upload-alt text-blue-500 mr-2"></i>Upload Video & Materials</h2>
        <form id="videoForm" class="space-y-3" onsubmit="return false;">

            <div>
                <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">Course / Category</label>
                <input type="text" id="course" required placeholder="e.g. JEE Prep, Foundation Batch" class="w-full p-2.5 text-sm border rounded-xl outline-none focus:border-blue-500 bg-slate-50">
            </div>

            <div>
                <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">Course Photo (One time)</label>
                <button type="button" id="coursePhotoBtn" class="w-full p-2.5 text-sm border-2 border-dashed border-blue-200 rounded-xl bg-blue-50 text-blue-600 font-bold flex items-center justify-center gap-2">
                    <i class="fas fa-image"></i> <span id="coursePhotoLabel">Upload Course Cover Photo</span>
                </button>
                <div id="coursePhotoPreviewWrap" class="hidden mt-2">
                    <img id="coursePhotoPreview" class="w-full h-28 object-cover rounded-xl border border-slate-100" />
                </div>
            </div>

            <div>
                <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">Teacher Name</label>
                <input type="text" id="teacherName" required placeholder="e.g. Mr. Sharma" class="w-full p-2.5 text-sm border rounded-xl outline-none focus:border-blue-500 bg-slate-50">
            </div>

            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">Target Class</label>
                    <input type="text" id="targetClass" required placeholder="e.g. 10" class="w-full p-2.5 text-sm border rounded-xl outline-none focus:border-blue-500 bg-slate-50">
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">Subject</label>
                    <input type="text" id="subject" required placeholder="e.g. Physics" class="w-full p-2.5 text-sm border rounded-xl outline-none focus:border-blue-500 bg-slate-50">
                </div>
            </div>

            <div>
                <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">Lecture Title / Topic</label>
                <input type="text" id="title" required placeholder="e.g. Newton's Laws" class="w-full p-2.5 text-sm border rounded-xl outline-none focus:border-blue-500 bg-slate-50">
            </div>

            <div class="border-2 border-dashed border-blue-200 rounded-xl p-4 text-center bg-blue-50 relative overflow-hidden">
                <input type="file" id="videoFile" accept="video/mp4,video/x-m4v,video/*" required class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10">
                <i class="fas fa-film text-blue-400 text-2xl mb-2"></i>
                <p class="text-xs font-bold text-slate-600 truncate px-2" id="fileNameText">Tap to select video (.mp4)</p>
                <p class="text-[10px] text-slate-400 mt-1" id="fileSizeText"></p>
            </div>

            <div class="grid grid-cols-2 gap-3 pt-1">
                <button type="button" id="notesBtn" class="p-3 border border-emerald-200 rounded-xl bg-emerald-50 text-emerald-600 flex flex-col items-center justify-center gap-1 active:scale-95 transition">
                    <i class="fas fa-file-pdf text-xl mb-1"></i>
                    <span id="notesLabel" class="text-[10px] font-bold uppercase tracking-wide">Attach Notes</span>
                </button>
                <button type="button" id="testBtn" class="p-3 border border-purple-200 rounded-xl bg-purple-50 text-purple-600 flex flex-col items-center justify-center gap-1 active:scale-95 transition">
                    <i class="fas fa-file-alt text-xl mb-1"></i>
                    <span id="testLabel" class="text-[10px] font-bold uppercase tracking-wide">Attach DPP / Test</span>
                </button>
            </div>

            <div id="progressWrap" class="hidden mt-3">
                <div class="w-full bg-slate-100 rounded-full h-2.5 overflow-hidden">
                    <div id="progressBar" class="bg-blue-600 h-2.5 rounded-full transition-all duration-150" style="width: 0%"></div>
                </div>
                <div class="flex justify-between mt-1">
                    <span class="text-[10px] font-bold text-blue-600" id="progressPercent">0%</span>
                    <span class="text-[10px] text-slate-400" id="progressBytes"></span>
                </div>
            </div>

            <button type="submit" id="submitBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl mt-3 transition shadow-md shadow-blue-100 flex justify-center items-center gap-2 relative overflow-hidden">
                <i class="fas fa-upload"></i> Start Upload & Publish
            </button>

            <p id="uploadStatus" class="text-[11px] text-center font-bold text-blue-600 hidden mt-2"></p>
        </form>
    </div>

    <div class="mb-8">
        <h2 class="text-sm font-bold text-slate-800 mb-4 px-1 flex items-center gap-2">
            <i class="fas fa-list text-blue-500"></i> Your Uploaded Videos
        </h2>
        <div id="videoListContainer" class="space-y-3">
            <div class="bg-white p-6 rounded-[20px] shadow-sm border border-slate-100 text-center">
                <p class="text-sm text-slate-400 font-medium"><i class="fas fa-spinner fa-spin mr-2"></i>Loading videos...</p>
            </div>
        </div>
    </div>
</div>

<div id="deleteModal" class="fixed inset-0 z- bg-black/60 backdrop-blur-sm hidden flex items-center justify-center px-6">
    <div class="bg-white w-full max-w-sm rounded-[20px] p-5 shadow-2xl">
        <div class="w-12 h-12 bg-red-50 rounded-full flex items-center justify-center text-red-500 text-xl mb-3">
            <i class="fas fa-trash-alt"></i>
        </div>
        <h3 class="font-bold text-slate-800 text-sm mb-1">Delete this video?</h3>
        <p id="deleteModalTitle" class="text-xs text-slate-500 mb-4">This action cannot be undone.</p>
        <div class="flex gap-2">
            <button onclick="closeDeleteModal()" class="flex-1 py-2.5 rounded-xl bg-slate-100 text-slate-600 text-sm font-bold active:scale-95 transition">Cancel</button>
            <button onclick="confirmDelete()" class="flex-1 py-2.5 rounded-xl bg-red-600 text-white text-sm font-bold active:scale-95 transition">Delete</button>
        </div>
    </div>
</div>

<script type="module">
    import { auth, db } from '../js/firebase-init.js';
    import { collection, addDoc, getDoc, doc, deleteDoc, query, where, onSnapshot, serverTimestamp, setDoc } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-auth.js";

    const WISTIA_ACCESS_TOKEN = "52e25c62ca626beb4dc90b4c6207ebc45861e5de7e6569d99c6ee0fe06b6b286";

    let coursePhotoUrl = "";
    let notesUrl = "";
    let testUrl = "";
    let adminSchoolId = null;
    let pendingDeleteId = null;

    const form = document.getElementById('videoForm');
    const submitBtn = document.getElementById('submitBtn');
    const fileInput = document.getElementById('videoFile');
    const fileNameText = document.getElementById('fileNameText');
    const fileSizeText = document.getElementById('fileSizeText');
    const uploadStatus = document.getElementById('uploadStatus');
    const progressWrap = document.getElementById('progressWrap');
    const progressBar = document.getElementById('progressBar');
    const progressPercent = document.getElementById('progressPercent');
    const progressBytes = document.getElementById('progressBytes');
    const videoListContainer = document.getElementById('videoListContainer');
    const deleteModal = document.getElementById('deleteModal');
    const deleteModalTitle = document.getElementById('deleteModalTitle');

    // Smart Auto-Fill
    document.getElementById('course').value = localStorage.getItem('ast_course') || '';
    document.getElementById('teacherName').value = localStorage.getItem('ast_teacher') || '';
    document.getElementById('targetClass').value = localStorage.getItem('ast_class') || '';
    document.getElementById('subject').value = localStorage.getItem('ast_subject') || '';

    function formatBytes(bytes) {
        if (!bytes) return "0 MB";
        const mb = bytes / (1024 * 1024);
        return mb >= 1 ? mb.toFixed(1) + " MB" : (bytes / 1024).toFixed(0) + " KB";
    }

    // Cloudinary Widgets
    const coursePhotoWidget = cloudinary.createUploadWidget({ cloudName: 'dl1cddemu', uploadPreset: 'upload', resourceType: 'image' }, (e, r) => {
        if (!e && r && r.event === "success") {
            coursePhotoUrl = r.info.secure_url;
            document.getElementById('coursePhotoLabel').innerText = "Photo selected ✓";
            document.getElementById('coursePhotoPreviewWrap').classList.remove('hidden');
            document.getElementById('coursePhotoPreview').src = coursePhotoUrl;
        }
    });
    document.getElementById('coursePhotoBtn').addEventListener('click', () => coursePhotoWidget.open());

    // 🌟 Notes & Test Upload Widgets (PDF + Image support)
    const notesWidget = cloudinary.createUploadWidget({ cloudName: 'dl1cddemu', uploadPreset: 'upload', resourceType: 'auto' }, (e, r) => {
        if (!e && r && r.event === "success") {
            notesUrl = r.info.secure_url;
            document.getElementById('notesLabel').innerText = "Notes Attached ✓";
            document.getElementById('notesBtn').classList.replace('bg-emerald-50', 'bg-emerald-100');
        }
    });
    document.getElementById('notesBtn').addEventListener('click', () => notesWidget.open());

    const testWidget = cloudinary.createUploadWidget({ cloudName: 'dl1cddemu', uploadPreset: 'upload', resourceType: 'auto' }, (e, r) => {
        if (!e && r && r.event === "success") {
            testUrl = r.info.secure_url;
            document.getElementById('testLabel').innerText = "Test Attached ✓";
            document.getElementById('testBtn').classList.replace('bg-purple-50', 'bg-purple-100');
        }
    });
    document.getElementById('testBtn').addEventListener('click', () => testWidget.open());


    fileInput.addEventListener('change', (e) => {
        const selectedFile = e.target.files;
        if (selectedFile) {
            fileNameText.innerText = selectedFile.name;
            fileNameText.classList.add('text-blue-600');
            fileSizeText.innerText = formatBytes(selectedFile.size);
        } else {
            fileNameText.innerText = "Tap to select video (.mp4)";
            fileNameText.classList.remove('text-blue-600');
            fileSizeText.innerText = "";
        }
    });

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            const adminDoc = await getDoc(doc(db, "users", user.uid));
            if (adminDoc.exists()) {
                adminSchoolId = adminDoc.data().schoolId;
                loadVideoList();
            }
        }
    });

    function loadVideoList() {
        const q = query(collection(db, "videos"), where("schoolId", "==", adminSchoolId));
        onSnapshot(q, (snapshot) => {
            let videos = [];
            snapshot.forEach((d) => videos.push({ id: d.id, ...d.data() }));

            if (videos.length === 0) {
                videoListContainer.innerHTML = `<div class="bg-white p-6 rounded-[20px] shadow-sm border border-slate-100 text-center"><p class="text-sm text-slate-400 font-medium">No videos uploaded yet.</p></div>`;
                return;
            }

            videos.sort((a, b) => (b.createdAt?.toMillis() || 0) - (a.createdAt?.toMillis() || 0));
            videoListContainer.innerHTML = "";
            videos.forEach((video) => {
                const safeTitle = (video.title || "Untitled").replace(/'/g, "\\'").replace(/"/g, "&quot;");
                videoListContainer.innerHTML += `
                    <div class="bg-white rounded-[20px] shadow-sm border border-slate-100 overflow-hidden flex items-center gap-3 p-3">
                        <img src="https://fast.wistia.com/embed/medias/${video.wistiaId}/swatch" class="w-20 h-14 rounded-lg object-cover bg-slate-200 shrink-0" onerror="this.style.display='none'">
                        <div class="flex-1 min-w-0">
                            <div class="flex items-center gap-1.5 mb-1 flex-wrap">
                                ${video.course ? `<span class="bg-purple-100 text-purple-700 text-[9px] font-bold px-2 py-0.5 rounded-full uppercase">${video.course}</span>` : ''}
                                ${video.notesUrl ? `<span class="bg-emerald-100 text-emerald-700 text-[9px] font-bold px-2 py-0.5 rounded-full"><i class="fas fa-file-pdf"></i> Notes</span>` : ''}
                                ${video.testUrl ? `<span class="bg-purple-100 text-purple-700 text-[9px] font-bold px-2 py-0.5 rounded-full"><i class="fas fa-file-alt"></i> DPP</span>` : ''}
                            </div>
                            <h4 class="font-bold text-slate-800 text-xs truncate">${video.title || 'Untitled'}</h4>
                        </div>
                        <button onclick="openDeleteModal('${video.id}', '${safeTitle}')" class="w-9 h-9 shrink-0 bg-red-50 hover:bg-red-100 text-red-500 rounded-full flex items-center justify-center transition active:scale-90"><i class="fas fa-trash-alt text-sm"></i></button>
                    </div>`;
            });
        });
    }

    window.openDeleteModal = function (videoId, title) {
        pendingDeleteId = videoId;
        deleteModalTitle.innerText = `"${title}" will be permanently removed.`;
        deleteModal.classList.remove('hidden');
        deleteModal.classList.add('flex');
    };
    window.closeDeleteModal = function () {
        pendingDeleteId = null;
        deleteModal.classList.add('hidden');
        deleteModal.classList.remove('flex');
    };
    window.confirmDelete = async function () {
        if (!pendingDeleteId) return;
        try { await deleteDoc(doc(db, "videos", pendingDeleteId)); } catch (err) { alert("Failed: " + err.message); }
        closeDeleteModal();
    };

    function uploadWithProgress(formData, totalBytes) {
        return new Promise((resolve, reject) => {
            const xhr = new XMLHttpRequest();
            xhr.open('POST', 'https://upload.wistia.com/');
            xhr.setRequestHeader('Authorization', 'Bearer ' + WISTIA_ACCESS_TOKEN);

            xhr.upload.onprogress = (event) => {
                if (event.lengthComputable) {
                    const percent = Math.round((event.loaded / event.total) * 100);
                    progressBar.style.width = percent + "%";
                    progressPercent.innerText = percent + "%";
                    progressBytes.innerText = `${formatBytes(event.loaded)} / ${formatBytes(event.total)}`;
                }
            };
            xhr.onload = () => {
                if (xhr.status >= 200 && xhr.status < 300) resolve(JSON.parse(xhr.responseText));
                else reject(new Error("Wistia Error: " + xhr.responseText));
            };
            xhr.onerror = () => reject(new Error("Network error"));
            xhr.send(formData);
        });
    }

    form.addEventListener('submit', async () => {
        const file = fileInput.files;
        if (!file) return alert("Please select a video file!");

        const course = document.getElementById('course').value.trim();
        const teacherName = document.getElementById('teacherName').value.trim();
        const title = document.getElementById('title').value.trim();
        const targetClass = document.getElementById('targetClass').value.trim();
        const subject = document.getElementById('subject').value.trim();

        localStorage.setItem('ast_course', course);
        localStorage.setItem('ast_teacher', teacherName);
        localStorage.setItem('ast_class', targetClass);
        localStorage.setItem('ast_subject', subject);

        submitBtn.disabled = true;
        submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Uploading...';
        uploadStatus.classList.remove('hidden', 'text-emerald-600', 'text-red-600');
        uploadStatus.classList.add('text-blue-600');
        uploadStatus.innerText = "Please wait, uploading video...";
        progressWrap.classList.remove('hidden');
        progressBar.style.width = "0%";

        try {
            const formData = new FormData();
            formData.append('file', file);
            formData.append('name', title);

            const wistiaData = await uploadWithProgress(formData, file.size);
            const generatedWistiaId = wistiaData.hashed_id;

            if (coursePhotoUrl && course) {
                const courseMetaId = `${adminSchoolId}_${course}`.replace(/\s+/g, '_').toLowerCase();
                await setDoc(doc(db, "courseMeta", courseMetaId), {
                    schoolId: adminSchoolId,
                    course: course,
                    photoUrl: coursePhotoUrl
                }, { merge: true });
            }

            await addDoc(collection(db, "videos"), {
                schoolId: adminSchoolId,
                course: course,
                teacherName: teacherName,
                targetClass: targetClass,
                subject: subject,
                title: title,
                wistiaId: generatedWistiaId,
                notesUrl: notesUrl, // 🌟 Save Notes URL
                testUrl: testUrl,   // 🌟 Save Test URL
                createdAt: serverTimestamp()
            });

            document.getElementById('title').value = '';
            fileInput.value = '';
            fileNameText.innerText = "Tap to select video (.mp4)";
            fileNameText.classList.remove('text-blue-600');
            fileSizeText.innerText = "";
            
            // 🌟 Reset File buttons for next video
            notesUrl = "";
            testUrl = "";
            document.getElementById('notesLabel').innerText = "Attach Notes";
            document.getElementById('testLabel').innerText = "Attach DPP / Test";
            document.getElementById('notesBtn').classList.replace('bg-emerald-100', 'bg-emerald-50');
            document.getElementById('testBtn').classList.replace('bg-purple-100', 'bg-purple-50');

            progressBar.style.width = "100%";
            progressPercent.innerText = "100%";
            uploadStatus.innerText = "✅ Video published successfully!";
            uploadStatus.classList.replace('text-blue-600', 'text-emerald-600');

            setTimeout(() => {
                uploadStatus.classList.add('hidden');
                progressWrap.classList.add('hidden');
            }, 4000);

        } catch (error) {
            uploadStatus.innerText = "❌ Failed: " + error.message;
            uploadStatus.classList.replace('text-blue-600', 'text-red-600');
            alert(error.message);
        }

        submitBtn.innerHTML = '<i class="fas fa-upload"></i> Start Upload & Publish';
        submitBtn.disabled = false;
    });
</script>
</body>
</html>
