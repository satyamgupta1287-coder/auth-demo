<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Online Tests</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 p-4 font-sans pb-20">

<div class="max-w-xl mx-auto">
    <div class="flex justify-between items-center bg-white p-4 rounded-2xl shadow-sm mb-4">
        <button onclick="window.location.href='admin.html'" class="text-gray-500 hover:text-purple-600 transition">
            <i class="fas fa-arrow-left text-xl"></i>
        </button>
        <h1 class="text-xl font-bold text-gray-800">Create Mock Test</h1>
        <div></div>
    </div>

    <div class="bg-white rounded-2xl shadow-sm p-6 mb-6 border-t-4 border-purple-600">
        <h2 class="text-sm font-bold text-gray-400 uppercase mb-4"><i class="fas fa-cogs text-purple-500 mr-2"></i>Step 1: Test Details</h2>
        
        <div class="space-y-4">
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">Test Title *</label>
                <input type="text" id="testTitle" placeholder="e.g., Weekly Math Test - 1" class="w-full p-3 border border-gray-200 rounded-xl outline-none bg-gray-50 focus:ring-2 focus:ring-purple-500">
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">Target Class *</label>
                    <input type="text" id="targetClass" placeholder="e.g., 10" class="w-full p-3 border border-gray-200 rounded-xl outline-none bg-gray-50 focus:ring-2 focus:ring-purple-500">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">Duration (Minutes) *</label>
                    <input type="number" id="testDuration" placeholder="e.g., 30" class="w-full p-3 border border-gray-200 rounded-xl outline-none bg-gray-50 focus:ring-2 focus:ring-purple-500">
                </div>
            </div>
        </div>
    </div>

    <div class="bg-white rounded-2xl shadow-sm p-6 mb-6">
        <div class="flex justify-between items-center mb-4">
            <h2 class="text-sm font-bold text-gray-400 uppercase"><i class="fas fa-list-ol text-purple-500 mr-2"></i>Step 2: Add Questions</h2>
        </div>

        <div id="questionsContainer" class="space-y-6">
            </div>

        <button onclick="addQuestionBlock()" class="mt-4 w-full bg-purple-50 text-purple-600 font-bold py-3 rounded-xl border border-purple-200 hover:bg-purple-100 transition border-dashed">
            <i class="fas fa-plus-circle mr-2"></i> Add Question
        </button>
    </div>

    <button onclick="saveTestToDB()" id="publishBtn" class="w-full bg-purple-600 text-white font-bold py-4 rounded-xl hover:bg-purple-700 shadow-lg transition flex justify-center items-center text-lg mb-8">
        <i class="fas fa-cloud-upload-alt mr-2"></i> Publish Full Test
    </button>

    <div class="bg-white rounded-2xl shadow-sm p-6">
        <h2 class="text-lg font-bold text-gray-800 mb-4 border-b pb-2">Active Published Tests</h2>
        <div id="testList" class="space-y-3">
            <p class="text-center text-sm text-gray-400 py-4">Loading tests...</p>
        </div>
    </div>
</div>

<script type="module">
    import { auth, db } from '../js/firebase-init.js';
    import { collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";

    let questionCount = 0;

    window.addQuestionBlock = () => {
        questionCount++;
        const qHtml = `
            <div class="p-4 border border-gray-200 rounded-xl bg-gray-50 relative question-block" id="qBlock-${questionCount}">
                <button onclick="removeQuestionBlock(${questionCount})" class="absolute top-2 right-3 text-red-400 hover:text-red-600"><i class="fas fa-times"></i></button>
                <p class="text-xs font-bold text-purple-600 mb-2 uppercase">Question ${questionCount}</p>
                
                <textarea class="q-text w-full p-3 border border-gray-200 rounded-lg outline-none mb-3 text-sm focus:ring-2 focus:ring-purple-400" placeholder="Type your question here..."></textarea>
                
                <div class="grid grid-cols-2 gap-2 mb-3">
                    <input type="text" class="opt-a p-2 border border-gray-200 rounded-lg text-sm outline-none" placeholder="Option A">
                    <input type="text" class="opt-b p-2 border border-gray-200 rounded-lg text-sm outline-none" placeholder="Option B">
                    <input type="text" class="opt-c p-2 border border-gray-200 rounded-lg text-sm outline-none" placeholder="Option C">
                    <input type="text" class="opt-d p-2 border border-gray-200 rounded-lg text-sm outline-none" placeholder="Option D">
                </div>

                <div>
                    <label class="text-xs font-bold text-gray-600 mr-2">Correct Answer:</label>
                    <select class="correct-opt p-2 border border-gray-200 rounded-lg text-sm outline-none bg-white">
                        <option value="A">Option A</option>
                        <option value="B">Option B</option>
                        <option value="C">Option C</option>
                        <option value="D">Option D</option>
                    </select>
                </div>
            </div>
        `;
        document.getElementById('questionsContainer').insertAdjacentHTML('beforeend', qHtml);
    };

    window.removeQuestionBlock = (id) => { document.getElementById(`qBlock-${id}`).remove(); };
    addQuestionBlock(); // Load first default

    window.saveTestToDB = async () => {
        const title = document.getElementById('testTitle').value;
        const targetClass = document.getElementById('targetClass').value;
        const duration = document.getElementById('testDuration').value;
        const publishBtn = document.getElementById('publishBtn');

        if(!title || !targetClass || !duration) return alert("Please fill Test Title, Class, and Duration.");

        const questionBlocks = document.querySelectorAll('.question-block');
        const questionsArray = [];
        if(questionBlocks.length === 0) return alert("Please add at least one question.");

        let hasError = false;
        questionBlocks.forEach((block) => {
            const qText = block.querySelector('.q-text').value;
            const optA = block.querySelector('.opt-a').value;
            const optB = block.querySelector('.opt-b').value;
            const optC = block.querySelector('.opt-c').value;
            const optD = block.querySelector('.opt-d').value;
            const correctOpt = block.querySelector('.correct-opt').value;

            if(!qText || !optA || !optB || !optC || !optD) hasError = true;
            questionsArray.push({ question: qText, options: { A: optA, B: optB, C: optC, D: optD }, correctAnswer: correctOpt });
        });

        if(hasError) return alert("Please fill all questions and options completely.");

        publishBtn.disabled = true;
        publishBtn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> Publishing...';

        try {
            await addDoc(collection(db, "tests"), {
                title, targetClass, duration: parseInt(duration),
                totalQuestions: questionsArray.length, questions: questionsArray,
                createdAt: serverTimestamp()
            });
            alert("Test Published Successfully! 🎉");
            window.location.reload();
        } catch (error) {
            alert("Error saving test: " + error.message);
            publishBtn.disabled = false;
            publishBtn.innerHTML = '<i class="fas fa-cloud-upload-alt mr-2"></i> Publish Full Test';
        }
    };

    // DISPLAY TESTS
    const q = query(collection(db, "tests"), orderBy("createdAt", "desc"));
    onSnapshot(q, (snapshot) => {
        const list = document.getElementById('testList');
        list.innerHTML = "";
        if (snapshot.empty) return list.innerHTML = `<p class="text-center text-sm text-gray-400 py-4">No tests published yet.</p>`;

        snapshot.forEach((docSnap) => {
            const data = docSnap.data();
            list.innerHTML += `
                <div class="p-3 border rounded-xl bg-gray-50 flex justify-between items-center">
                    <div>
                        <span class="text-[10px] font-bold px-2 py-0.5 rounded uppercase bg-purple-100 text-purple-600 mb-1 inline-block">Class ${data.targetClass}</span>
                        <h4 class="font-bold text-gray-800 text-sm line-clamp-1">${data.title}</h4>
                        <p class="text-[11px] text-gray-500 mt-0.5">${data.totalQuestions} Questions • ${data.duration} Mins</p>
                    </div>
                    <button onclick="deleteTest('${docSnap.id}')" class="bg-white text-red-500 p-2 rounded-lg text-xs font-bold border border-gray-200 hover:bg-red-50 transition shadow-sm"><i class="fas fa-trash"></i></button>
                </div>
            `;
        });
    });

    window.deleteTest = async (id) => { if(confirm("Are you sure you want to delete this Test?")) await deleteDoc(doc(db, "tests", id)); };
</script>
</body>
</html>
