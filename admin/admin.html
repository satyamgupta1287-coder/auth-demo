<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-gray-50 font-sans pb-20 min-h-screen">

<div class="max-w-md mx-auto">
    
    <div class="bg-gradient-to-r from-violet-600 to-fuchsia-600 rounded-b-[2rem] p-6 text-white shadow-lg relative pb-12">
        <div class="flex justify-between items-center mb-4">
            <div>
                <h1 class="text-2xl font-bold">Admin Dashboard</h1>
                <p class="text-sm text-white/80" id="adminWelcomeMsg">Welcome back, Admin</p>
            </div>
            <button id="logoutBtn" class="bg-white/20 hover:bg-white/30 p-2.5 rounded-xl backdrop-blur-sm transition">
                <i class="fas fa-sign-out-alt"></i>
            </button>
        </div>
    </div>

    <div class="px-4 -mt-8 relative z-10">
        <div class="grid grid-cols-2 gap-4">
            <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 flex flex-col items-center justify-center">
                <p class="text-[10px] text-gray-400 font-bold uppercase tracking-wider mb-1">Total Students</p>
                <h2 class="text-3xl font-bold text-violet-600" id="totalStudentsCount">0</h2>
            </div>
            <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 flex flex-col items-center justify-center">
                <p class="text-[10px] text-gray-400 font-bold uppercase tracking-wider mb-1">Total Staff</p>
                <h2 class="text-3xl font-bold text-fuchsia-600" id="totalTeachersCount">0</h2> 
            </div>
        </div>
    </div>

    <div class="px-4 mt-8">
        <h2 class="text-lg font-bold text-gray-800 mb-4 px-1">Quick Actions</h2>
        
        <div class="grid grid-cols-2 gap-3">
            
            <button onclick="window.location.href='manage-staff.html'" class="bg-fuchsia-50 p-4 rounded-2xl flex flex-col items-center border border-fuchsia-100 hover:bg-fuchsia-100 transition shadow-sm">
                <i class="fas fa-user-tie text-fuchsia-600 text-2xl mb-2"></i>
                <span class="text-xs font-bold text-gray-700">Staff & Teachers</span>
            </button>

            <button onclick="window.location.href='manage-students.html'" class="bg-blue-50 p-4 rounded-2xl flex flex-col items-center border border-blue-100 hover:bg-blue-100 transition shadow-sm">
                <i class="fas fa-users-cog text-blue-600 text-2xl mb-2"></i>
                <span class="text-xs font-bold text-gray-700">Students</span>
            </button>
            
            <button onclick="window.location.href='manage-attendance.html'" class="bg-emerald-50 p-4 rounded-2xl flex flex-col items-center border border-emerald-100 hover:bg-emerald-100 transition shadow-sm">
                <i class="fas fa-check-circle text-emerald-600 text-2xl mb-2"></i>
                <span class="text-xs font-bold text-gray-700">Attendance</span>
            </button>

            <button onclick="window.location.href='manage-fees.html'" class="bg-teal-50 p-4 rounded-2xl flex flex-col items-center border border-teal-100 hover:bg-teal-100 transition shadow-sm">
                <i class="fas fa-wallet text-teal-600 text-2xl mb-2"></i>
                <span class="text-xs font-bold text-gray-700">Fees Mgmt</span>
            </button>

            <button onclick="window.location.href='manage-notices.html'" class="bg-amber-50 p-4 rounded-2xl flex flex-col items-center border border-amber-100 hover:bg-amber-100 transition shadow-sm">
                <i class="fas fa-bullhorn text-amber-500 text-2xl mb-2"></i>
                <span class="text-xs font-bold text-gray-700">Notices</span>
            </button>

            <button onclick="window.location.href='manage-classes.html'" class="bg-red-50 p-4 rounded-2xl flex flex-col items-center border border-red-100 hover:bg-red-100 transition shadow-sm">
                <i class="fas fa-video text-red-500 text-2xl mb-2"></i>
                <span class="text-xs font-bold text-gray-700">Live Classes</span>
            </button>

            <button onclick="window.location.href='manage-materials.html'" class="bg-indigo-50 p-4 rounded-2xl flex flex-col items-center border border-indigo-100 hover:bg-indigo-100 transition shadow-sm">
                <i class="fas fa-book-open text-indigo-600 text-2xl mb-2"></i>
                <span class="text-xs font-bold text-gray-700">Materials</span>
            </button>

            <button onclick="window.location.href='manage-tests.html'" class="bg-purple-50 p-4 rounded-2xl flex flex-col items-center border border-purple-100 hover:bg-purple-100 transition shadow-sm">
                <i class="fas fa-laptop-code text-purple-600 text-2xl mb-2"></i>
                <span class="text-xs font-bold text-gray-700">Create Test</span>
            </button>

            <button onclick="window.location.href='view-results.html'" class="bg-orange-50 p-4 rounded-2xl flex flex-col items-center border border-orange-100 hover:bg-orange-100 transition shadow-sm">
                <i class="fas fa-trophy text-orange-600 text-2xl mb-2"></i>
                <span class="text-xs font-bold text-gray-700">Test Results</span>
            </button>

            <button onclick="window.location.href='manage-doubts.html'" class="bg-cyan-50 p-4 rounded-2xl flex flex-col items-center border border-cyan-100 hover:bg-cyan-100 transition shadow-sm">
                <i class="fas fa-question-circle text-cyan-600 text-2xl mb-2"></i>
                <span class="text-xs font-bold text-gray-700">Solve Doubts</span>
            </button>

            <button onclick="window.location.href='manage-gallery.html'" class="bg-pink-50 p-4 rounded-2xl flex flex-col items-center border border-pink-100 hover:bg-pink-100 transition shadow-sm">
                <i class="fas fa-images text-pink-500 text-2xl mb-2"></i>
                <span class="text-xs font-bold text-gray-700">Gallery</span>
            </button>

            <button onclick="window.location.href='create-assignment.html'" class="bg-purple-50 p-4 rounded-2xl flex flex-col items-center justify-center text-center border border-purple-100 hover:bg-purple-100 transition shadow-sm">
                <i class="fas fa-clipboard-list text-purple-600 mb-2 text-2xl"></i>
                <span class="text-[12px] font-bold text-gray-700">Assignments</span>
            </button>

            <!-- Manage Leaves -->
<button onclick="window.location.href='mange-leaves.html'"
    class="bg-green-50 p-4 rounded-2xl flex flex-col items-center border border-green-100 hover:bg-green-100 transition shadow-sm">
    <i class="fas fa-calendar-check text-green-600 text-2xl mb-2"></i>
    <span class="text-xs font-bold text-gray-700">Manage Leaves</span>
</button>

<!-- Manage Timetable -->
<button onclick="window.location.href='manage-timetable.html'"
    class="bg-sky-50 p-4 rounded-2xl flex flex-col items-center border border-sky-100 hover:bg-sky-100 transition shadow-sm">
    <i class="fas fa-calendar-days text-sky-600 text-2xl mb-2"></i>
    <span class="text-xs font-bold text-gray-700">Manage Timetable</span>
</button>

<!-- Manage Feedback -->
<button onclick="window.location.href='view-feedback.html'"
    class="bg-violet-50 p-4 rounded-2xl flex flex-col items-center border border-violet-100 hover:bg-violet-100 transition shadow-sm">
    <i class="fas fa-comments text-violet-600 text-2xl mb-2"></i>
    <span class="text-xs font-bold text-gray-700">Manage Feedback</span>
</button>

        </div>
    </div>
</div>

<script type="module">
    import { auth, db } from '../js/firebase-init.js';
    import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-auth.js";
    import { doc, getDoc, collection, query, where, onSnapshot } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";

    // 1. Auth Check & Get Admin School ID
    onAuthStateChanged(auth, async (user) => {
        if (!user) {
            window.location.href = "../index.html"; 
        } else {
            try {
                // Fetch Admin's specific document to get their schoolId
                const adminDocRef = doc(db, "users", user.uid);
                const adminSnap = await getDoc(adminDocRef);

                if (adminSnap.exists()) {
                    const adminData = adminSnap.data();
                    const adminSchoolId = adminData.schoolId; 
                    
                    document.getElementById('adminWelcomeMsg').innerText = `School Code: ${adminSchoolId}`;

                    // Fetch live counters for this specific school ONLY
                    fetchStudentCount(adminSchoolId);
                    fetchStaffCount(adminSchoolId);
                } else {
                    console.log("Admin data not found in users collection.");
                }
            } catch (error) {
                console.error("Error fetching admin details:", error);
            }
        }
    });

    // 2. Logout Logic
    document.getElementById('logoutBtn').addEventListener('click', async () => {
        if(confirm("Are you sure you want to logout?")) {
            await signOut(auth);
            window.location.href = "../index.html";
        }
    });

    // 3. Fetch Real Student Count 
    function fetchStudentCount(adminSchoolId) {
        if(!adminSchoolId) return;

        const q = query(
            collection(db, "users"), 
            where("role", "==", "student"),
            where("schoolId", "==", adminSchoolId)
        );
        
        onSnapshot(q, (snapshot) => {
            document.getElementById('totalStudentsCount').innerText = snapshot.size;
        });
    }

    // 4. Fetch Real Staff/Teacher Count
    function fetchStaffCount(adminSchoolId) {
        if(!adminSchoolId) return;

        const q = query(
            collection(db, "users"), 
            where("schoolId", "==", adminSchoolId)
        );
        
        onSnapshot(q, (snapshot) => {
            let staffCount = 0;
            snapshot.forEach((docSnap) => {
                const role = docSnap.data().role;
                // Sirf unko gino jo student nahi hain (Staff, Admin, Teacher)
                if(role === "teacher" || role === "staff" || role === "admin") {
                    staffCount++;
                }
            });
            document.getElementById('totalTeachersCount').innerText = staffCount;
        });
    }
</script>
</body>
</html>
