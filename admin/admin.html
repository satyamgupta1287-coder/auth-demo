<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #f4f6f9; }
        .app-container { max-width: 450px; margin: 0 auto; background-color: #ffffff; min-height: 100vh; }
    </style>
</head>
<body>

<div class="app-container p-4">
    <div class="bg-gradient-to-r from-blue-600 to-purple-600 rounded-2xl p-6 text-white shadow-lg mb-6">
        <h1 class="text-xl font-bold">Admin Dashboard</h1>
        <p class="text-blue-100 text-sm" id="adminWelcome">Welcome back, Admin</p>
    </div>

    <div class="grid grid-cols-2 gap-4 mb-6">
        <div class="bg-white p-4 rounded-2xl border shadow-sm text-center">
            <p class="text-xs text-gray-400 font-bold uppercase">Students</p>
            <h3 class="text-2xl font-bold" id="totalStudents">0</h3>
        </div>
        <div class="bg-white p-4 rounded-2xl border shadow-sm text-center">
            <p class="text-xs text-gray-400 font-bold uppercase">Teachers</p>
            <h3 class="text-2xl font-bold" id="totalTeachers">0</h3>
        </div>
    </div>

    <h2 class="text-lg font-bold text-gray-800 mb-4 px-1">Quick Actions</h2>
    <div class="grid grid-cols-2 gap-4">
        <button onclick="window.location.href='manage-students.html'" class="bg-blue-50 p-4 rounded-2xl flex flex-col items-center hover:bg-blue-100 transition">
            <i class="fas fa-users-cog text-blue-600 text-xl mb-2"></i>
            <span class="text-xs font-bold text-gray-700">Manage Students</span>
        </button>
        <button class="bg-emerald-50 p-4 rounded-2xl flex flex-col items-center hover:bg-emerald-100 transition">
            <i class="fas fa-check-circle text-emerald-600 text-xl mb-2"></i>
            <span class="text-xs font-bold text-gray-700">Attendance</span>
        </button>
        <button class="bg-purple-50 p-4 rounded-2xl flex flex-col items-center hover:bg-purple-100 transition">
            <i class="fas fa-file-alt text-purple-600 text-xl mb-2"></i>
            <span class="text-xs font-bold text-gray-700">Assignments</span>
        </button>
        <button class="bg-orange-50 p-4 rounded-2xl flex flex-col items-center hover:bg-orange-100 transition">
            <i class="fas fa-graduation-cap text-orange-600 text-xl mb-2"></i>
            <span class="text-xs font-bold text-gray-700">Results</span>
        </button>
    </div>
</div>

<script type="module">
    import { db } from '../js/firebase-init.js';
    import { collection, onSnapshot, query, where } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";

    // Students Count
    const studentsQuery = query(collection(db, "users"), where("role", "==", "student"));
    onSnapshot(studentsQuery, (snapshot) => {
        document.getElementById('totalStudents').innerText = snapshot.size;
    });

    // Teachers Count
    const teachersQuery = query(collection(db, "users"), where("role", "==", "teacher"));
    onSnapshot(teachersQuery, (snapshot) => {
        document.getElementById('totalTeachers').innerText = snapshot.size;
    });
</script>
</body>
</html>
