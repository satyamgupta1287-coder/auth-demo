<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Test Results</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 p-4 font-sans pb-20">

<div class="max-w-md mx-auto">
    <div class="flex justify-between items-center bg-white p-4 rounded-2xl shadow-sm mb-4">
        <button onclick="window.location.href='admin.html'" class="text-gray-500 hover:text-green-600 transition">
            <i class="fas fa-arrow-left text-xl"></i>
        </button>
        <h1 class="text-xl font-bold text-gray-800">Test Results</h1>
        <div></div>
    </div>

    <div class="bg-white rounded-2xl shadow-sm p-6 mb-6 border-t-4 border-green-500">
        <label class="block text-sm font-bold text-gray-700 mb-2"><i class="fas fa-filter text-green-500 mr-2"></i>Select Test to View Results</label>
        <select id="testSelector" class="w-full p-3 border border-gray-200 rounded-xl outline-none bg-gray-50 focus:ring-2 focus:ring-green-500 font-medium">
            <option value="">-- Loading Tests --</option>
        </select>
    </div>

    <div class="bg-white rounded-2xl shadow-sm p-6">
        <div class="flex justify-between items-center mb-4 border-b pb-2">
            <h2 class="text-lg font-bold text-gray-800">Student Leaderboard</h2>
            <span id="totalAttempts" class="text-xs font-bold text-white bg-green-500 px-2 py-1 rounded-lg">0 Attempts</span>
        </div>
        
        <div id="resultsList" class="space-y-3">
            <div class="text-center py-8">
                <i class="fas fa-trophy text-gray-200 text-5xl mb-3"></i>
                <p class="text-sm text-gray-400">Select a test from above to see results.</p>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { auth, db } from '../js/firebase-init.js';
    import { collection, query, orderBy, onSnapshot, where } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";

    const testSelector = document.getElementById('testSelector');
    const resultsList = document.getElementById('resultsList');
    const totalAttempts = document.getElementById('totalAttempts');

    // 1. Load All Available Tests in Dropdown
    const testQuery = query(collection(db, "tests"), orderBy("createdAt", "desc"));
    onSnapshot(testQuery, (snapshot) => {
        if(snapshot.empty) {
            testSelector.innerHTML = `<option value="">No tests published yet</option>`;
            return;
        }

        testSelector.innerHTML = `<option value="">-- Choose a Test --</option>`;
        snapshot.forEach((doc) => {
            const data = doc.data();
            testSelector.innerHTML += `<option value="${doc.id}">${data.title} (Class ${data.targetClass})</option>`;
        });
    });

    // 2. Fetch Results when a Test is Selected
    testSelector.addEventListener('change', (e) => {
        const selectedTestId = e.target.value;
        
        if(!selectedTestId) {
            resultsList.innerHTML = `
                <div class="text-center py-8">
                    <i class="fas fa-trophy text-gray-200 text-5xl mb-3"></i>
                    <p class="text-sm text-gray-400">Select a test from above to see results.</p>
                </div>`;
            totalAttempts.innerText = `0 Attempts`;
            return;
        }

        // Query results for this specific test, ordered by score descending (Top scorer first)
        const resultsQuery = query(collection(db, "results"), where("testId", "==", selectedTestId), orderBy("score", "desc"));
        
        onSnapshot(resultsQuery, (snapshot) => {
            resultsList.innerHTML = "";
            totalAttempts.innerText = `${snapshot.size} Attempts`;

            if(snapshot.empty) {
                resultsList.innerHTML = `<p class="text-center text-sm text-gray-400 py-4">No student has attempted this test yet.</p>`;
                return;
            }

            let rank = 1;
            snapshot.forEach((docSnap) => {
                const data = docSnap.data();
                const percentage = Math.round((data.score / data.totalQuestions) * 100);
                const dateStr = data.timestamp ? new Date(data.timestamp.toDate()).toLocaleString() : 'Just now';
                
                // Styling based on Rank
                let rankBadge = `<span class="w-6 h-6 flex items-center justify-center bg-gray-100 text-gray-600 font-bold rounded-full text-xs">${rank}</span>`;
                let borderStyle = "border-gray-100";
                
                if(rank === 1) {
                    rankBadge = `<i class="fas fa-crown text-yellow-500 text-xl"></i>`;
                    borderStyle = "border-yellow-300 bg-yellow-50";
                } else if(rank === 2) {
                    rankBadge = `<span class="w-6 h-6 flex items-center justify-center bg-gray-200 text-gray-600 font-bold rounded-full text-xs">2</span>`;
                } else if(rank === 3) {
                    rankBadge = `<span class="w-6 h-6 flex items-center justify-center bg-orange-100 text-orange-600 font-bold rounded-full text-xs">3</span>`;
                }

                // Status styling (Pass/Fail)
                let scoreColor = percentage >= 40 ? "text-green-600" : "text-red-500";

                resultsList.innerHTML += `
                    <div class="p-3 border rounded-xl bg-white flex items-center justify-between shadow-sm ${borderStyle}">
                        <div class="flex items-center gap-3">
                            <div class="flex-shrink-0 w-8 text-center">
                                ${rankBadge}
                            </div>
                            <div>
                                <h4 class="font-bold text-gray-800 text-sm">${data.studentName}</h4>
                                <p class="text-[10px] text-gray-400">${dateStr}</p>
                            </div>
                        </div>
                        <div class="text-right">
                            <h3 class="text-lg font-bold ${scoreColor}">${data.score}/${data.totalQuestions}</h3>
                            <p class="text-[10px] font-bold text-gray-500">${percentage}%</p>
                        </div>
                    </div>
                `;
                rank++;
            });
        });
    });
</script>
</body>
</html>
