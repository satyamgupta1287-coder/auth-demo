<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Live Classes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 p-4 font-sans pb-24">

<div class="max-w-md mx-auto">
    <div class="flex justify-between items-center bg-white p-4 rounded-2xl shadow-sm mb-4">
        <button onclick="window.location.href='admin.html'" class="text-gray-500 hover:text-red-600 transition">
            <i class="fas fa-arrow-left text-xl"></i>
        </button>
        <h1 class="text-xl font-bold text-gray-800">Live Classes</h1>
        <div></div>
    </div>

    <div class="bg-white rounded-2xl shadow-sm p-6 mb-6 border-t-4 border-red-500">
        <h2 class="text-sm font-bold text-gray-400 uppercase mb-4"><i class="fas fa-video text-red-500 mr-2"></i>Schedule New Class</h2>
        <form id="classForm" class="space-y-4" onsubmit="return false;">
            
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">Target Class *</label>
                    <select id="targetClass" required class="w-full p-3 border border-gray-200 rounded-xl outline-none bg-gray-50 focus:ring-2 focus:ring-red-500">
                        <option value="">Select Class</option>
                        <option value="1">Class 1</option>
                        <option value="2">Class 2</option>
                        <option value="3">Class 3</option>
                        <option value="4">Class 4</option>
                        <option value="5">Class 5</option>
                        <option value="6">Class 6</option>
                        <option value="7">Class 7</option>
                        <option value="8">Class 8</option>
                        <option value="9">Class 9</option>
                        <option value="10">Class 10</option>
                        <option value="11">Class 11</option>
                        <option value="12">Class 12</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">Time *</label>
                    <input type="time" id="classTime" required class="w-full p-3 border border-gray-200 rounded-xl outline-none bg-gray-50 focus:ring-2 focus:ring-red-500">
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">Subject *</label>
                    <input type="text" id="subject" required placeholder="e.g., Math" class="w-full p-3 border border-gray-200 rounded-xl outline-none bg-gray-50 focus:ring-2 focus:ring-red-500">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">Teacher Name *</label>
                    <input type="text" id="teacherName" required placeholder="e.g., Rahul Sir" class="w-full p-3 border border-gray-200 rounded-xl outline-none bg-gray-50 focus:ring-2 focus:ring-red-500">
                </div>
            </div>

            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">Meeting Link (Zoom/Meet) *</label>
                <input type="url" id="meetingLink" required placeholder="https://meet.google.com/..." class="w-full p-3 border border-gray-200 rounded-xl outline-none bg-gray-50 focus:ring-2 focus:ring-red-500 text-blue-600">
            </div>

            <button type="submit" id="scheduleBtn" class="w-full bg-red-500 text-white font-bold py-3.5 rounded-xl hover:bg-red-600 shadow-md transition flex justify-center items-center">
                <i class="fas fa-calendar-plus mr-2"></i> Schedule Class
            </button>
        </form>
    </div>

    <div class="bg-white rounded-2xl shadow-sm p-6">
        <h2 class="text-lg font-bold text-gray-800 mb-4 border-b pb-2">Upcoming Classes</h2>
        <div id="classesList" class="space-y-3">
            <p class="text-center text-sm text-gray-400 py-4">Loading classes...</p>
        </div>
    </div>
</div>

<script type="module">
    import { auth, db } from '../js/firebase-init.js';
    import { collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";

    const form = document.getElementById('classForm');
    const scheduleBtn = document.getElementById('scheduleBtn');

    // --- 1. SCHEDULE CLASS LOGIC ---
    form.addEventListener('submit', async () => {
        const targetClass = document.getElementById('targetClass').value;
        const classTime = document.getElementById('classTime').value;
        const subject = document.getElementById('subject').value;
        const teacherName = document.getElementById('teacherName').value;
        const meetingLink = document.getElementById('meetingLink').value;

        // Convert 24hr time to 12hr format for better display
        const timeParts = classTime.split(':');
        let hours = parseInt(timeParts[0]);
        const minutes = timeParts[1];
        const ampm = hours >= 12 ? 'PM' : 'AM';
        hours = hours % 12;
        hours = hours ? hours : 12; 
        const formattedTime = hours + ':' + minutes + ' ' + ampm;

        scheduleBtn.disabled = true;
        scheduleBtn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> Scheduling...';

        try {
            await addDoc(collection(db, "live_classes"), {
                targetClass,
                time: formattedTime,
                rawTime: classTime, // keep raw time for sorting if needed
                subject,
                teacherName,
                meetingLink,
                createdAt: serverTimestamp()
            });

            alert("Live Class Scheduled Successfully! 🎥");
            form.reset();
        } catch (err) {
            alert("Error: " + err.message);
        } finally {
            scheduleBtn.disabled = false;
            scheduleBtn.innerHTML = '<i class="fas fa-calendar-plus mr-2"></i> Schedule Class';
        }
    });

    // --- 2. DISPLAY CLASSES LOGIC ---
    const q = query(collection(db, "live_classes"), orderBy("createdAt", "desc"));
    onSnapshot(q, (snapshot) => {
        const list = document.getElementById('classesList');
        list.innerHTML = "";
        
        if (snapshot.size === 0) {
            list.innerHTML = `<p class="text-center text-sm text-gray-400 py-4">No upcoming classes.</p>`;
            return;
        }

        snapshot.forEach((docSnap) => {
            const data = docSnap.data();

            list.innerHTML += `
                <div class="p-4 border rounded-xl bg-gray-50 relative">
                    <button onclick="deleteClass('${docSnap.id}')" class="absolute top-3 right-3 text-red-400 hover:text-red-600 transition">
                        <i class="fas fa-trash-alt"></i>
                    </button>
                    
                    <div class="flex items-center gap-3 mb-2">
                        <div class="w-10 h-10 bg-red-100 text-red-600 rounded-full flex items-center justify-center text-lg shadow-inner">
                            <i class="fas fa-video"></i>
                        </div>
                        <div>
                            <span class="text-[10px] font-bold px-2 py-0.5 rounded bg-red-100 text-red-600">Class ${data.targetClass}</span>
                            <h4 class="font-bold text-gray-800 text-sm mt-1">${data.subject} by ${data.teacherName}</h4>
                        </div>
                    </div>
                    
                    <div class="flex justify-between items-center mt-3 bg-white p-2 rounded-lg border border-gray-200">
                        <p class="text-xs font-bold text-gray-600"><i class="far fa-clock text-red-500 mr-1"></i> ${data.time}</p>
                        <a href="${data.meetingLink}" target="_blank" class="text-[10px] font-bold text-white bg-blue-500 px-3 py-1.5 rounded hover:bg-blue-600 transition shadow-sm">
                            Join Link
                        </a>
                    </div>
                </div>
            `;
        });
    });

    // --- 3. DELETE CLASS LOGIC ---
    window.deleteClass = async (id) => {
        if(confirm("Delete this scheduled class?")) {
            try {
                await deleteDoc(doc(db, "live_classes", id));
            } catch (err) {
                alert("Error deleting: " + err.message);
            }
        }
    };
</script>
</body>
</html>
