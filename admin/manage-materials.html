<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin - Upload</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js" type="text/javascript"></script>
</head>
<body class="bg-gray-100 p-6">
    <div class="max-w-md mx-auto bg-white p-6 rounded-2xl shadow">
        <h1 class="text-xl font-bold mb-4">Upload Study Material</h1>
        <input type="text" id="title" placeholder="Title" class="w-full p-3 border rounded-xl mb-3">
        <input type="text" id="subject" placeholder="Subject (e.g. Science)" class="w-full p-3 border rounded-xl mb-3">
        <input type="text" id="year" placeholder="Year (optional, e.g. 2023)" class="w-full p-3 border rounded-xl mb-3">
        
        <select id="className" class="w-full p-3 border rounded-xl mb-3">
            <option value="10">Class 10</option>
        </select>
        
        <select id="category" class="w-full p-3 border rounded-xl mb-4">
            <option value="book">Books</option>
            <option value="notes">Notes</option>
            <option value="pyq">PYQ</option>
            <option value="model">Model Papers</option>
        </select>

        <button id="upload_btn" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold">Upload PDF</button>
    </div>

<script type="module">
    import { db } from '../js/firebase-init.js';
    import { collection, addDoc } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";

    const myWidget = cloudinary.createUploadWidget({ 
        cloudName: 'dl1cddemu', 
        uploadPreset: 'upload',
        resourceType: 'raw' 
    }, (err, result) => {
        if (!err && result.event === "success") {
            // Yahan se data save ho raha hai
            addDoc(collection(db, "study_materials"), { 
                title: document.getElementById('title').value,
                subject: document.getElementById('subject').value || 'General',
                year: document.getElementById('year').value || 'N/A',
                targetClass: document.getElementById('className').value,
                type: document.getElementById('category').value,
                fileUrl: result.info.secure_url,
                createdAt: new Date()
            }).then(() => alert("File uploaded successfully!"));
        }
    });

    document.getElementById("upload_btn").addEventListener("click", () => myWidget.open());
</script>
</body>
</html>
