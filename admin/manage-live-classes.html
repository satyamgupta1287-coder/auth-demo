<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Live Classes - Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }</style>
</head>
<body class="pb-10">

<div class="bg-emerald-800 text-white px-5 py-5 rounded-b-[24px] shadow-md flex items-center gap-4 sticky top-0 z-50">
    <button onclick="window.location.href='teacher-dashboard.html'" class="text-white hover:text-emerald-200 transition text-lg active:scale-95">
        <i class="fas fa-arrow-left"></i>
    </button>
    <h1 class="text-lg font-bold">Manage Live Classes</h1>
</div>

<div class="max-w-md mx-auto px-5 mt-6">
    <div class="bg-white p-5 rounded-[20px] shadow-sm border border-slate-100 mb-8">
        <h2 class="text-sm font-bold text-slate-800 mb-4"><i class="fas fa-broadcast-tower text-emerald-500 mr-2"></i>Schedule New Class</h2>
        <form id="liveForm" class="space-y-3" onsubmit="return false;">
            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">Target Class</label>
                    <input type="text" id="targetClass" required placeholder="e.g. 10" class="w-full p-2.5 text-sm border rounded-xl outline-none focus:border-emerald-500 bg-slate-50">
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">Subject</label>
                    <input type="text" id="subject" required placeholder="e.g. Science" class="w-full p-2.5 text-sm border rounded-xl outline-none focus:border-emerald-500 bg-slate-50">
                </div>
            </div>
            <div>
                <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">Topic / Chapter</label>
                <input type="text" id="topic" required placeholder="e.g. Light Reflection Revision" class="w-full p-2.5 text-sm border rounded-xl outline-none focus:border-emerald-500 bg-slate-50">
            </div>
            <div class="grid grid-cols-2 gap-3">
                <div class="col-span-2">
                    <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">Meeting Link (Meet/Zoom)</label>
                    <input type="url" id="meetingLink" required placeholder="https://meet.google.com/..." class="w-full p-2.5 text-sm border rounded-xl outline-none focus:border-emerald-500 bg-slate-50">
                </div>
                <div class="col-span-2">
                    <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">Time (e.g. 10:30 AM)</label>
                    <input type="text" id="time" required placeholder="10:30 AM" class="w-full p-2.5 text-sm border rounded-xl outline-none focus:border-emerald-500 bg-slate-50">
                </div>
            </div>
            <button type="submit" id="submitBtn" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 rounded-xl mt-2 transition shadow-md shadow-emerald-100">Go Live / Schedule</button>
        </form>
    </div>

    <h3 class="font-bold text-slate-800 mb-3 text-sm px-1">Active Scheduled Classes</h3>
    <div id="listContainer" class="space-y-3">
        <div class="text-center p-5"><p class="text-sm text-slate-400">Loading...</p></div>
    </div>
</div>

<script type="module">
    import { auth, db } from '../js/firebase-init.js';
    import { collection, addDoc, query, where, onSnapshot, getDoc, doc, deleteDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-auth.js";

    let adminSchoolId = null;
    const form = document.getElementById('liveForm');
    const submitBtn = document.getElementById('submitBtn');
    const listContainer = document.getElementById('listContainer');

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            const adminDoc = await getDoc(doc(db, "users", user.uid));
            if (adminDoc.exists()) {
                adminSchoolId = adminDoc.data().schoolId;
                loadLiveClasses();
            }
        } else {
            window.location.href = "../index.html";
        }
    });

    // Add Live Class
    form.addEventListener('submit', async () => {
        submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Scheduling...'; 
        submitBtn.disabled = true;
        try {
            await addDoc(collection(db, "liveClasses"), {
                schoolId: adminSchoolId,
                targetClass: document.getElementById('targetClass').value.trim(),
                subject: document.getElementById('subject').value.trim(),
                topic: document.getElementById('topic').value.trim(),
                meetingLink: document.getElementById('meetingLink').value.trim(),
                time: document.getElementById('time').value.trim(),
                createdAt: serverTimestamp()
            });
            form.reset();
            alert("Live Class Scheduled Successfully!");
        } catch(error) {
            alert("Error: " + error.message);
        }
        submitBtn.innerText = "Go Live / Schedule"; 
        submitBtn.disabled = false;
    });

    // Load Active Classes
    function loadLiveClasses() {
        const q = query(collection(db, "liveClasses"), where("schoolId", "==", adminSchoolId));
        onSnapshot(q, (snapshot) => {
            if(snapshot.empty) {
                listContainer.innerHTML = `<div class="bg-white p-5 rounded-2xl border text-center"><p class="text-sm text-slate-400">No active classes.</p></div>`;
                return;
            }
            
            let items = [];
            snapshot.forEach(d => items.push({id: d.id, ...d.data()}));
            items.sort((a, b) => (b.createdAt?.toMillis() || 0) - (a.createdAt?.toMillis() || 0));

            listContainer.innerHTML = "";
            items.forEach(item => {
                listContainer.innerHTML += `
                    <div class="bg-white p-4 rounded-2xl border flex justify-between items-center shadow-sm relative overflow-hidden">
                        <div class="w-1 bg-emerald-500 absolute left-0 top-0 bottom-0"></div>
                        <div class="min-w-0 flex-grow pl-2 pr-2">
                            <div class="flex items-center gap-2 mb-1">
                                <span class="bg-slate-100 text-slate-600 text-[9px] font-bold px-1.5 py-0.5 rounded uppercase">Class ${item.targetClass}</span>
                                <span class="text-[9px] font-bold text-emerald-600 uppercase"><i class="far fa-clock"></i> ${item.time}</span>
                            </div>
                            <h4 class="font-bold text-slate-800 text-sm truncate">${item.topic}</h4>
                        </div>
                        <button onclick="endClass('${item.id}')" class="bg-red-50 hover:bg-red-100 text-red-600 font-bold px-3 py-1.5 rounded-lg text-xs transition shrink-0 border border-red-100">
                            End Class
                        </button>
                    </div>
                `;
            });
        });
    }

    // End/Delete Class Logic
    window.endClass = async (id) => {
        if(confirm("Are you sure you want to END this class? It will be removed from student dashboard.")) {
            await deleteDoc(doc(db, "liveClasses", id));
        }
    };
</script>
</body>
</html>
