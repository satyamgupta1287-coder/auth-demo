<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Leaves - Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }</style>
</head>
<body class="pb-10">

<!-- Header -->
<div class="bg-green-700 text-white px-5 py-5 rounded-b-[24px] shadow-md flex items-center gap-4 sticky top-0 z-50">
    <button onclick="window.location.href='teacher-dashboard.html'" class="text-white hover:text-green-200 transition text-lg active:scale-95">
        <i class="fas fa-arrow-left"></i>
    </button>
    <h1 class="text-lg font-bold">Leave Requests</h1>
</div>

<div class="max-w-md mx-auto px-5 mt-6">
    <div id="leavesContainer" class="space-y-4">
        <div class="text-center p-5"><p class="text-sm text-slate-400">Loading...</p></div>
    </div>
</div>

<script type="module">
    import { auth, db } from '../js/firebase-init.js';
    import { collection, query, where, onSnapshot, getDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-auth.js";

    let adminSchoolId = null;
    const leavesContainer = document.getElementById('leavesContainer');

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            const adminDoc = await getDoc(doc(db, "users", user.uid));
            if (adminDoc.exists()) {
                adminSchoolId = adminDoc.data().schoolId;
                loadLeaves();
            }
        } else {
            window.location.href = "../index.html";
        }
    });

    function loadLeaves() {
        const q = query(collection(db, "leaves"), where("schoolId", "==", adminSchoolId));
        onSnapshot(q, (snapshot) => {
            if(snapshot.empty) {
                leavesContainer.innerHTML = `<div class="bg-white p-6 rounded-2xl border text-center"><p class="text-sm text-slate-400 font-medium">No leave requests pending.</p></div>`;
                return;
            }
            
            let items = [];
            snapshot.forEach(d => items.push({id: d.id, ...d.data()}));
            items.sort((a, b) => (b.createdAt?.toMillis() || 0) - (a.createdAt?.toMillis() || 0)); // Latest first

            leavesContainer.innerHTML = "";
            items.forEach(item => {
                const status = item.status || 'Pending';
                let actionButtons = "";
                
                if(status === 'Pending') {
                    actionButtons = `
                        <div class="flex gap-2 mt-4 pt-3 border-t border-slate-100">
                            <button onclick="updateStatus('${item.id}', 'Approved')" class="flex-1 bg-emerald-50 text-emerald-600 font-bold py-2 rounded-xl text-sm hover:bg-emerald-100 transition">Approve</button>
                            <button onclick="updateStatus('${item.id}', 'Rejected')" class="flex-1 bg-red-50 text-red-500 font-bold py-2 rounded-xl text-sm hover:bg-red-100 transition">Reject</button>
                        </div>
                    `;
                } else {
                    let color = status === 'Approved' ? 'text-emerald-600' : 'text-red-500';
                    actionButtons = `<p class="mt-3 text-xs font-bold ${color} text-right uppercase tracking-wide">${status}</p>`;
                }

                leavesContainer.innerHTML += `
                    <div class="bg-white p-5 rounded-[20px] shadow-sm border border-slate-100">
                        <div class="flex justify-between items-start mb-2">
                            <div>
                                <h4 class="font-bold text-slate-800">${item.studentName}</h4>
                                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-wide">Class ${item.targetClass}</p>
                            </div>
                            <div class="text-right text-xs font-bold text-slate-600 bg-slate-50 px-2 py-1 rounded-lg border">
                                ${formatDate(item.fromDate)} - ${formatDate(item.toDate)}
                            </div>
                        </div>
                        <p class="text-sm text-slate-600 bg-slate-50 p-3 rounded-xl border border-slate-100">${item.reason}</p>
                        ${actionButtons}
                    </div>
                `;
            });
        });
    }

    window.updateStatus = async (id, newStatus) => {
        if(confirm(`Mark this leave as ${newStatus}?`)) {
            await updateDoc(doc(db, "leaves", id), { status: newStatus });
        }
    };

    function formatDate(dateStr) {
        if(!dateStr) return '';
        const d = new Date(dateStr);
        return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
    }
</script>
</body>
</html>
