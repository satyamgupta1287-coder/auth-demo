<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Results</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-4">

<div class="max-w-md mx-auto bg-white rounded-2xl shadow-sm p-6">
    <h2 class="text-xl font-bold text-gray-800 mb-6">Add Student Result</h2>
    <div class="space-y-4">
        <input type="text" id="resStudentId" placeholder="Student Name / ID" class="w-full p-3 border rounded-xl outline-none">
        <input type="text" id="resSubject" placeholder="Subject" class="w-full p-3 border rounded-xl outline-none">
        <input type="number" id="resMarks" placeholder="Marks Obtained" class="w-full p-3 border rounded-xl outline-none">
        
        <button id="saveResultBtn" class="w-full bg-teal-600 text-white font-bold py-3 rounded-xl hover:bg-teal-700 transition">
            Save Result
        </button>
    </div>
</div>

<script type="module">
    import { db } from '../js/firebase-init.js';
    import { collection, addDoc } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";

    document.getElementById('saveResultBtn').addEventListener('click', async () => {
        const student = document.getElementById('resStudentId').value;
        const subject = document.getElementById('resSubject').value;
        const marks = document.getElementById('resMarks').value;

        await addDoc(collection(db, "results"), { student, subject, marks });
        alert("Result Saved!");
    });
</script>
</body>
</html>
