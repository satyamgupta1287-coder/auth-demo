<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Fees</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 p-4 font-sans pb-24">

<div class="max-w-md mx-auto">
    <div class="flex justify-between items-center bg-white p-4 rounded-2xl shadow-sm mb-4">
        <button onclick="window.location.href='admin.html'" class="text-gray-500 hover:text-teal-600 transition">
            <i class="fas fa-arrow-left text-xl"></i>
        </button>
        <h1 class="text-xl font-bold text-gray-800">Manage Fees</h1>
        <div></div>
    </div>

    <div class="bg-white rounded-2xl shadow-sm p-6 mb-6 border-t-4 border-teal-500">
        <label class="block text-sm font-bold text-gray-700 mb-2"><i class="fas fa-search text-teal-500 mr-2"></i>Select Class to View Students</label>
        <div class="flex gap-2">
            <select id="classSelector" class="w-full p-3 border border-gray-200 rounded-xl outline-none bg-gray-50 focus:ring-2 focus:ring-teal-500 text-sm font-bold text-gray-600">
                <option value="">Choose Class...</option>
                <option value="1">Class 1</option>
                <option value="2">Class 2</option>
                <option value="3">Class 3</option>
                <option value="4">Class 4</option>
                <option value="5">Class 5</option>
                <option value="6">Class 6</option>
                <option value="7">Class 7</option>
                <option value="8">Class 8</option>
                <option value="9">Class 9</option>
                <option value="10">Class 10</option>
                <option value="11">Class 11</option>
                <option value="12">Class 12</option>
            </select>
            <button onclick="fetchFeeRecords()" class="bg-teal-500 text-white px-4 py-2 rounded-xl hover:bg-teal-600 shadow-md transition font-bold">
                Load
            </button>
        </div>
    </div>

    <div class="bg-white rounded-2xl shadow-sm p-6 hidden" id="studentsSection">
        <div class="flex justify-between items-center mb-4 border-b pb-2">
            <h2 class="text-sm font-bold text-gray-800 uppercase">Fee Records</h2>
            <span id="studentCount" class="text-xs font-bold text-teal-600 bg-teal-50 px-2 py-1 rounded">0 Students</span>
        </div>
        
        <div id="studentList" class="space-y-4">
            </div>
    </div>
</div>

<div id="feeModal" class="fixed inset-0 bg-black/50 z-50 hidden flex justify-center items-center p-4">
    <div class="bg-white rounded-3xl w-full max-w-sm p-6 shadow-2xl relative">
        <button onclick="closeModal()" class="absolute top-4 right-4 text-gray-400 hover:text-red-500">
            <i class="fas fa-times text-xl"></i>
        </button>
        
        <div class="w-16 h-16 bg-teal-100 text-teal-500 rounded-full flex items-center justify-center text-3xl mb-4 mx-auto shadow-inner">
            <i class="fas fa-wallet"></i>
        </div>
        <h2 class="text-xl font-bold text-center text-gray-800 mb-1" id="modalStudentName">Student Name</h2>
        <p class="text-xs text-center text-gray-500 font-bold mb-6" id="modalStudentId">ID: ...</p>

        <input type="hidden" id="modalUid">

        <div class="space-y-4 mb-6">
            <div>
                <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Total Course Fee (₹)</label>
                <input type="number" id="modalTotalFee" placeholder="e.g., 20000" class="w-full p-3 border border-gray-200 rounded-xl outline-none bg-gray-50 focus:ring-2 focus:ring-teal-500 font-bold text-gray-800">
            </div>
            <div>
                <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Fee Paid So Far (₹)</label>
                <input type="number" id="modalPaidFee" placeholder="e.g., 5000" class="w-full p-3 border border-gray-200 rounded-xl outline-none bg-gray-50 focus:ring-2 focus:ring-teal-500 font-bold text-gray-800">
            </div>
        </div>

        <button onclick="updateFee()" id="saveFeeBtn" class="w-full bg-teal-500 text-white font-bold py-3.5 rounded-xl hover:bg-teal-600 shadow-md transition flex justify-center items-center">
            Save Fee Record
        </button>
    </div>
</div>

<script type="module">
    import { auth, db } from '../js/firebase-init.js';
    import { collection, query, where, onSnapshot, doc, updateDoc } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";

    // 1. Fetch Students & Fee Records
    window.fetchFeeRecords = () => {
        const selectedClass = document.getElementById('classSelector').value;
        const listContainer = document.getElementById('studentList');
        const section = document.getElementById('studentsSection');

        if(!selectedClass) return alert("Please select a class!");

        section.classList.remove('hidden');
        listContainer.innerHTML = `<p class="text-center text-sm text-gray-400 py-4"><i class="fas fa-spinner fa-spin mr-2"></i> Loading data...</p>`;

        const q = query(collection(db, "users"), where("class", "==", selectedClass));
        
        onSnapshot(q, (snapshot) => {
            document.getElementById('studentCount').innerText = `${snapshot.size} Students`;
            listContainer.innerHTML = "";

            if(snapshot.empty) {
                listContainer.innerHTML = `<p class="text-center text-sm text-red-400 py-4">No students found.</p>`;
                return;
            }

            snapshot.forEach((docSnap) => {
                const student = { id: docSnap.id, ...docSnap.data() };
                const name = student.name || student.firstName || "Unknown";
                
                // Get fee details (Default to 0 if not set)
                const totalFee = student.totalFee || 0;
                const paidFee = student.paidFee || 0;
                const pendingFee = totalFee - paidFee;

                // Color code based on pending fee
                const statusColor = pendingFee <= 0 ? "text-green-500" : "text-red-500";
                const bgStatus = pendingFee <= 0 ? "bg-green-50" : "bg-red-50";

                listContainer.innerHTML += `
                    <div class="p-4 border rounded-2xl bg-white shadow-sm hover:shadow-md transition">
                        <div class="flex justify-between items-start mb-3 border-b pb-2">
                            <div>
                                <h4 class="font-bold text-gray-800 text-sm">${name}</h4>
                                <p class="text-[10px] text-gray-400">ID: ${student.studentId || "N/A"}</p>
                            </div>
                            <button onclick="openModal('${student.id}', '${name}', '${student.studentId}', ${totalFee}, ${paidFee})" class="text-xs font-bold text-teal-600 bg-teal-50 hover:bg-teal-100 px-3 py-1.5 rounded-lg transition border border-teal-100">
                                <i class="fas fa-edit mr-1"></i> Edit Fee
                            </button>
                        </div>
                        
                        <div class="grid grid-cols-3 gap-2 text-center">
                            <div class="bg-gray-50 p-2 rounded-xl border border-gray-100">
                                <p class="text-[9px] font-bold text-gray-400 uppercase">Total</p>
                                <p class="text-xs font-bold text-gray-700">₹${totalFee}</p>
                            </div>
                            <div class="bg-gray-50 p-2 rounded-xl border border-gray-100">
                                <p class="text-[9px] font-bold text-gray-400 uppercase">Paid</p>
                                <p class="text-xs font-bold text-green-600">₹${paidFee}</p>
                            </div>
                            <div class="${bgStatus} p-2 rounded-xl border border-gray-100">
                                <p class="text-[9px] font-bold text-gray-400 uppercase">Pending</p>
                                <p class="text-xs font-bold ${statusColor}">₹${pendingFee}</p>
                            </div>
                        </div>
                    </div>
                `;
            });
        });
    };

    // 2. Modal Controls
    window.openModal = (uid, name, id, total, paid) => {
        document.getElementById('modalUid').value = uid;
        document.getElementById('modalStudentName').innerText = name;
        document.getElementById('modalStudentId').innerText = `ID: ${id || 'N/A'}`;
        document.getElementById('modalTotalFee').value = total === 0 ? '' : total;
        document.getElementById('modalPaidFee').value = paid === 0 ? '' : paid;
        
        document.getElementById('feeModal').classList.remove('hidden');
    };

    window.closeModal = () => {
        document.getElementById('feeModal').classList.add('hidden');
    };

    // 3. Update Fee in Firestore
    window.updateFee = async () => {
        const uid = document.getElementById('modalUid').value;
        const totalFee = Number(document.getElementById('modalTotalFee').value) || 0;
        const paidFee = Number(document.getElementById('modalPaidFee').value) || 0;
        const saveBtn = document.getElementById('saveFeeBtn');

        if(paidFee > totalFee) {
            return alert("Paid amount cannot be greater than Total Fee!");
        }

        saveBtn.disabled = true;
        saveBtn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> Saving...';

        try {
            // Updating the student's main profile in Firestore
            await updateDoc(doc(db, "users", uid), {
                totalFee: totalFee,
                paidFee: paidFee
            });

            closeModal();
            // Data will auto-refresh because of onSnapshot!
        } catch (error) {
            alert("Error updating fee: " + error.message);
        } finally {
            saveBtn.disabled = false;
            saveBtn.innerHTML = 'Save Fee Record';
        }
    };
</script>
</body>
</html>
