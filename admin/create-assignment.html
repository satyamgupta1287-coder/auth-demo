<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assignment Control Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://upload-widget.cloudinary.com/global/all.js" type="text/javascript"></script>
</head>
<body class="bg-gray-50 min-h-screen font-sans pb-12">

    <header class="bg-gradient-to-r from-purple-700 to-indigo-800 p-6 text-white shadow-md text-center relative">
        <button onclick="window.location.href='admin.html'" class="absolute left-4 top-6 text-white/80 hover:text-white transition">
            <i class="fas fa-arrow-left text-xl"></i>
        </button>
        <h1 class="text-2xl font-bold mt-2">Assignment Control</h1>
        <p class="text-xs text-purple-200 mt-1">Upload assignments and grade submissions in one place</p>
    </header>

    <div class="max-w-md mx-auto px-4 mt-6 space-y-6">
        
        <div class="bg-white rounded-3xl shadow-sm border border-gray-100 p-6">
            <h2 class="text-lg font-bold text-gray-800 mb-4 flex items-center gap-2">
                <i class="fas fa-plus-circle text-purple-600"></i> Create New Assignment
            </h2>
            
            <div class="space-y-4">
                <input type="text" id="assignTitle" placeholder="Assignment Title (e.g., Math Sheet 1)" class="w-full p-3.5 border border-gray-200 rounded-xl outline-none focus:ring-2 ring-purple-500/20 text-gray-700">
                
                <select id="targetClass" class="w-full p-3.5 border border-gray-200 rounded-xl outline-none focus:ring-2 ring-purple-500/20 text-gray-700 bg-white">
                    <option value="">Select Target Class</option>
                    <option value="9">Class 9</option>
                    <option value="10">Class 10</option>
                    <option value="11">Class 11</option>
                    <option value="12">Class 12</option>
                </select>

                <textarea id="assignDesc" placeholder="Instructions/Description for students..." class="w-full p-3.5 border border-gray-200 rounded-xl outline-none h-24 focus:ring-2 ring-purple-500/20 text-gray-700"></textarea>

                <button id="uploadFileBtn" class="w-full bg-blue-50 text-blue-600 border border-blue-200 font-bold py-3 rounded-xl hover:bg-blue-100 transition flex justify-center items-center gap-2 text-sm shadow-sm">
                    <i class="fas fa-file-upload"></i> Upload Question PDF
                </button>
                <p id="fileStatus" class="text-xs text-center hidden font-semibold"></p>

                <button id="publishBtn" class="w-full bg-purple-600 text-white font-bold py-4 rounded-xl hover:bg-purple-700 transition shadow-md shadow-purple-500/20">
                    Publish Assignment
                </button>
            </div>
        </div>

        <div class="space-y-4">
            <h2 class="text-lg font-bold text-gray-800 px-1 flex items-center gap-2">
                <i class="fas fa-folder-open text-indigo-600"></i> Active Assignments & Submissions
            </h2>
            <div id="masterContainer" class="space-y-4">
                <p class="text-center text-gray-400 py-6 text-sm">Loading assignments data...</p>
            </div>
        </div>

    </div>

<script type="module">
    import { auth, db } from '../js/firebase-init.js';
    import { collection, addDoc, query, onSnapshot, orderBy, doc, updateDoc, serverTimestamp, where, getDoc } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-auth.js";

    let uploadedFileUrl = "";
    let allSubmissions = [];
    let adminSchoolId = null;
    const fileStatus = document.getElementById('fileStatus');
    const masterContainer = document.getElementById('masterContainer');

    // 1. Auth & Get School ID
    onAuthStateChanged(auth, async (user) => {
        if (user) {
            const adminDoc = await getDoc(doc(db, "users", user.uid));
            if (adminDoc.exists()) {
                adminSchoolId = adminDoc.data().schoolId;
                loadGlobalSubmissions(); // Pehle submissions load karo
            }
        } else {
            window.location.href = "../index.html";
        }
    });

    // 2. Cloudinary Widget Setup
    const myWidget = cloudinary.createUploadWidget({
        cloudName: 'dl1cddemu', uploadPreset: 'upload', resourceType: 'raw',
        clientAllowedFormats: ["pdf", "jpg", "png", "docx"]
    }, (error, result) => {
        if (!error && result && result.event === "success") {
            let rawUrl = result.info.secure_url;
            uploadedFileUrl = rawUrl.includes('/upload/') ? rawUrl.replace('/upload/', '/upload/fl_attachment/') : rawUrl;
            fileStatus.innerHTML = `<span class="text-green-600"><i class="fas fa-check-circle"></i> Attached: ${result.info.original_filename}</span>`;
            fileStatus.classList.remove('hidden');
        }
    });

    document.getElementById('uploadFileBtn').addEventListener('click', () => myWidget.open());

    // 3. Publish Assignment Logic
    document.getElementById('publishBtn').addEventListener('click', async () => {
        if(!adminSchoolId) return alert("School ID missing!");

        const title = document.getElementById('assignTitle').value.trim();
        const targetClass = document.getElementById('targetClass').value;
        const description = document.getElementById('assignDesc').value.trim();

        if(!title || !targetClass) return alert("Title aur Class daalna zaroori hai!");

        try {
            await addDoc(collection(db, "assignments"), {
                schoolId: adminSchoolId, // FILTER ADDED
                title: title,
                targetClass: targetClass,
                className: targetClass,
                description: description,
                fileUrl: uploadedFileUrl || "",
                createdAt: serverTimestamp()
            });
            alert("🎉 Assignment Publish Ho Gaya!");
            window.location.reload();
        } catch (e) { alert("Error: " + e.message); }
    });

    // 4. Global Live Sync (Assignments + Submissions Combo)
    function loadGlobalSubmissions() {
        onSnapshot(collection(db, "submissions"), (subSnapshot) => {
            allSubmissions = [];
            subSnapshot.forEach(d => allSubmissions.push({ id: d.id, ...d.data() }));
            loadMasterList();
        });
    }

    function loadMasterList() {
        const q = query(
            collection(db, "assignments"), 
            where("schoolId", "==", adminSchoolId), // FILTER ADDED
            orderBy("createdAt", "desc")
        );
        
        onSnapshot(q, (snapshot) => {
            masterContainer.innerHTML = "";
            
            if(snapshot.empty) {
                masterContainer.innerHTML = `<div class="bg-white p-6 rounded-2xl text-center text-gray-400 text-sm shadow-sm">Koi assignment upload nahi kiya gaya hai.</div>`;
                return;
            }

            snapshot.forEach((docSnap) => {
                const assignData = docSnap.data();
                const assignId = docSnap.id;

                const matchingSubmissions = allSubmissions.filter(sub => sub.assignmentId === assignId);

                let submissionsHtml = "";
                if(matchingSubmissions.length === 0) {
                    submissionsHtml = `<p class="text-xs text-gray-400 italic py-2 px-1">Abhi tak kisi student ne submit nahi kiya hai.</p>`;
                } else {
                    matchingSubmissions.forEach(sub => {
                        submissionsHtml += `
                            <div class="bg-gray-50 p-3 rounded-xl border border-gray-200/60 space-y-2 mt-2">
                                <div class="flex justify-between items-center">
                                    <span class="text-xs font-bold text-gray-700"><i class="fas fa-user text-gray-400 mr-1"></i>${sub.studentName}</span>
                                    <span class="text-[10px] bg-${sub.marks === 'Pending' ? 'yellow' : 'green'}-100 text-${sub.marks === 'Pending' ? 'yellow' : 'green'}-700 px-2 py-0.5 rounded font-bold">
                                        ${sub.marks === 'Pending' ? 'Unchecked' : 'Graded'}
                                    </span>
                                </div>
                                <a href="${sub.fileUrl}" target="_blank" class="block text-center bg-blue-50 hover:bg-blue-100 text-blue-600 text-xs font-bold py-1.5 rounded-lg transition">
                                    <i class="fas fa-eye"></i> Student Ki Copy Dekho
                                </a>
                                <div class="flex gap-2 items-center">
                                    <input type="text" id="marks-${sub.id}" value="${sub.marks === 'Pending' ? '' : sub.marks}" placeholder="Marks (e.g., 9/10)" class="w-full p-1.5 text-xs border rounded-lg outline-none focus:border-purple-500 bg-white">
                                    <button onclick="saveMarksDirect('${sub.id}')" class="bg-green-600 hover:bg-green-700 text-white px-3 py-1.5 rounded-lg text-xs font-bold transition">
                                        Save
                                    </button>
                                </div>
                            </div>
                        `;
                    });
                }

                masterContainer.innerHTML += `
                    <div class="bg-white p-5 rounded-3xl shadow-sm border border-gray-100 space-y-3">
                        <div class="flex justify-between items-start">
                            <div>
                                <span class="text-[10px] bg-purple-50 text-purple-600 px-2.5 py-1 rounded-full font-bold uppercase">Class ${assignData.targetClass}</span>
                                <h3 class="font-bold text-gray-800 text-base mt-2">${assignData.title}</h3>
                                ${assignData.fileUrl ? `<a href="${assignData.fileUrl}" target="_blank" class="text-xs text-indigo-600 font-semibold inline-block mt-1 hover:underline"><i class="fas fa-download text-[10px]"></i> View Qn Paper</a>` : ''}
                            </div>
                            <button onclick="deleteAssignment('${assignId}')" class="text-red-400 hover:text-red-600 transition"><i class="fas fa-trash"></i></button>
                        </div>
                        
                        <div class="border-t border-gray-100 pt-3">
                            <h4 class="text-xs font-bold text-gray-500 mb-2 uppercase tracking-wider">Student Submissions (${matchingSubmissions.length})</h4>
                            <div class="space-y-2 max-h-60 overflow-y-auto no-scrollbar">
                                ${submissionsHtml}
                            </div>
                        </div>
                    </div>
                `;
            });
        });
    }

    // 5. Save marks
    window.saveMarksDirect = async (submissionId) => {
        const marksValue = document.getElementById(`marks-${submissionId}`).value.trim();
        if(!marksValue) return alert("Pehle number (marks) daalo bhai!");

        try {
            await updateDoc(doc(db, "submissions", submissionId), { marks: marksValue });
            alert("🎯 Marks saved successfully!");
        } catch (e) { alert("Error updating marks: " + e.message); }
    };

    // 6. Delete Assignment
    window.deleteAssignment = async (assignId) => {
        if(confirm("Are you sure you want to delete this assignment?")) {
            await deleteDoc(doc(db, "assignments", assignId));
        }
    };
</script>
</body>
</html>
